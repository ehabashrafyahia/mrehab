<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التميز | الصف الرابع</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: #f4f7f6; 
            scroll-behavior: smooth;
        }

        .main-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* زر الدرس المفتوح */
        .lesson-btn-active {
            background: linear-gradient(145deg, #10b981, #059669);
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.3);
            transition: all 0.3s ease;
        }
        .lesson-btn-active:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 25px -5px rgba(16, 185, 129, 0.4);
        }

        /* نظام القفل */
        .is-locked {
            position: relative;
            filter: grayscale(1) blur(1.5px);
            opacity: 0.6;
            pointer-events: none;
            user-select: none;
        }

        .lock-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        .lock-badge {
            background: rgba(30, 41, 59, 0.9);
            color: white;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .back-btn {
            transition: all 0.3s ease;
            background: #ffffff;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body class="pb-20 text-right">

    <header class="main-header shadow-sm">
        <div class="max-w-6xl mx-auto px-4 h-20 flex items-center justify-between">
            <a href="index.html" class="back-btn px-4 py-2 rounded-2xl flex items-center gap-2 text-slate-600 font-bold text-sm">
                <i class="fas fa-chevron-right text-xs"></i>
                <span>الرئيسية</span>
            </a>
            <div class="text-center">
                <h2 class="text-xl md:text-2xl font-800 text-slate-800">دراسات رابعة ابتدائي</h2>
                <p class="text-[10px] md:text-xs text-indigo-600 font-bold">الفصل الدراسي الثاني</p>
            </div>
            <div class="w-10 h-10 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600 shadow-inner">
                <i class="fas fa-graduation-cap"></i>
            </div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 mt-12 space-y-12">

        <section>
            <div class="flex items-center gap-4 mb-8">
                <div class="w-2 h-8 bg-emerald-500 rounded-full"></div>
                <h2 class="text-2xl font-800 text-slate-800">الوحدة الأولى: سكان بلدنا</h2>
            </div>

            <div class="flex flex-col gap-4">
                
                <a href="lesson1-exam.html" class="lesson-btn-active p-6 rounded-3xl text-white flex justify-between items-center group">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center font-bold">1</div>
                        <span class="font-bold text-lg text-white">الدرس الأول: توزيع سكان بلدنا وخصائصهم</span>
                    </div>
                    <i class="fas fa-check-circle text-2xl"></i>
                </a>

                <a href="lesson2-exam.html" class="lesson-btn-active p-6 rounded-3xl text-white flex justify-between items-center group">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center font-bold">2</div>
                        <span class="font-bold text-lg text-white">الدرس الثاني: التراث الثقافي لبلدنا</span>
                    </div>
                    <i class="fas fa-play-circle text-2xl"></i>
                </a>

                <div class="is-locked relative p-6 rounded-3xl bg-slate-200 text-slate-500 flex justify-between items-center border border-slate-300">
                    <div class="lock-overlay"><div class="lock-badge"><i class="fas fa-lock ml-2"></i>قريباً</div></div>
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-slate-300 rounded-xl flex items-center justify-center font-bold">3</div>
                        <span class="font-bold text-lg">الدرس الثالث: نماذج من المشكلات الاجتماعية</span>
                    </div>
                </div>

                <div class="is-locked relative p-6 rounded-3xl bg-indigo-100 text-indigo-400 flex flex-col items-center justify-center border-2 border-dashed border-indigo-200">
                    <div class="lock-overlay"><div class="lock-badge"><i class="fas fa-lock ml-2"></i>أكمل الدروس أولاً</div></div>
                    <i class="fas fa-star text-2xl mb-1"></i>
                    <h3 class="font-800 text-xl">امتحان الوحدة الأولى الشامل</h3>
                </div>
            </div>
        </section>

    </main>

    <footer class="mt-20 text-center text-slate-400 font-bold text-xs pb-10">
        منصة التميز التعليمية &copy; 2026
    </footer>

</body>
</html>
