<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التميز | الصف الرابع</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: #f4f7f6; 
            scroll-behavior: smooth;
        }

        /* هيدر زجاجي احترافي */
        .main-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* مؤشر قراءة الصفحة العلوي */
        .progress-container {
            width: 100%;
            height: 4px;
            background: transparent;
            position: absolute;
            bottom: 0;
            left: 0;
        }
        .progress-bar {
            height: 4px;
            background: linear-gradient(to left, #10b981, #4f46e5);
            width: 0%;
        }

        /* زر العودة الاحترافي */
        .back-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #ffffff;
            border: 1px solid #e2e8f0;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.03);
        }
        .back-btn:hover {
            background: #f8fafc;
            transform: translateX(5px);
            color: #4f46e5;
            border-color: #4f46e5;
        }

        /* تأثير أزرار الدروس */
        .lesson-btn {
            background: linear-gradient(145deg, #10b981, #059669);
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.3);
            transition: all 0.3s ease;
        }
        .lesson-btn:hover:not(.is-locked) {
            transform: translateY(-4px);
            box-shadow: 0 15px 25px -5px rgba(16, 185, 129, 0.4);
        }

        /* القفل الاحترافي */
        .is-locked {
            filter: grayscale(1) opacity(0.5);
            pointer-events: none;
            position: relative;
        }
        .lock-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
    </style>
</head>
<body class="pb-20">

    <header class="main-header shadow-sm">
        <div class="max-w-6xl mx-auto px-4 h-20 flex items-center justify-between">
            
            <a href="index.html" class="back-btn px-4 py-2 rounded-2xl flex items-center gap-2 text-slate-600 font-bold text-sm">
                <i class="fas fa-chevron-right text-xs"></i>
                <span>الرئيسية</span>
            </a>

            <div class="text-center">
                <h2 class="text-xl md:text-2xl font-800 text-slate-800">دراسات رابعة ابتدائي</h2>
                <p class="text-[10px] md:text-xs text-indigo-600 font-bold uppercase tracking-widest">الفصل الدراسي الثاني</p>
            </div>

            <div class="w-10 h-10 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600 shadow-inner">
                <i class="fas fa-graduation-cap"></i>
            </div>
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="myBar"></div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 mt-12 space-y-16">

        <section class="fade-in">
            <div class="flex items-center gap-4 mb-8">
                <div class="w-2 h-8 bg-emerald-500 rounded-full"></div>
                <h2 class="text-2xl font-800 text-slate-800">الوحدة الأولى: سكان بلدنا</h2>
            </div>

            <div class="flex flex-col gap-4">
                <a href="#" class="lesson-btn p-5 rounded-3xl text-white flex justify-between items-center group">
                    <span class="font-bold text-lg">1. توزيع سكان بلدنا وخصائصهم</span>
                    <i class="fas fa-play text-xs bg-white/20 p-2 rounded-full"></i>
                </a>
                <a href="#" class="lesson-btn p-5 rounded-3xl text-white flex justify-between items-center group">
                    <span class="font-bold text-lg">2. المهن في بلدنا</span>
                    <i class="fas fa-play text-xs bg-white/20 p-2 rounded-full"></i>
                </a>
                <a href="#" class="lesson-btn p-5 rounded-3xl text-white flex justify-between items-center group">
                    <span class="font-bold text-lg">3. المشاركة في صنع القرار</span>
                    <i class="fas fa-play text-xs bg-white/20 p-2 rounded-full"></i>
                </a>

                <a href="#" class="bg-gradient-to-r from-indigo-600 to-blue-700 p-6 rounded-3xl text-white text-center shadow-xl shadow-indigo-100 hover:scale-[1.02] transition-transform mt-2">
                    <i class="fas fa-file-signature mb-2 text-2xl text-yellow-300"></i>
                    <h3 class="font-800 text-xl tracking-wide">امتحان الوحدة الأولى الشامل</h3>
                </a>
            </div>
        </section>

        <section class="is-locked">
            <div class="lock-overlay">
                <span class="bg-slate-800 text-white px-6 py-2 rounded-full text-sm font-bold shadow-2xl">
                    <i class="fas fa-lock ml-2"></i> قريباً
                </span>
            </div>
            <div class="flex items-center gap-4 mb-8">
                <div class="w-2 h-8 bg-slate-400 rounded-full"></div>
                <h2 class="text-2xl font-800 text-slate-400">الوحدة الثانية: تراث بلدنا</h2>
            </div>
            <div class="lesson-btn p-5 rounded-3xl text-white opacity-40">
                <span class="font-bold">الدرس الأول: الحرف التراثية</span>
            </div>
        </section>

    </main>

    <script>
        // كود تحريك مؤشر التقدم العلوي عند التمرير
        window.onscroll = function() { myFunction() };
        function myFunction() {
            var winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            var height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            var scrolled = (winScroll / height) * 100;
            document.getElementById("myBar").style.width = scrolled + "%";
        }
    </script>

</body>
</html>
