<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار خصائص قارات العالم | مراجعة ذاتية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            min-height: 100vh;
            user-select: none;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(16, 185, 129, 0.1);
            border-radius: 2rem;
        }
        .option-box {
            background: white; border: 2px solid #e2e8f0;
            transition: all 0.3s ease; text-align: right; cursor: pointer;
        }
        .option-box:hover { border-color: #10b981; transform: scale(1.02); }
        .option-box.selected {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-color: transparent; color: white;
        }
        .opt-prefix {
            background: #f1f5f9; width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; font-weight: 900; color: #64748b;
        }
        .option-box.selected .opt-prefix { background: rgba(255, 255, 255, 0.2); color: white; }
        .progress-glow {
            height: 100%; background: linear-gradient(90deg, #10b981, #3b82f6);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); border-radius: 100px;
            transition: width 0.6s ease;
        }
        .btn-confirm {
            background: linear-gradient(135deg, #059669 0%, #064e3b 100%);
            box-shadow: 0 15px 30px -10px rgba(5, 150, 105, 0.4);
        }
        #exit-modal { display: none; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="exit-modal" class="fixed inset-0 z-[2000] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <h3 class="text-xl font-900 text-slate-800 mb-2">هل تريد الخروج؟</h3>
            <div class="flex gap-3 mt-6">
                <a href="grade5.html" class="flex-1 py-3 bg-red-50 text-red-600 rounded-2xl font-bold text-center">خروج</a>
                <button onclick="toggleExitModal(false)" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-bold">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="quiz-wrapper" class="max-w-3xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <button onclick="toggleExitModal(true)" class="flex items-center gap-2 p-3 bg-white rounded-2xl shadow-sm text-slate-500 border border-slate-100">
                <i class="fas fa-sign-out-alt rotate-180"></i>
                <span class="font-bold text-sm text-slate-800">خروج</span>
            </button>
            <div class="bg-white px-6 py-2 rounded-2xl shadow-sm border border-slate-100 font-900 text-emerald-600">
                <span id="q-count">1</span> / 30
            </div>
            <div class="p-3 bg-emerald-50 rounded-2xl text-emerald-500"><i class="fas fa-map-marked-alt"></i></div>
        </div>

        <div class="h-3 bg-slate-200 rounded-full mb-12 overflow-hidden">
            <div id="progress-bar" class="progress-glow" style="width: 5%;"></div>
        </div>

        <div class="glass-card p-8 md:p-12 mb-10">
            <h2 id="main-question" class="text-2xl md:text-3xl font-900 text-slate-800 leading-snug text-center mb-12">جاري التحميل...</h2>
            <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
        </div>

        <button onclick="goToNext()" class="btn-confirm w-full py-6 rounded-3xl text-white font-900 text-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
            <span>تأكيد الإجابة</span>
            <i class="fas fa-chevron-left"></i>
        </button>
    </div>

    <div id="result-view" class="hidden max-w-xl mx-auto text-center pt-10">
        <div class="glass-card p-12 shadow-2xl bg-white mb-6 border-2 border-emerald-100">
            <div class="text-7xl mb-6">🌍</div>
            <h1 class="text-4xl font-900 text-slate-800 mb-2">نتيجة الاختبار</h1>
            <p class="text-slate-500 font-bold mb-8">رحلة حول العالم-اسبانيا</p>
            
            <div class="relative inline-block mb-10">
                <svg class="w-40 h-40 transform -rotate-90">
                    <circle cx="80" cy="80" r="70" stroke="#f1f5f9" stroke-width="12" fill="transparent" />
                    <circle id="score-circle" cx="80" cy="80" r="70" stroke="#10b981" stroke-width="12" fill="transparent" stroke-dasharray="440" stroke-dashoffset="440" class="transition-all duration-1000" />
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <span class="font-900 text-4xl text-slate-800" id="score-text">0%</span>
                </div>
            </div>
            <div id="result-msg" class="text-xl font-black text-emerald-600"></div>
        </div>

        <div class="flex flex-col gap-4">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="location.reload()" class="py-4 bg-emerald-100 text-emerald-700 rounded-2xl font-bold shadow-lg hover:bg-emerald-200 transition">إعادة الاختبار</button>
                <a href="grade5.html" class="py-4 bg-slate-800 text-white rounded-2xl font-bold shadow-lg flex items-center justify-center hover:bg-slate-700 transition">الرئيسية</a>
            </div>
        </div>
    </div>

    <script>
        const questions = [
    { q: "تطل دولة إسبانيا من جهة الغرب والشمال الغربي على:", a: ["البحر المتوسط", "المحيط الأطلنطي", "البحر الأحمر", "الخليج العربي"], c: 1 },
    { q: "من أهم السلاسل الجبلية الموجودة في إسبانيا:", a: ["جبال البحر الأحمر", "جبال الأطلس", "جبال البرانس", "جبال سانت كاترين"], c: 2 },
    { q: "يعرف الشعب الإسباني بأنه شعب:", a: ["منغلق وغير ودود", "ودود ومتسامح مع الثقافات الأخرى", "لا يهتم بالراحة والعمل", "يرفض التعامل مع السياح"], c: 1 },
    { q: "تمثل 'العائلة' لدى الشعب الإسباني جزءاً:", a: ["هامشياً في حياتهم", "محورياً وأساسياً من حياتهم", "غير ضروري", "يقتصر على المناسبات فقط"], c: 1 },
    { q: "يرتكز اقتصاد إسبانيا بشكل كبير على قطاع:", a: ["التعدين فقط", "السياحة", "الغابات", "الصيد البري"], c: 1 },
    { q: "من أهم الصناعات الغذائية التي تشتهر بها إسبانيا:", a: ["صناعة السكر", "صناعة زيت الزيتون", "تعليب الفاكهة الاستوائية", "إنتاج البن"], c: 1 },
    { q: "تعززت العلاقات بين مصر وإسبانيا بشكل خاص في ثمانينيات القرن الماضي في مجالي:", a: ["الزراعة والصيد", "السياحة والطاقة", "التعليم والرياضة", "الفضاء والتكنولوجيا"], c: 1 },
    { q: "يقع 'قصر الحمراء' الشهير في مدينة إسبانية هي:", a: ["مدريد", "غرناطة", "برشلونة", "إشبيلية"], c: 1 },
    { q: "المعلم السياحي الموجود في مدينة مدريد هو:", a: ["قصر الحمراء", "القصر الملكي", "قصر رأس التين", "برج إيفل"], c: 1 },
    { q: "العملة الرسمية المستخدمة في دولة إسبانيا هي:", a: ["الدولار", "اليورو", "الجنيه", "الريال"], c: 1 },
    { q: "اللغة الرسمية التي يتحدث بها سكان إسبانيا هي:", a: ["الإنجليزية", "الإسبانية", "الفرنسية", "العربية"], c: 1 },
    { q: "عاصمة دولة إسبانيا هي مدينة:", a: ["غرناطة", "مدريد", "الإسكندرية", "القاهرة"], c: 1 },
    { q: "'قصر رأس التين' هو معلم أثري مصري عريق يقع في مدينة:", a: ["القاهرة", "الإسكندرية", "أسوان", "الأقصر"], c: 1 },
    { q: "صُمم قصر رأس التين ليكون مركزاً لـ:", a: ["تخزين الحبوب", "إدارة شئون الدولة في العصر الملكي", "استقبال السياح الأجانب فقط", "إقامة المسابقات الرياضية"], c: 1 },
    { q: "يتميز قصر رأس التين المصري بـ:", a: ["البساطة المتناهية", "الطابع الحضاري والمعماري الفخم", "صغر مساحته", "بنائه تحت الماء"], c: 1 },
    { q: "القاسم المشترك بين مصر وإسبانيا في القطاع الاقتصادي هو:", a: ["انعدام السياحة", "أهمية السياحة كمصدر للدخل", "عدم وجود سواحل بحرية", "الاعتماد الكلي على الأمطار"], c: 1 },
    { q: "من السلوكيات التي تزيد من الجذب السياحي في إسبانيا أو مصر:", a: ["التعامل بحدة مع السياح", "التسامح والود مع الثقافات المختلفة", "رفع أسعار الخدمات بشكل مبالغ", "إهمال نظافة المعالم الأثرية"], c: 1 },
    { q: "تطل إسبانيا من جهة الشرق والجنوب على:", a: ["البحر المتوسط", "البحر الأحمر", "المحيط الهادي", "بحر العرب"], c: 0 },
    { q: "احترام حضارات الأمم الأخرى يعتبر:", a: ["اختياراً شخصياً", "واجباً إنسانياً وحضارياً", "أمراً غير ضروري", "مضيعة للوقت"], c: 1 },
    { q: "العلاقات المصرية الإسبانية قوية وتاريخية، وظهر ذلك بوضوح في تعاونهم في مجال:", a: ["الطاقة المتجددة", "المنسوجات فقط", "صيد الأسماك", "استخراج المعادن"], c: 0 },
    { q: "يعتبر زيت الزيتون من الصادرات الرئيسية لدولة:", a: ["مصر", "إسبانيا", "السودان", "روسيا"], c: 1 },
    { q: "يقع 'القصر الملكي' في مدينة مدريد بينما يقع 'قصر الحمراء' في مدينة:", a: ["مدريد أيضاً", "غرناطة", "قادس", "برشلونة"], c: 1 },
    { q: "يجمع الشعب الإسباني في أسلوب حياته بين:", a: ["العمل والراحة بشكل متوازن", "العمل طوال اليوم دون راحة", "الراحة الدائمة دون عمل", "السفر المستمر دون استقرار"], c: 0 },
    { q: "تعكس المعالم المعمارية في مصر وإسبانيا:", a: ["الفقر الفني", "الطابع الحضاري العريق لكل دولة", "التشابه التام في التصميم", "عدم الاهتمام بالجمال"], c: 1 },
    { q: "تعد إسبانيا من أكبر الوجهات السياحية في:", a: ["أفريقيا", "العالم", "أمريكا الجنوبية", "القطب الشمالي"], c: 1 },
    { q: "مدينة 'مدريد' هي مركز الحكم والسياسة في إسبانيا لأنها:", a: ["أصغر مدينة", "العاصمة", "تقع على البحر", "لا يسكنها أحد"], c: 1 },
    { q: "قصر رأس التين في مصر يعبر عن فن العمارة في العصر:", a: ["الفرعوني", "الملكي", "اليوناني", "الروماني"], c: 1 },
    { q: "السفر حول العالم يهدف بشكل رئيسي إلى:", a: ["التعب والإرهاق", "التعرف على حضارات وثقافات الشعوب", "إضاعة المال", "الهروب من المسئولية"], c: 1 },
    { q: "أي من هذه الدول تقع في قارة أوروبا؟", a: ["مصر", "إسبانيا", "السعودية", "الصين"], c: 1 },
    { q: "'احترم كل الحضارات، لكني أفتخر بتاريخي'؛ هذه العبارة تدعو إلى:", a: ["التعصب", "الاعتزاز بالهوية مع احترام الآخرين", "كراهية الآخرين", "نسيان التاريخ الشخصي"], c: 1 }
];


        let index = 0, score = 0, picked = null;

        window.onload = () => {
            render();
        };

        function render() {
            picked = null;
            const q = questions[index];
            document.getElementById('main-question').innerText = q.q;
            document.getElementById('q-count').innerText = index + 1;
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            q.a.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = 'option-box p-6 rounded-2xl flex items-center gap-4 group';
                btn.innerHTML = `<div class="opt-prefix">${String.fromCharCode(65 + i)}</div><span class="text-lg font-bold">${opt}</span>`;
                btn.onclick = () => {
                    document.querySelectorAll('.option-box').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    picked = i;
                };
                grid.appendChild(btn);
            });
            document.getElementById('progress-bar').style.width = ((index / questions.length) * 100) + '%';
        }

        function goToNext() {
            if (picked === null) return Swal.fire({text:'اختر إجابة أولاً يا بطل!', icon:'warning', confirmButtonColor: '#10b981'});
            if (picked === questions[index].c) score++;
            index++;
            if (index < questions.length) render(); else finish();
        }

        function finish() {
            document.getElementById('quiz-wrapper').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            const pct = Math.round((score / questions.length) * 100);
            document.getElementById('score-text').innerText = pct + '%';
            document.getElementById('score-circle').style.strokeDashoffset = 440 - (440 * pct) / 100;
            
            let msg = pct >= 50 ? "أداء ممتاز! أنت جغرافي بارع" : "حاول مرة أخرى لتتقن تضاريس العالم";
            document.getElementById('result-msg').innerText = msg;
        }

        function toggleExitModal(s) { document.getElementById('exit-modal').style.display = s?'flex':'none'; }
    </script>
</body>
</html>
