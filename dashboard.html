<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم أطلس | المستر إيهاب أشرف</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>body { font-family: 'Cairo', sans-serif; background: #f0f4f8; }</style>
</head>
<body class="p-4">
    <div class="max-w-4xl mx-auto">
        <div class="bg-emerald-600 text-white p-6 rounded-3xl shadow-lg mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black">لوحة تحكم المنصة 🚀</h1>
                <p class="text-sm opacity-80">أهلاً بك يا مستر إيهاب</p>
            </div>
            <button onclick="logout()" class="bg-white/20 p-3 rounded-full"><i class="fas fa-sign-out-alt"></i></button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm border-b-4 border-emerald-500">
                <i class="fas fa-users text-emerald-500 text-2xl mb-2"></i>
                <h3 class="text-slate-500 font-bold text-sm">إجمالي الطلاب</h3>
                <p class="text-3xl font-black text-slate-800">9</p>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border-b-4 border-orange-500">
                <i class="fas fa-circle text-orange-500 text-2xl mb-2 animate-pulse"></i>
                <h3 class="text-slate-500 font-bold text-sm">متصل الآن</h3>
                <p class="text-3xl font-black text-slate-800">3</p>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm p-6">
            <h3 class="font-black text-slate-800 mb-4 border-b pb-2">حالة الطلاب</h3>
            <div id="studentList" class="space-y-4">
                </div>
        </div>
    </div>

    <script>
        // محاكاة لحالة الطلاب
        const students = [
            {name: "أمل عرفة", status: "online", lastSeen: "الآن"},
            {name: "مريم احمد", status: "offline", lastSeen: "منذ ساعتين"},
            {name: "ندي فتحي", status: "online", lastSeen: "الآن"}
        ];

        const listDiv = document.getElementById('studentList');
        students.forEach(s => {
            listDiv.innerHTML += `
                <div class="flex justify-between items-center p-3 bg-slate-50 rounded-2xl">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600 font-bold">
                            ${s.name[0]}
                        </div>
                        <div>
                            <p class="font-bold text-slate-700 text-sm">${s.name}</p>
                            <p class="text-[10px] text-slate-400">آخر ظهور: ${s.lastSeen}</p>
                        </div>
                    </div>
                    <span class="w-3 h-3 rounded-full ${s.status === 'online' ? 'bg-emerald-500 shadow-[0_0_10px_#10b981]' : 'bg-slate-300'}"></span>
                </div>
            `;
        });

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
