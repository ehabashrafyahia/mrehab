<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار عهد محمد علي | منصة أطلس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%); 
            min-height: 100vh; 
            user-select: none; 
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.5); 
            box-shadow: 0 25px 50px -12px rgba(124, 58, 237, 0.1); 
            border-radius: 2rem; 
        }
        .option-box { 
            background: white; border: 2px solid #e2e8f0; 
            transition: all 0.3s ease; text-align: right; cursor: pointer; 
        }
        .option-box:hover { border-color: #8b5cf6; transform: scale(1.02); }
        .option-box.selected { 
            background: linear-gradient(135deg, #a855f7 0%, #7e22ce 100%); 
            border-color: transparent; color: white; 
        }
        .opt-prefix { 
            background: #f1f5f9; width: 38px; height: 38px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 10px; font-weight: 900; color: #64748b; 
        }
        .option-box.selected .opt-prefix { background: rgba(255, 255, 255, 0.2); color: white; }
        .progress-glow { 
            height: 100%; background: linear-gradient(90deg, #a855f7, #6366f1); 
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); border-radius: 100px; 
            transition: width 0.6s ease; 
        }
        .btn-confirm { 
            background: linear-gradient(135deg, #6d28d9 0%, #4c1d95 100%); 
            box-shadow: 0 15px 30px -10px rgba(109, 40, 217, 0.4); 
        }
        #exit-modal { display: none; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="exit-modal" class="fixed inset-0 z-[2000] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <h3 class="text-xl font-900 text-slate-800 mb-2">هل تريد الخروج؟</h3>
            <div class="flex gap-3 mt-6">
                <a href="grade7.html" class="flex-1 py-3 bg-red-50 text-red-600 rounded-2xl font-bold text-center">خروج</a>
                <button onclick="toggleExitModal(false)" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-bold">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="quiz-wrapper" class="max-w-3xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <button onclick="toggleExitModal(true)" class="flex items-center gap-2 p-3 bg-white rounded-2xl shadow-sm text-slate-500 border border-slate-100 transition-colors hover:text-red-500">
                <i class="fas fa-sign-out-alt rotate-180"></i>
                <span class="font-bold text-sm text-slate-800">خروج</span>
            </button>
            <div class="bg-white px-6 py-2 rounded-2xl shadow-sm border border-slate-100 font-900 text-purple-600">
                <span id="q-count">1</span> / 30
            </div>
            <div class="p-3 bg-purple-50 rounded-2xl text-purple-500"><i class="fas fa-history"></i></div>
        </div>

        <div class="h-3 bg-slate-200 rounded-full mb-12 overflow-hidden">
            <div id="progress-bar" class="progress-glow" style="width: 0%;"></div>
        </div>

        <div class="glass-card p-8 md:p-12 mb-10">
            <h2 id="main-question" class="text-2xl md:text-3xl font-900 text-slate-800 leading-snug text-center mb-12">جاري التحميل...</h2>
            <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
        </div>

        <button onclick="goToNext()" class="btn-confirm w-full py-6 rounded-3xl text-white font-900 text-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
            <span>تأكيد الإجابة</span>
            <i class="fas fa-chevron-left"></i>
        </button>
    </div>

    <div id="result-view" class="hidden max-w-xl mx-auto text-center pt-10">
        <div class="glass-card p-12 bg-white mb-6 border-2 border-purple-100">
            <div class="text-7xl mb-6">🏆</div>
            <h1 class="text-4xl font-900 text-slate-800 mb-2">نتيجة الاختبار</h1>
            <p class="text-slate-500 font-bold mb-8">الدور الحضاري في عهد خلفاء محمد علي</p>
            
            <div class="relative inline-block mb-10">
                <svg class="w-40 h-40 transform -rotate-90">
                    <circle cx="80" cy="80" r="70" stroke="#f1f5f9" stroke-width="12" fill="transparent" />
                    <circle id="score-circle" cx="80" cy="80" r="70" stroke="#a855f7" stroke-width="12" fill="transparent" stroke-dasharray="440" stroke-dashoffset="440" class="transition-all duration-1000" />
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <span class="font-900 text-4xl text-slate-800" id="score-text">0%</span>
                </div>
            </div>
            <div id="result-msg" class="text-xl font-black text-purple-600"></div>
        </div>

        <div class="flex flex-col gap-4">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="location.reload()" class="py-4 bg-purple-100 text-purple-700 rounded-2xl font-bold shadow-lg hover:bg-purple-200 transition">إعادة</button>
                <a href="grade7.html" class="py-4 bg-slate-800 text-white rounded-2xl font-bold shadow-lg flex items-center justify-center hover:bg-slate-700 transition">العودة للدروس</a>
            </div>
        </div>
    </div>

    <script>
        const questions = [
    { q: "واصل خلفاء محمد علي الاهتمام باستكشاف إفريقيا بناءً على مقولة:", a: ["مستقبل مصر في أوروبا", "مستقبل مصر في إفريقيا", "مستقبل مصر في التجارة فقط", "مستقبل مصر في الصناعة"], c: 1 },
    { q: "الحاكم الذي أنشأ مدرسة ابتدائية في الخرطوم هو:", a: ["سعيد باشا", "الخديوي إسماعيل", "عباس باشا الأول", "إبراهيم باشا"], c: 2 },
    { q: "جعل عباس باشا الأول ناظر مدرسة الخرطوم الابتدائية هو العالم:", a: ["رفاعة الطهطاوي", "علي مبارك", "قاسم أمين", "جمال الدين الأفغاني"], c: 0 },
    { q: "نشطت التجارة في عهد عباس باشا الأول بين مصر والسودان و:", a: ["دول أوروبا", "الدول المجاورة", "دول أمريكا الشمالية", "الهند"], c: 1 },
    { q: "زار سعيد باشا السودان عام 1857م بهدف:", a: ["شن حروب جديدة", "دراسة أوضاعها وتنمية مواردها", "التنازل عن حكمها", "بناء المصانع الحربية"], c: 1 },
    { q: "أرسلت الجمعية الجغرافية الملكية البريطانية بعثات في عهد سعيد باشا لكشف:", a: ["منابع نهر النيل", "مناجم الذهب", "الغابات الاستوائية", "طرق التجارة الصحراوية"], c: 0 },
    { q: "يعد عهد الخديوي إسماعيل من أهم فترات التاريخ لأنه شهد توسعاً منظماً في:", a: ["آسيا", "إفريقيا", "أوروبا", "أستراليا"], c: 1 },
    { q: "من دوافع الخديوي إسماعيل لاستكشاف إفريقيا رغبته في محاربة:", a: ["الفقر", "تجارة الرقيق", "الأمراض", "الجهل"], c: 1 },
    { q: "هدفت حملات الخديوي إسماعيل في إفريقيا إلى تأكيد الوحدة:", a: ["اللغوية والدينية", "الجغرافية والاقتصادية بين مصر ودول حوض النيل", "العسكرية فقط", "السياسية مع أوروبا"], c: 1 },
    { q: "آمن الخديوي إسماعيل بدور مصر في إدخال ________ إلى إفريقيا.", a: ["الأسلحة الثقيلة", "الحضارة الحديثة", "المحاصيل الأوروبية", "الصناعات التعدينية"], c: 1 },
    { q: "أدخل الخديوي إسماعيل تعديلات على التقسيم الإداري للسودان وقسمها إلى:", a: ["5 مديريات", "12 مديرية", "20 مديرية", "3 مديريات فقط"], c: 1 },
    { q: "أنشأ الخديوي إسماعيل (5) محافظات على الساحل الشتري لإفريقيا منها:", a: ["الإسكندرية ودمياط", "سواكن ومصوع", "طرابلس وبنغازي", "عدن وجيبوتي"], c: 1 },
    { q: "قام الخديوي إسماعيل بإرسال ________ للتدريس في السودان ومنطقة القرن الإفريقي.", a: ["المهندسين والأطباء", "المعلمين وعلماء الأزهر الشريف", "التجار والمستثمرين", "العمال والحرفيين"], c: 1 },
    { q: "أدى إرسال خريجي مدرسة الخرطوم إلى مصر لإتمام دراستهم إلى نبوغهم في:", a: ["الموسيقى والرسم", "الهندسة والمساحة والتاريخ", "الطب والصيدلة", "اللغات الأجنبية"], c: 1 },
    { q: "اهتم الخديوي إسماعيل بالزراعة في السودان من خلال التوسع في زراعة:", a: ["القمح", "القطن", "الأرز", "الذرة"], c: 1 },
    { q: "الهدف من التوسع في زراعة القطن في السودان كان:", a: ["الاستهلاك المحلي فقط", "دعم الصناعات التصديرية", "منافسة المحاصيل الأخرى", "استخدامه كعلف للحيوانات"], c: 1 },
    { q: "من إصلاحات الخديوي إسماعيل في الطرق البرية بالسودان:", a: ["إلغاء جميع الطرق القديمة", "إنشاء وتحسين الطرق البرية ومد خط سكة حديدية", "منع استخدام الخيول", "بناء الجسور المعلقة فقط"], c: 1 },
    { q: "أصبحت الملاحة النهرية في عهد إسماعيل صالحة لمرور السفن عند:", a: ["شلالات النيل", "مجرى النيل جنوب وادي حلفا", "البحر الأحمر", "المحيط الهندي"], c: 1 },
    { q: "أنشئ فنار في عهد الخديوي إسماعيل لرسو السفن بميناء:", a: ["بورسعيد", "بربرة على خليج عدن", "السويس", "الغردقة"], c: 1 },
    { q: "ازدهرت حركة التجارة في عهد إسماعيل بسبب استقرار ________ في المناطق الإفريقية.", a: ["الأسعار", "الأمن", "المناخ", "السكان"], c: 1 },
    { q: "أسس الخديوي إسماعيل إدارة للبريد في الخرطوم عام:", a: ["1850م", "1873م", "1880م", "1860م"], c: 1 },
    { q: "عزل الموظفين المعروفين بسوء المعاملة في السودان يعد من الإصلاحات:", a: ["العسكرية", "الإدارية", "الدينية", "الرياضية"], c: 1 },
    { q: "أنشأ الخديوي إسماعيل 'المجالس العرفية' لإشراك السودانيين في:", a: ["الحروب الخارجية", "حكم بلادهم", "التجارة العالمية", "بناء السدود"], c: 1 },
    { q: "المجالس العرفية هي تجمع من شخصيات ذات نفوذ لفض المنازعات استناداً إلى:", a: ["القوانين الأوروبية", "الأعراف والتقاليد المتبعة", "القوة العسكرية", "القرارات الفردية"], c: 1 },
    { q: "تضمن الإصلاح القضائي في السودان إنشاء مجالس الأقاليم للفصل في:", a: ["الخصومات المدنية والتجارية", "القضايا السياسية الدولية", "النزاعات الحدودية", "قضايا المرور"], c: 0 },
    { q: "من الإصلاحات الاجتماعية لإسماعيل في السودان إقامة معسكر للجيش لمنع:", a: ["الهجرة غير الشرعية", "تجارة الرقيق", "الصيد الجائر", "التلوث البيئي"], c: 1 },
    { q: "قام الخديوي إسماعيل بإعفاء الأهالي في السودان من:", a: ["التعليم", "الضرائب المتأخرة", "الخدمة العسكرية فقط", "العمل في الزراعة"], c: 1 },
    { q: "استعان الخديوي إسماعيل في حملاته الاستكشافية بضباط:", a: ["مصريين وأجانب", "أجانب فقط", "سودانيين فقط", "فرنسيين فقط"], c: 0 },
    { q: "نجح ضباط الجيش المصري عام 1877م في رسم أدق خريطة لـ:", a: ["قارة آسيا", "إفريقيا", "البحر المتوسط", "شبه جزيرة سيناء"], c: 1 },
    { q: "من نتائج حملات إسماعيل الاستكشافية اكتشاف منابع النيل الاستوائية والوصول إلى:", a: ["بحيرة ناصر", "بحيرة ألبرت وفيكتوريا", "بحيرة المنزلة", "بحيرة قارون"], c: 1 }
];

        let index = 0, score = 0, picked = null;

        window.onload = () => { render(); };

        function render() {
            picked = null;
            const q = questions[index];
            document.getElementById('main-question').innerText = q.q;
            document.getElementById('q-count').innerText = index + 1;
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            q.a.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = 'option-box p-6 rounded-2xl flex items-center gap-4 transition-all';
                btn.innerHTML = `<div class="opt-prefix">${String.fromCharCode(65 + i)}</div><span class="text-lg font-bold">${opt}</span>`;
                btn.onclick = () => {
                    document.querySelectorAll('.option-box').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    picked = i;
                };
                grid.appendChild(btn);
            });
            document.getElementById('progress-bar').style.width = ((index / questions.length) * 100) + '%';
        }

        function goToNext() {
            if (picked === null) return Swal.fire({text:'اختر إجابة أولاً يا بطل!', icon:'warning', confirmButtonColor: '#8b5cf6'});
            if (picked === questions[index].c) score++;
            index++;
            if (index < questions.length) render(); else finish();
        }

        function finish() {
            document.getElementById('quiz-wrapper').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            const pct = Math.round((score / questions.length) * 100);
            document.getElementById('score-text').innerText = pct + '%';
            document.getElementById('score-circle').style.strokeDashoffset = 440 - (440 * pct) / 100;
            document.getElementById('result-msg').innerText = pct >= 50 ? "بطل حقيقي! مستواك رائع" : "محاولة جيدة، راجع الدرس مرة أخرى";
        }

        function toggleExitModal(s) { document.getElementById('exit-modal').style.display = s?'flex':'none'; }
    </script>
</body>
</html>
