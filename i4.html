<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أ. إيهاب أشرف | أولى ثانوي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --edu-blue: #00d2ff;
            --edu-dark-blue: #3a7bd5;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-light: #f8fafc;
        }

        body {
            margin: 0;
            background: #0b0f19;
            font-family: 'Cairo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px 10px;
        }

        .container { width: 100%; max-width: 450px; }

        .input-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid #334155;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .title-header {
            color: var(--edu-blue);
            text-align: center;
            margin: 0 0 15px 0;
            font-weight: 900;
            font-size: 22px;
        }

        textarea {
            width: 100%; height: 140px;
            background: #0f172a; color: #fff;
            border: 1px solid #475569; border-radius: 10px;
            padding: 12px; font-family: 'Cairo';
            margin-bottom: 15px; resize: none; box-sizing: border-box;
            font-size: 15px;
        }

        #captureArea {
            width: 100%;
            height: 520px;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            padding: 30px 25px;
            border-radius: 20px;
            position: relative;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            border: 3px solid #334155;
            overflow: hidden;
        }

        .q-number {
            background: linear-gradient(90deg, var(--edu-dark-blue), var(--edu-blue));
            color: #fff;
            padding: 6px 20px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 900;
            width: fit-content;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .content-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }

        .question-text {
            color: var(--text-light);
            font-weight: 800;
            line-height: 1.6;
            border-right: 5px solid var(--edu-blue);
            padding-right: 15px;
            margin-bottom: 25px;
            font-size: 24px; 
        }

        .options-list {
            display: grid;
            gap: 12px;
        }

        .option-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 18px;
            font-weight: 600;
            color: #e2e8f0;
            display: flex;
            align-items: center;
        }

        .option-label {
            background: var(--edu-blue);
            color: #0f172a;
            width: 30px; height: 30px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px; margin-left: 12px;
            font-weight: 900; flex-shrink: 0; font-size: 15px;
        }

        .watermark {
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-text {
            color: #94a3b8;
            font-weight: 800;
            font-size: 14px;
        }

        .footer-text span { color: var(--edu-blue); }

        .controls { display: flex; flex-direction: column; gap: 8px; width: 100%; margin-top: 15px; }
        .row { display: flex; gap: 8px; width: 100%; }
        
        .btn { padding: 12px; border-radius: 12px; border: none; font-family: 'Cairo'; font-weight: 800; cursor: pointer; font-size: 14px; transition: 0.2s;}
        .btn:active { transform: scale(0.98); }
        
        .btn-main { background: var(--edu-blue); color: #0f172a; width: 100%; font-size: 18px; margin-bottom: 10px;}
        .btn-nav { background: #334155; color: #fff; flex: 1; }
        .btn-snap { background: #10b981; color: #fff; flex: 2; }
        .btn-all { background: #f59e0b; color: #fff; width: 100%; margin-top: 5px; }
        
        .hidden { display: none; }
        
        /* Loading Overlay */
        #loader {
            display: none;
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8); z-index: 1000;
            flex-direction: column; align-items: center; justify-content: center;
            color: white; font-weight: 900;
        }
    </style>
</head>
<body>

<div id="loader">
    <div style="font-size: 20px; margin-bottom: 10px;">⏳ جاري تجهيز جميع الصور...</div>
    <div id="progressText">0%</div>
</div>

<div class="container">
    <div id="setup" class="input-card">
        <h3 class="title-header">مُولد أسئلة مستر إيهاب 🎓</h3>
        <textarea id="inputText" placeholder="1) اكتب السؤال هنا...&#10;أ) خيار 1&#10;ب) خيار 2"></textarea>
        <button onclick="processData()" class="btn btn-main">تجهيز الأسئلة 🚀</button>
    </div>

    <div id="display" class="hidden">
        <div id="captureArea">
            <div id="qNumber" class="q-number"></div>
            <div class="content-wrapper">
                <div id="qBody" class="question-text"></div>
                <div id="optsBody" class="options-list"></div>
            </div>
            <div class="watermark">
                <span class="footer-text">📚 الصف <span>الأول الثانوي</span></span>
                <span class="footer-text">أ. إيهاب أشرف 🌟</span>
            </div>
        </div>
        
        <div class="controls">
            <div class="row">
                <button onclick="prev()" class="btn btn-nav">السابق</button>
                <button onclick="snap()" class="btn btn-snap">📸 حفظ هذه الصورة</button>
                <button onclick="next()" class="btn btn-nav">التالي</button>
            </div>
            <button onclick="snapAll()" class="btn btn-all">📦 حفظ الكل في ملف واحد (ZIP)</button>
        </div>
        
        <button onclick="location.reload()" style="background:none; border:none; color:#94a3b8; cursor:pointer; width:100%; margin-top:15px; font-family:'Cairo'; text-decoration:underline;">تعديل الأسئلة</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
    let questions = [];
    let current = 0;

    function processData() {
        const raw = document.getElementById('inputText').value;
        if(!raw.trim()) return;
        const regex = /\d+[\)\-\.]\s+/;
        const blocks = raw.split(regex).filter(p => p.trim().length > 2);
        
        questions = blocks.map(block => {
            const lines = block.split('\n').map(l => l.trim()).filter(l => l !== "");
            const q = lines[0];
            const opts = lines.filter(l => /^[A-Dأ-د][\)\-\.]/i.test(l))
                              .map(l => l.replace(/^[A-Dأ-د][\)\-\.]\s*/i, '').trim());
            return { q, opts };
        }).filter(item => item.opts.length > 0);

        if(questions.length > 0) {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('display').classList.remove('hidden');
            render();
        }
    }

    function render() {
        const item = questions[current];
        document.getElementById('qNumber').innerText = `سؤال رقم ( ${current + 1} )`;
        document.getElementById('qBody').innerText = item.q;
        const container = document.getElementById('optsBody');
        container.innerHTML = '';
        const labels = ['أ', 'ب', 'ج', 'د'];
        item.opts.slice(0, 4).forEach((text, i) => {
            container.innerHTML += `<div class="option-item"><div class="option-label">${labels[i]}</div><div>${text}</div></div>`;
        });
        setTimeout(autoShrink, 10);
    }

    function autoShrink() {
        const qBody = document.getElementById('qBody');
        const wrapper = document.querySelector('.content-wrapper');
        let size = 24;
        qBody.style.fontSize = size + 'px';
        while (wrapper.scrollHeight > wrapper.offsetHeight && size > 14) {
            size--;
            qBody.style.fontSize = size + 'px';
        }
    }

    function next() { if(current < questions.length - 1) { current++; render(); } }
    function prev() { if(current > 0) { current--; render(); } }

    // حفظ صورة واحدة
    async function snap() {
        const area = document.getElementById('captureArea');
        const canvas = await html2canvas(area, { scale: 2, backgroundColor: '#0f172a' });
        const link = document.createElement('a');
        link.download = `Ehab_Q${current+1}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
    }

    // حفظ الكل في ملف ZIP
    async function snapAll() {
        const zip = new JSZip();
        const loader = document.getElementById('loader');
        const progressText = document.getElementById('progressText');
        const originalIndex = current;
        
        loader.style.display = 'flex';
        
        for(let i = 0; i < questions.length; i++) {
            current = i;
            render();
            // ننتظر قليلاً للتأكد من رندر الخطوط
            await new Promise(r => setTimeout(r, 100));
            
            const area = document.getElementById('captureArea');
            const canvas = await html2canvas(area, { scale: 2, backgroundColor: '#0f172a' });
            const imgData = canvas.toDataURL("image/png").replace(/^data:image\/(png|jpg);base64,/, "");
            
            // إضافة الصورة للملف المضغوط بالترتيب
            zip.file(`Question_${i+1}.png`, imgData, {base64: true});
            
            // تحديث النسبة المئوية
            progressText.innerText = Math.round(((i + 1) / questions.length) * 100) + "%";
        }
        
        // توليد الملف وتحميله
        const content = await zip.generateAsync({type:"blob"});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = "Ehab_Ashraf_Questions.zip";
        link.click();
        
        // العودة للسؤال الأصلي وإخفاء اللودر
        current = originalIndex;
        render();
        loader.style.display = 'none';
    }
</script>
</body>
</html>
