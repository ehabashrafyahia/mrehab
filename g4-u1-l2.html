<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار المهن في بلدنا | مراجعة ذاتية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            user-select: none;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            border-radius: 2rem;
        }
        .option-box {
            background: white; border: 2px solid #e2e8f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: right; cursor: pointer;
        }
        .option-box:hover { border-color: #10b981; transform: scale(1.02); }
        .option-box.selected {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-color: transparent; color: white;
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
        }
        .opt-prefix {
            background: #f1f5f9; width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; font-weight: 900; color: #64748b;
        }
        .option-box.selected .opt-prefix { background: rgba(255, 255, 255, 0.2); color: white; }
        .progress-glow {
            height: 100%; background: linear-gradient(90deg, #10b981, #3b82f6);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); border-radius: 100px;
            transition: width 0.6s ease;
        }
        .btn-confirm {
            background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
            box-shadow: 0 15px 30px -10px rgba(79, 70, 229, 0.4);
        }
        #exit-modal { display: none; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="exit-modal" class="fixed inset-0 z-[2000] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <h3 class="text-xl font-900 text-slate-800 mb-2">هل تريد الخروج؟</h3>
            <p class="text-slate-500 mb-6 font-bold">سيتم فقدان تقدمك في الاختبار</p>
            <div class="flex gap-3 mt-6">
                <a href="grade4.html" class="flex-1 py-3 bg-red-50 text-red-600 rounded-2xl font-bold text-center">خروج</a>
                <button onclick="toggleExitModal(false)" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-bold">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="quiz-wrapper" class="max-w-3xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <button onclick="toggleExitModal(true)" class="p-3 bg-white rounded-2xl shadow-sm text-slate-500 hover:text-red-500 border border-slate-100">
                <i class="fas fa-sign-out-alt rotate-180"></i>
            </button>
            <div class="bg-white px-6 py-2 rounded-2xl shadow-sm border border-slate-100 font-900 text-indigo-600">
                <span id="q-count">1</span> / 15
            </div>
            <div class="p-3 bg-indigo-50 rounded-2xl text-indigo-500">
                <i class="fas fa-briefcase"></i>
            </div>
        </div>

        <div class="h-3 bg-slate-200 rounded-full mb-12 overflow-hidden">
            <div id="progress-bar" class="progress-glow" style="width: 0%;"></div>
        </div>

        <div class="glass-card p-8 md:p-12 mb-10 relative">
            <h2 id="main-question" class="text-2xl md:text-3xl font-900 text-slate-800 leading-snug text-center mb-12"></h2>
            <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
        </div>

        <button onclick="goToNext()" class="btn-confirm w-full py-6 rounded-3xl text-white font-900 text-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
            <span>تأكيد الإجابة</span>
            <i class="fas fa-chevron-left"></i>
        </button>
    </div>

    <div id="result-view" class="hidden max-w-xl mx-auto text-center pt-10">
        <div class="glass-card p-12 shadow-2xl bg-white mb-6">
            <div class="text-7xl mb-6">🎯</div>
            <h1 class="text-4xl font-900 text-slate-800 mb-2">نتيجة الاختبار</h1>
            <p class="text-slate-500 font-bold mb-8">المهن في بلدنا - الصف الرابع</p>
            <div class="relative inline-block mb-10">
                <svg class="w-40 h-40 transform -rotate-90">
                    <circle cx="80" cy="80" r="70" stroke="#f1f5f9" stroke-width="12" fill="transparent" />
                    <circle id="score-circle" cx="80" cy="80" r="70" stroke="#10b981" stroke-width="12" fill="transparent" stroke-dasharray="440" stroke-dashoffset="440" class="transition-all duration-1000" />
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <span class="font-900 text-4xl text-slate-800" id="score-text">0%</span>
                </div>
            </div>
            <div id="result-msg" class="text-xl font-bold text-indigo-600"></div>
        </div>

        <div class="flex flex-col gap-4">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="location.reload()" class="py-4 bg-emerald-100 text-emerald-700 rounded-2xl font-bold shadow-lg hover:bg-emerald-200 transition">إعادة</button>
                <a href="grade4.html" class="py-4 bg-slate-800 text-white rounded-2xl font-bold shadow-lg flex items-center justify-center hover:bg-slate-700 transition">الرئيسية</a>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "تعتبر الزراعة من الركائز الأساسية لبلدنا لأنها توفر لنا:", a: ["الملابس", "الغذاء", "الأجهزة الإلكترونية", "الألعاب"], c: 1 },
            { q: "يعمل الصيادون في صيد الأسماك من البحرين الأحمر والمتوسط ونهر النيل و....", a: ["الصحراء", "الترع والمزارع السمكية", "المصانع", "الغابات"], c: 1 },
            { q: "من المهن المرتبطة بالصناعة والتجارة الذين يحولون المواد الخام لمنتجات:", a: ["المعلمون", "الأطباء", "المهندسون والعمال", "الفلاحون"], c: 2 },
            { q: "يقوم 'التجار' بعرض المنتجات في الأسواق والمحلات لكي نتمكن من:", a: ["زراعتها", "شرائها بسهولة", "تصنيعها", "إهمالها"], c: 1 },
            { q: "أي من الشخصيات التالية يعتبر من أصحاب 'المهن الخدمية'؟", a: ["الفلاح", "عامل النظافة", "الصياد", "الحداد"], c: 1 },
            { q: "الشخص الذي يدافع عن الوطن ويحميه هو:", a: ["الطبيب", "المعلم", "ضابط الجيش", "السباك"], c: 2 },
            { q: "يقوم 'عامل التوصيل' بمهنة هامة وهي:", a: ["بناء المنازل", "توصيل السلع للمواطنين", "علاج المرضى", "تنظيف الشوارع"], c: 1 },
            { q: "ظهرت مهن جديدة لم تكن موجودة من قبل بسبب:", a: ["قلة السكان", "التقدم العلمي والتكنولوجي", "إلغاء المدارس", "نقص المياه"], c: 1 },
            { q: "من أمثلة مهن المستقبل التي ظهرت مؤخراً:", a: ["الفلاح", "خبير الذكاء الاصطناعي", "النجار", "السباك"], c: 1 },
            { q: "الشخص الذي يبتكر ألعاباً إلكترونية جديدة يسمى:", a: ["مبرمج حاسوب", "مصمم ألعاب", "صانع محتوى", "مطور تطبيقات"], c: 1 },
            { q: "يعمل 'مهندس الطاقة المتجددة' على إنتاج طاقة نظيفة لحماية:", a: ["المصانع من التوقف", "البيئة من التلوث", "السفن من الغرق", "الأسماك من الصيد"], c: 1 },
            { q: "من المهارات التي تحتاجها مهن المستقبل:", a: ["الكسل", "التفكير الإبداعي والعمل الجماعي", "الانعزال", "إهمال التكنولوجيا"], c: 1 },
            { q: "وضع العلماء المسلمون أسساً علمية يستفيد منها العالم حتى اليوم مثل:", a: ["ابن الهيثم والخوارزمي", "نيوتن", "أديسون", "أينشتاين"], c: 0 },
            { q: "يساعد مبرمج الحاسوب في تصميم:", a: ["المباني", "البرامج الإلكترونية", "الملابس", "السيارات"], c: 1 },
            { q: "يجب علينا تجاه أصحاب كل المهن:", a: ["تجاهلهم", "السخرية منهم", "احترامهم وتقدير جهودهم", "عدم التعامل معهم"], c: 2 }
        ];

        let index = 0, score = 0, picked = null;

        window.onload = () => { render(); };

        function toggleExitModal(show) { document.getElementById('exit-modal').style.display = show ? 'flex' : 'none'; }

        function render() {
            picked = null;
            const q = questions[index];
            document.getElementById('main-question').innerText = q.q;
            document.getElementById('q-count').innerText = index + 1;
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            q.a.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = 'option-box p-6 rounded-2xl flex items-center gap-4 group';
                btn.innerHTML = `<div class="opt-prefix">${String.fromCharCode(65 + i)}</div><span class="text-lg font-bold">${opt}</span>`;
                btn.onclick = () => {
                    document.querySelectorAll('.option-box').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    picked = i;
                };
                grid.appendChild(btn);
            });
            document.getElementById('progress-bar').style.width = ((index / questions.length) * 100) + '%';
        }

        function goToNext() {
            if (picked === null) return Swal.fire({text:'اختر إجابة أولاً يا بطل!', icon:'warning', confirmButtonColor: '#4f46e5'});
            if (picked === questions[index].c) score++;
            index++;
            if (index < questions.length) render(); else finish();
        }

        function finish() {
            document.getElementById('quiz-wrapper').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            const pct = Math.round((score / questions.length) * 100);
            document.getElementById('score-text').innerText = pct + '%';
            document.getElementById('score-circle').style.strokeDashoffset = 440 - (440 * pct) / 100;
            
            let msg = pct >= 50 ? "أحسنت يا بطل! استمر في التقدم" : "حاول مرة أخرى، أنت تستطيع!";
            document.getElementById('result-msg').innerText = msg;
        }
    </script>
</body>
</html>
