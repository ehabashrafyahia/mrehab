<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار خطوط الطول ودوائر العرض | مراجعة ذاتية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
            user-select: none;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(14, 165, 233, 0.1);
            border-radius: 2rem;
        }
        .option-box {
            background: white; border: 2px solid #e2e8f0;
            transition: all 0.3s ease; text-align: right; cursor: pointer;
        }
        .option-box:hover { border-color: #0ea5e9; transform: scale(1.02); }
        .option-box.selected {
            background: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%);
            border-color: transparent; color: white;
        }
        .opt-prefix {
            background: #f1f5f9; width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; font-weight: 900; color: #64748b;
        }
        .option-box.selected .opt-prefix { background: rgba(255, 255, 255, 0.2); color: white; }
        .progress-glow {
            height: 100%; background: linear-gradient(90deg, #0ea5e9, #22c55e);
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.4); border-radius: 100px;
            transition: width 0.6s ease;
        }
        .btn-confirm {
            background: linear-gradient(135deg, #0284c7 0%, #075985 100%);
            box-shadow: 0 15px 30px -10px rgba(2, 132, 199, 0.4);
        }
        #exit-modal { display: none; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="exit-modal" class="fixed inset-0 z-[2000] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <h3 class="text-xl font-900 text-slate-800 mb-2">هل تريد الخروج؟</h3>
            <div class="flex gap-3 mt-6">
                <a href="grade5.html" class="flex-1 py-3 bg-red-50 text-red-600 rounded-2xl font-bold text-center">خروج</a>
                <button onclick="toggleExitModal(false)" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-bold">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="quiz-wrapper" class="max-w-3xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <button onclick="toggleExitModal(true)" class="flex items-center gap-2 p-3 bg-white rounded-2xl shadow-sm text-slate-500 border border-slate-100 transition-colors hover:text-red-500">
                <i class="fas fa-sign-out-alt rotate-180"></i>
                <span class="font-bold text-sm text-slate-800">خروج</span>
            </button>
            <div class="bg-white px-6 py-2 rounded-2xl shadow-sm border border-slate-100 font-900 text-sky-600">
                <span id="q-count">1</span> / 15
            </div>
            <div class="p-3 bg-sky-50 rounded-2xl text-sky-500"><i class="fas fa-globe-americas"></i></div>
        </div>

        <div class="h-3 bg-slate-200 rounded-full mb-12 overflow-hidden">
            <div id="progress-bar" class="progress-glow" style="width: 0%;"></div>
        </div>

        <div class="glass-card p-8 md:p-12 mb-10">
            <h2 id="main-question" class="text-2xl md:text-3xl font-900 text-slate-800 leading-snug text-center mb-12">جاري التحميل...</h2>
            <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
        </div>

        <button onclick="goToNext()" class="btn-confirm w-full py-6 rounded-3xl text-white font-900 text-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
            <span>تأكيد الإجابة</span>
            <i class="fas fa-chevron-left"></i>
        </button>
    </div>

    <div id="result-view" class="hidden max-w-xl mx-auto text-center pt-10">
        <div class="glass-card p-12 bg-white mb-6 border-2 border-sky-100">
            <div class="text-7xl mb-6">🎯</div>
            <h1 class="text-4xl font-900 text-slate-800 mb-2">أداء مذهل!</h1>
            <p class="text-slate-500 font-bold mb-8">اختبار خطوط الطول ودوائر العرض</p>
            
            <div class="relative inline-block mb-10">
                <svg class="w-40 h-40 transform -rotate-90">
                    <circle cx="80" cy="80" r="70" stroke="#f1f5f9" stroke-width="12" fill="transparent" />
                    <circle id="score-circle" cx="80" cy="80" r="70" stroke="#0ea5e9" stroke-width="12" fill="transparent" stroke-dasharray="440" stroke-dashoffset="440" class="transition-all duration-1000" />
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <span class="font-900 text-4xl text-slate-800" id="score-text">0%</span>
                </div>
            </div>
            <div id="result-msg" class="text-xl font-black text-sky-600"></div>
        </div>

        <div class="flex flex-col gap-4">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="location.reload()" class="py-4 bg-sky-100 text-sky-700 rounded-2xl font-bold hover:bg-sky-200 transition">إعادة</button>
                <a href="grade7.html" class="py-4 bg-slate-800 text-white rounded-2xl font-bold flex items-center justify-center hover:bg-slate-700 transition">الرئيسية</a>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "يُقصد بـ 'الموقع الفلكي' موقع المكان بالنسبة لـ:", a: ["اليابس والماء", "القارات المجاورة", "خطوط الطول ودوائر العرض", "الجبال والهضاب"], c: 2 },
            { q: "أي من الدوائر التالية تقسم الأرض إلى منطقة حرارية 'حارة' حولها؟", a: ["مدار السرطان", "دائرة الاستواء", "الدائرة القطبية الشمالية", "مدار الجدي"], c: 1 },
            { q: "كلما 'ابتعدنا' عن دائرة الاستواء شمالاً أو جنوباً، فإن درجات الحرارة:", a: ["ترتفع", "تنخفض", "تبقى ثابتة", "تصل لدرجة الغليان"], c: 1 },
            { q: "المنطقة الحرارية التي تقع بين 'المدارين والدائرتين القطبيتين' تُسمى:", a: ["المنطقة الحارة", "المنطقة المعتدلة", "المنطقة الباردة", "المنطقة الاستوائية"], c: 1 },
            { q: "توجد 'المنطقة الباردة' في نصف الكرة الأرضية الشمالي حول:", a: ["مدار السرطان", "القطب الشمالي", "خط جرينتش", "دائرة الاستواء"], c: 1 },
            { q: "يُعد خط الطول الرئيسي الذي درجته (صفر) هو:", a: ["خط الاستواء", "خط جرينتش", "مدار الجدي", "مدار السرطان"], c: 1 },
            { q: "الفرق الزمني بين كل خط طول والخط الذي يليه هو:", a: ["15 دقيقة", "ساعة واحدة", "4 دقائق", "10 دقائق"], c: 2 },
            { q: "عندما نتجه 'شرقاً' فإننا نقوم بـ ........ في الوقت:", a: ["التأخير", "التقديم", "التثبيت", "التنصيف"], c: 1 },
            { q: "كل 15 خط طول تمثل فرقاً زمنياً قدره:", a: ["30 دقيقة", "ساعة واحدة", "ساعتان", "4 دقائق"], c: 1 },
            { q: "تُعرف المنطقة التي تتشابه في خصائصها المناخية على سطح الأرض بـ:", a: ["الموقع الجغرافي", "المنطقة الحرارية", "التوقيت المحلي", "الخط الدولي"], c: 1 },
            { q: "سمي 'خط جرينتش' بهذا الاسم نسبة إلى بلدة جرينتش التي تقع بالقرب من مدينة:", a: ["باريس", "واشنطن", "لندن", "القاهرة"], c: 2 },
            { q: "إذا كانت الساعة في القاهرة 6 مساءً، والساعة في المكسيك 10 صباحاً، فهذا يعني أن المكسيك تقع:", a: ["شرق القاهرة", "غرب القاهرة", "على نفس خط طول القاهرة", "عند القطب الشمالي"], c: 1 },
            { q: "تؤثر 'دوائر العرض' بشكل أساسي في دراسة:", a: ["الزمن وفروق التوقيت", "المناخ ودرجات الحرارة", "طول وعرض القارات", "حركة المد والجزر"], c: 1 },
            { q: "المنطقة التي تقع حول القطبين وتغطيها الثلوج تُصنف ضمن:", a: ["المناطق الحارة", "المناطق المعتدلة", "المناطق الباردة", "المناطق المدارية"], c: 2 },
            { q: "المرجع الأساسي لحساب فروق التوقيت بين مدن العالم هو:", a: ["دائرة الاستواء", "خط جرينتش", "مدار السرطان", "الدائرة القطبية"], c: 1 }
        ];

        let index = 0, score = 0, picked = null;

        window.onload = () => { render(); };

        function render() {
            picked = null;
            const q = questions[index];
            document.getElementById('main-question').innerText = q.q;
            document.getElementById('q-count').innerText = index + 1;
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            q.a.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = 'option-box p-6 rounded-2xl flex items-center gap-4';
                btn.innerHTML = `<div class="opt-prefix">${String.fromCharCode(65 + i)}</div><span class="text-lg font-bold">${opt}</span>`;
                btn.onclick = () => {
                    document.querySelectorAll('.option-box').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    picked = i;
                };
                grid.appendChild(btn);
            });
            document.getElementById('progress-bar').style.width = ((index / questions.length) * 100) + '%';
        }

        function goToNext() {
            if (picked === null) return Swal.fire({text:'اختر إجابة أولاً!', icon:'warning', confirmButtonColor: '#0ea5e9'});
            if (picked === questions[index].c) score++;
            index++;
            if (index < questions.length) render(); else finish();
        }

        function finish() {
            document.getElementById('quiz-wrapper').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            const pct = Math.round((score / questions.length) * 100);
            document.getElementById('score-text').innerText = pct + '%';
            document.getElementById('score-circle').style.strokeDashoffset = 440 - (440 * pct) / 100;
            document.getElementById('result-msg').innerText = pct >= 50 ? "أحسنت يا بطل!" : "راجع دروسك جيداً!";
        }

        function toggleExitModal(s) { document.getElementById('exit-modal').style.display = s?'flex':'none'; }
    </script>
</body>
</html>
