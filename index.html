<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنصة في إجازة | أطلس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

        /* تأثير البلور */
        .blur-content {
            filter: blur(5px);
            pointer-events: none;
            user-select: none;
        }

        /* ستايل كارت العودة قريباً */
        .coming-soon-card {
            position: fixed;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid #e2e8f0;
            padding: 3rem;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        .gradient-text {
            background: linear-gradient(135deg, #3b82f6 0%, #1e3a8a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="p-6">

    <!-- الكارت الخاص بـ نعود قريباً -->
    <div class="coming-soon-card">
        <i class="fas fa-rocket text-5xl gradient-text mb-6"></i>
        <h1 class="text-4xl font-black text-slate-800 mb-2">نعود قريباً!</h1>
        <p class="text-slate-500 font-bold mb-6">انتهى عام دراسي حافل، جاري الاستعداد لرحلة جديدة من النجاح.</p>
        <div class="w-full h-1 bg-slate-100 rounded-full overflow-hidden">
            <div class="h-full bg-blue-700 w-1/3 animate-pulse"></div>
        </div>
        <p class="text-[10px] text-slate-400 mt-4 uppercase tracking-[0.2em]">إجازة سعيدة يا أبطال</p>
    </div>

    <!-- محتوى الصفحة الأصلي (مغطي بالبلور) -->
    <div class="blur-content">
        <!-- الكود السابق الخاص بتسجيل الدخول موجود هنا في الخلفية -->
        <div class="bg-white w-full max-w-sm p-10 rounded-[45px] shadow-2xl text-center">
            <h2 class="text-2xl font-black text-slate-800">المنصة</h2>
        </div>
    </div>

</body>
</html>
