<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قريبًا | مناهج العام الدراسي الجديد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            overflow-x: hidden; /* الحل الأساسي لمنع السكرول الأفقي */
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Cairo', sans-serif;
            overflow-y: hidden; /* منع السكرول الرأسي */
            background: radial-gradient(circle at top, #d1fae5 0%, #f8fafc 45%, #ffffff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            width: 700px;
            height: 700px;
            background: #10b98115;
            filter: blur(80px);
            border-radius: 50%;
            animation: move 10s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes move {
            from { transform: translate(-150px, -100px); }
            to { transform: translate(180px, 120px); }
        }

        .card {
            width: 90%;
            max-width: 500px;
            max-height: 95vh;
            padding: 25px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(18px);
            border-radius: 35px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            text-align: center;
            z-index: 2;
            overflow-y: auto;
        }

        .logo { width: 120px; height: 100px; margin: auto; position: relative; display: flex; justify-content: center; align-items: center; }
        .logoShape { position: absolute; width: 100%; height: 100%; background: linear-gradient(135deg, #10b981, #059669); border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; animation: morph 6s linear infinite; }
        @keyframes morph { 0%, 100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; } 50% { border-radius: 55% 45% 34% 66% / 43% 58% 42% 57%; } }
        .logoText { position: relative; z-index: 5; font-family: 'Reem Kufi'; font-size: 38px; font-weight: bold; color: #fff; }

        h1 { font-size: 26px; font-weight: 900; color: #0f172a; margin-top: 10px; }
        .subtitle { margin-top: 5px; font-size: 16px; font-weight: 700; color: #10b981; }
        .desc { margin-top: 10px; line-height: 1.6; font-size: 14px; color: #64748b; }
        
        .progress { margin: 20px auto; width: 200px; height: 6px; background: #e2e8f0; border-radius: 20px; overflow: hidden; }
        .fill { width: 0%; height: 100%; background: linear-gradient(to right, #10b981, #22c55e); border-radius: 20px; }

        .features { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 20px; }
        .box { background: #fff; padding: 12px; border-radius: 15px; font-weight: 800; font-size: 13px; color: #0f172a; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        .footer { margin-top: 20px; font-size: 13px; font-weight: 900; color: #334155; }
        .phone { margin-top: 5px; color: #10b981; font-weight: 900; text-decoration: none; display: block; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo" id="logo">
        <div class="logoShape"></div>
        <div class="logoText">أطلس</div>
    </div>

    <h1 id="title">قريبًا...</h1>
    <div class="subtitle" id="sub">مناهج العام الدراسي الجديد</div>
    <div class="desc" id="desc">
        استعد لتجربة تعليمية مختلفة مع منصة أطلس. شرح احترافي، اختبارات ذكية، ومحتوى جديد بالكامل.
    </div>

    <div class="progress">
        <div class="fill"></div>
    </div>

    <div class="features">
        <div class="box">📚 شرح مبسط</div>
        <div class="box">🎥 فيديوهات عالية الجودة</div>
        <div class="box">📝 اختبارات تفاعلية</div>
        <div class="box">🏆 متابعة مستمرة</div>
    </div>

    <div class="footer">
        أ. إيهاب أشرف<br>
        مدرس الدراسات الاجتماعية
        <a href="https://wa.me/201559116736" class="phone">📱 01559116736</a>
    </div>
</div>

<script>
    anime({ targets: "#logo", scale: [0.5, 1], opacity: [0, 1], rotate: ["-25deg", "0deg"], duration: 1500, easing: "easeOutElastic(1,.6)" });
    anime({ targets: ["#title", "#sub", "#desc"], translateY: [20, 0], opacity: [0, 1], delay: anime.stagger(150, { start: 500 }), duration: 800, easing: "easeOutExpo" });
    anime({ targets: ".box", translateY: [30, 0], opacity: [0, 1], delay: anime.stagger(100, { start: 1000 }), duration: 600, easing: "easeOutBack" });
    anime({ targets: ".fill", width: ["0%", "100%"], duration: 3000, easing: "easeInOutQuart", loop: true, direction: "alternate" });
</script>

</body>
</html>
