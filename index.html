<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة شرف الدراسات الاجتماعية | منصة أطلس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f172a; min-height: 100vh; }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gold-gradient { background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); }
        .geo-gradient { background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto">
        <!-- العنوان -->
        <div class="text-center mb-12">
            <div class="inline-block p-3 rounded-2xl bg-slate-800 mb-4">
                <i class="fas fa-globe-africa text-3xl text-blue-400"></i>
            </div>
            <h1 class="text-3xl md:text-5xl font-black text-white mb-4">أوائل الدراسات الاجتماعية</h1>
            <p class="text-slate-400 font-bold text-lg">نخبة منصة أطلس المتميزين في رحلة البحث والمعرفة</p>
        </div>

        <!-- قائمة الأوائل -->
        <div class="grid gap-6">
            
            <!-- طالب 1 -->
            <div class="glass-card p-6 rounded-3xl flex items-center justify-between transition-transform hover:scale-[1.02]">
                <div class="flex items-center gap-6">
                    <div class="gold-gradient w-16 h-16 rounded-2xl flex items-center justify-center text-white text-2xl shadow-lg">
                        <i class="fas fa-crown"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-black text-white">نوران عاطف</h2>
                        <p class="text-blue-400 font-bold">الصف الأول الإعدادي</p>
                    </div>
                </div>
                <div class="text-center">
                    <span class="block text-2xl font-black text-white">40/40</span>
                    <span class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">المركز الأول</span>
                </div>
            </div>

            <!-- طالب 2 -->
            <div class="glass-card p-6 rounded-3xl flex items-center justify-between transition-transform hover:scale-[1.02]">
                <div class="flex items-center gap-6">
                    <div class="gold-gradient w-16 h-16 rounded-2xl flex items-center justify-center text-white text-2xl shadow-lg">
                        <i class="fas fa-crown"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-black text-white">ندي فتحي</h2>
                        <p class="text-blue-400 font-bold">الصف الأول الإعدادي</p>
                    </div>
                </div>
                <div class="text-center">
                    <span class="block text-2xl font-black text-white">40/40</span>
                    <span class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">المركز الأول</span>
                </div>
            </div>

            <!-- طالب 3 -->
            <div class="glass-card p-6 rounded-3xl flex items-center justify-between transition-transform hover:scale-[1.02]">
                <div class="flex items-center gap-6">
                    <div class="geo-gradient w-16 h-16 rounded-2xl flex items-center justify-center text-white text-2xl shadow-lg">
                        <i class="fas fa-medal"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-black text-white">جني محي</h2>
                        <p class="text-blue-400 font-bold">الصف الثاني الإعدادي</p>
                    </div>
                </div>
                <div class="text-center">
                    <span class="block text-2xl font-black text-white">39.80</span>
                    <span class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">المركز الأول</span>
                </div>
            </div>

        </div>

        <div class="mt-12 text-center">
            <p class="text-slate-500 font-bold">تقدير وشكر من أ. إيهاب أشرف - معلم الدراسات الاجتماعية</p>
        </div>
    </div>

</body>
</html>
