<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول المنصة | مستر إيهاب أشرف</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; overflow: hidden; }
        .logo-container { position: relative; width: 150px; height: 120px; margin: 0 auto 25px; display: flex; align-items: center; justify-content: center; }
        .logo-shape { position: absolute; width: 100%; height: 100%; background: linear-gradient(135deg, #10b981 0%, #059669 100%); border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; animation: morph 6s linear infinite; box-shadow: 0 15px 30px rgba(16, 185, 129, 0.2); }
        .logo-text { position: relative; z-index: 10; color: white; font-family: 'Reem Kufi', sans-serif; font-size: 2.8rem; font-weight: 700; }
        @keyframes morph { 0%, 100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; } 50% { border-radius: 50% 50% 33% 67% / 55% 27% 73% 45%; } }
        .login-input { width: 100%; padding: 16px; background: #f1f5f9; border: 2px solid transparent; border-radius: 18px; outline: none; transition: 0.3s; text-align: center; font-weight: 700; }
        .login-input:focus { border-color: #10b981; background: white; box-shadow: 0 10px 20px rgba(0,0,0,0.03); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="bg-white w-full max-w-sm p-10 rounded-[45px] shadow-2xl text-center border border-slate-50">
        <div class="logo-container">
            <div class="logo-shape"></div>
            <div class="logo-text">اطلس</div>
        </div>
        <h2 class="text-2xl font-black text-slate-800 mb-2">مرحباً بك يا بطل</h2>
        <p class="text-slate-400 text-xs font-bold mb-8">يرجى تسجيل الدخول للبدء</p>

        <div class="space-y-4">
            <div class="relative">
                <input type="text" id="user" class="login-input" placeholder="اسم المستخدم" autocomplete="off">
                <i class="fas fa-user absolute right-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
            </div>
            <div class="relative">
                <input type="password" id="pass" class="login-input" placeholder="كلمة المرور">
                <i class="fas fa-lock absolute right-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
            </div>
            <button onclick="handleLogin()" class="w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-white rounded-2xl font-black shadow-lg shadow-emerald-100 transition-all transform active:scale-95">
                دخول المنصة <i class="fas fa-sign-in-alt mr-2"></i>
            </button>
        </div>

        <div class="mt-10 pt-6 border-t border-slate-100">
            <p class="text-[11px] text-slate-500 font-bold mb-1">إعداد وتصميم: أ. إيهاب أشرف</p>
            <a href="https://wa.me/201559116736" class="text-[10px] text-emerald-500 font-black"><i class="fab fa-whatsapp"></i> 01559116736</a>
        </div>
    </div>

    <script>
        // قاعدة بيانات نظيفة تماماً
        const db = {
            "ehab_admin": "boss2026",
            "amal_arafa": "am20x7",
            "mariam_ahmed": "mr33k9",
            "nada_fathi": "nd55v1",
            "nouran_atef": "nr88z4",
            "jana_mahmoud": "jn11m8",
            "jana_mohamed": "jn44h2",
            "hossam_hassan": "hs77s3",
            "mostafa_reda": "ms99r6",
            "noura_omar": "no22m5"
        };

        function handleLogin() {
            // جلب القيم وتحويلها لسمول وحذف المسافات من الأطراف
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value.toLowerCase().trim();

            console.log("Login Attempt:", u, p); // للتأكد في المتصفح

            if (db[u] && db[u] === p) {
                localStorage.setItem("atlas_auth", "true");
                
                if (u === "ehab_admin") {
                    localStorage.setItem("role", "admin");
                    Swal.fire({ icon: 'success', title: 'مرحباً مستر إيهاب', text: 'جاري فتح لوحة التحكم...', timer: 1500, showConfirmButton: false });
                    setTimeout(() => { window.location.href = "dashboard.html"; }, 1500);
                } else {
                    localStorage.setItem("role", "student");
                    localStorage.setItem("student_identity", u);
                    Swal.fire({ icon: 'success', title: 'تم الدخول', text: 'أهلاً بك يا بطل', timer: 1500, showConfirmButton: false });
                    setTimeout(() => { window.location.href = "home.html"; }, 1500);
                }
            } else {
                Swal.fire({ icon: 'error', title: 'عذراً!', text: 'اسم المستخدم أو الباسورد خطأ', confirmButtonColor: '#10b981' });
            }
        }

        window.onload = function() {
            if(localStorage.getItem("atlas_auth") === "true") {
                const role = localStorage.getItem("role");
                window.location.href = (role === "admin") ? "dashboard.html" : "home.html";
            }
        }
    </script>
</body>
</html>
