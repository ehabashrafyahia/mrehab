<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنصة في إجازة | أطلس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

        /* تأثير البلور */
        .blur-content {
            filter: blur(5px);
            pointer-events: none;
            user-select: none;
        }

        /* أنيميشن حركة الظهور عند الفتح */
        @keyframes customPopIn {
            0% {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* ستايل كارت العودة قريباً */
        .coming-soon-card {
            position: fixed;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid #e2e8f0;
            padding: 5rem 3rem; 
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            
            /* تفعيل حركة الظهور */
            animation: customPopIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            
            /* تحديد عرض أقصى وطول مناسب للكارت */
            width: 90%;
            max-w-md; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .gradient-text {
            background: linear-gradient(135deg, #3b82f6 0%, #1e3a8a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="p-6">

    <!-- الكارت الخاص بـ نعود قريباً -->
    <div class="coming-soon-card">
        <i class="fas fa-rocket text-6xl gradient-text mb-8 animate-bounce"></i>
        <h1 class="text-4xl font-black text-slate-800 mb-4">نعود قريباً!</h1>
        <p class="text-slate-500 font-bold mb-8 leading-relaxed">انتهى عام دراسي حافل، جاري الاستعداد لرحلة جديدة من النجاح.</p>
        
        <!-- شريط التقدم -->
        <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden mb-6">
            <div class="h-full bg-blue-700 w-1/3 animate-pulse"></div>
        </div>

        <!-- قسم بيانات التواصل المضاف -->
        <div class="mt-2 text-center bg-slate-50 px-6 py-4 rounded-2xl border border-slate-100 w-full">
            <h3 class="text-lg font-black text-slate-700 mb-1">أ. إيهاب أشرف</h3>
            <a href="https://wa.me/201559116736" target="_blank" class="flex items-center justify-center gap-2 text-emerald-600 font-bold hover:text-emerald-700 transition-colors">
                <i class="fab fa-whatsapp text-xl"></i>
                <span dir="ltr">01559116736</span>
            </a>
        </div>
        
        <p class="text-[11px] text-slate-400 mt-6 uppercase tracking-[0.2em] font-bold">إجازة سعيدة يا أبطال</p>
    </div>

    <!-- محتوى الصفحة الأصلي (مغطي بالبلور) -->
    <div class="blur-content">
        <div class="bg-white w-full max-w-sm p-10 rounded-[45px] shadow-2xl text-center">
            <h2 class="text-2xl font-black text-slate-800">المنصة</h2>
        </div>
    </div>

</body>
</html>
