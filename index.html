<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | منصة أطلس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; }
        .login-card { border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .logo-shape {
            width: 100px; height: 85px; background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center; color: white; font-size: 1.8rem; font-weight: 900;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="login-card bg-white w-full max-w-sm p-8 text-center">
        <div class="logo-shape">أطلس</div>
        <h2 class="text-2xl font-black text-slate-800 mb-2">مرحباً بك</h2>
        <p class="text-slate-400 text-sm mb-8 font-bold">سجل دخولك للمتابعة</p>

        <div class="text-right mb-4">
            <label class="block text-sm font-bold text-slate-600 mb-2 mr-2">اسم المستخدم</label>
            <input type="text" id="user" class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-emerald-500 rounded-2xl outline-none transition-all text-center font-bold" placeholder="أدخل اسمك">
        </div>

        <div class="text-right mb-6">
            <label class="block text-sm font-bold text-slate-600 mb-2 mr-2">كلمة المرور</label>
            <input type="password" id="pass" class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-emerald-500 rounded-2xl outline-none transition-all text-center font-bold" placeholder="••••">
        </div>

        <button onclick="checkLogin()" class="w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-white rounded-2xl font-black shadow-lg shadow-emerald-200 transition-all">دخول المنصة</button>
        
        <p class="mt-8 text-[10px] text-slate-400 font-bold">إعداد: أ. إيهاب أشرف | 01559116736</p>
    </div>

    <script>
        function checkLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            // بيانات الدخول (يمكنك تغييرها)
            if(u === "ehab" && p === "1234") {
                localStorage.setItem("atlas_logged", "true"); // حفظ حالة الدخول
                Swal.fire({ icon: 'success', title: 'أهلاً بك يا بطل!', showConfirmButton: false, timer: 1000 });
                setTimeout(() => { window.location.href = "home.html"; }, 1000);
            } else {
                Swal.fire({ icon: 'error', title: 'خطأ!', text: 'البيانات غير صحيحة، راجع المستر' });
            }
        }
    </script>
</body>
</html>
