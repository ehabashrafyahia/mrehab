<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kahoot Lite</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap');

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #46178f;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header h1 {
            color: white;
            font-size: 1.4rem; /* تصغير العنوان */
            margin: 0 0 15px 0;
            text-align: center;
        }

        .leaderboard {
            width: 100%;
            max-width: 320px; /* تصغير عرض القائمة */
            display: flex;
            flex-direction: column;
            gap: 8px; /* تقليل المسافات */
        }

        .player-card {
            background: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            padding: 8px 12px; /* تقليل الحشو الداخلي */
            box-shadow: 0 4px 0px rgba(0,0,0,0.15);
            position: relative;
        }

        .rank {
            width: 28px; /* تصغير حجم الدائرة */
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: white;
            margin-left: 10px;
            font-size: 0.9rem;
        }

        .rank-1 { background: #ffa602; }
        .rank-2 { background: #d7d7d7; color: #555; }
        .rank-other { background: #0542b9; }

        .name {
            flex-grow: 1;
            font-size: 0.95rem; /* تصغير الخط */
            color: #333;
            font-weight: 700;
        }

        .score-pill {
            background-color: #333;
            color: white;
            padding: 2px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
            font-weight: 800;
        }

        /* ستايل جني محمد المميز */
        .missing {
            background-color: #fff0f0;
            border: 2px dashed #eb001b;
        }
        .missing .rank { background: #eb001b; }
        .missing .name { color: #eb001b; }

    </style>
</head>
<body>

    <div class="header">
        <h1>🏆 النتائج النهائية</h1>
    </div>

    <div class="leaderboard">
        
        <div class="player-card">
            <div class="rank rank-1">1</div>
            <div class="name">نوران عاطف</div>
            <div class="score-pill" style="background: #108510;">30/30</div>
        </div>

        <div class="player-card">
            <div class="rank rank-1">1</div>
            <div class="name">ندي فتحي</div>
            <div class="score-pill" style="background: #108510;">30/30</div>
        </div>

        <div class="player-card">
            <div class="rank rank-2">2</div>
            <div class="name">أمل عرفه</div>
            <div class="score-pill" style="background: #0542b9;">29.5</div>
        </div>

        <div class="player-card">
            <div class="rank rank-other">3</div>
            <div class="name">مصطفي رضا</div>
            <div class="score-pill">28</div>
        </div>

        <div class="player-card">
            <div class="rank rank-other">4</div>
            <div class="name">جني محمود</div>
            <div class="score-pill">28</div>
        </div>

        <div class="player-card">
            <div class="rank rank-other">5</div>
            <div class="name">حسام حسن</div>
            <div class="score-pill">24</div>
        </div>

        <div class="player-card">
            <div class="rank rank-other">6</div>
            <div class="name">محمود محمد</div>
            <div class="score-pill">21</div>
        </div>

        <div class="player-card missing">
            <div class="rank">✘</div>
            <div class="name">جني محمد</div>
            <div class="score-pill" style="background: #eb001b;">--</div>
        </div>

    </div>

</body>
</html>
