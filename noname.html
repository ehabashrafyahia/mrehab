<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kahoot Challenge Results</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap');

        :root {
            --purple: #46178f;
            --blue: #0542b9;
            --green: #108510;
            --red: #eb001b;
            --yellow: #ffa602;
            --white: #ffffff;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--purple);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            color: var(--white);
            text-align: center;
            margin-bottom: 25px;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
        }

        .header h1 { font-size: 2rem; margin: 0; }
        .header p { opacity: 0.9; font-weight: 400; }

        .leaderboard {
            width: 100%;
            max-width: 400px; /* مقاس الموبايل */
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .player-card {
            background: var(--white);
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 12px 16px;
            box-shadow: 0 6px 0px rgba(0,0,0,0.15);
            transition: transform 0.1s;
            position: relative;
            overflow: hidden;
        }

        .player-card:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0px rgba(0,0,0,0.15);
        }

        /* ترتيب المراكز */
        .rank {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: white;
            margin-left: 15px;
            font-size: 1.1rem;
        }

        .rank-1 { background-color: var(--yellow); }
        .rank-2 { background-color: #d7d7d7; color: #555; }
        .rank-3 { background-color: #cd7f32; }
        .rank-other { background-color: var(--blue); }

        .name {
            flex-grow: 1;
            font-size: 1.1rem;
            color: #333;
            font-weight: 700;
        }

        .score-pill {
            background-color: #333;
            color: white;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 900;
        }

        /* كرت الدرجة المفقودة (ستايل كاهوت الخاسر) */
        .missing {
            background-color: #f2f2f2;
            border: 3px dashed var(--red);
        }
        .missing .name { color: var(--red); }
        .missing .rank { background-color: var(--red); }

        /* أيقونات كاهوت الجانبية */
        .shape {
            position: absolute;
            left: -10px;
            opacity: 0.1;
            width: 50px;
        }

    </style>
</head>
<body>

    <div class="header">
        <h1>اللوحة النهائية 🏆</h1>
        <p>تحدي الـ 30 درجة</p>
    </div>

    <div class="leaderboard">
        
        <div class="player-card">
            <div class="rank rank-1">1</div>
            <div class="name">نوران عاطف</div>
            <div class="score-pill" style="background-color: var(--green);">30 / 30</div>
        </div>

        <div class="player-card">
            <div class="rank rank-1">1</div>
            <div class="name">ندي فتحي</div>
            <div class="score-pill" style="background-color: var(--green);">30 / 30</div>
        </div>

        <div class="player-card">
            <div class="rank rank-2">2</div>
            <div class="name">أمل عرفه</div>
            <div class="score-pill" style="background-color: var(--blue);">29.5</div>
        </div>

        <div class="player-card">
            <div class="rank rank-other">3</div>
            <div class="name">مصطفي رضا</div>
            <div class="score-pill">28</div>
        </div>

        <div class="player-card">
            <div class="rank rank-other">4</div>
            <div class="name">جني محمود</div>
            <div class="score-pill">28</div>
        </div>

        <div class="player-card">
            <div class="rank rank-other">5</div>
            <div class="name">حسام حسن</div>
            <div class="score-pill">24</div>
        </div>

        <div class="player-card">
            <div class="rank rank-other">6</div>
            <div class="name">محمود محمد</div>
            <div class="score-pill">21</div>
        </div>

        <div class="player-card missing">
            <div class="rank">✘</div>
            <div class="name">جني محمد</div>
            <div class="score-pill" style="background-color: var(--red);">No Score</div>
        </div>

    </div>

    <p style="color: white; margin-top: 30px; font-size: 0.8rem; opacity: 0.7;">قائمة الأبطال • تم التحديث الآن</p>

</body>
</html>
