<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار سكان إفريقيا | مستر إيهاب أشرف</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%);
            min-height: 100vh;
            user-select: none;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(124, 58, 237, 0.1);
            border-radius: 2rem;
        }
        .option-box {
            background: white; border: 2px solid #e2e8f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: right; cursor: pointer;
        }
        .option-box:hover { border-color: #8b5cf6; transform: scale(1.02); }
        .option-box.selected {
            background: linear-gradient(135deg, #a855f7 0%, #7e22ce 100%);
            border-color: transparent; color: white;
            box-shadow: 0 10px 20px -5px rgba(168, 85, 247, 0.4);
        }
        .opt-prefix {
            background: #f1f5f9; width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; font-weight: 900; color: #64748b; flex-shrink: 0;
        }
        .option-box.selected .opt-prefix { background: rgba(255, 255, 255, 0.2); color: white; }
        .progress-glow {
            height: 100%; background: linear-gradient(90deg, #a855f7, #6366f1);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); border-radius: 100px;
            transition: width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-confirm {
            background: linear-gradient(135deg, #6d28d9 0%, #4c1d95 100%);
            box-shadow: 0 15px 30px -10px rgba(109, 40, 217, 0.4);
        }
        #exit-modal { display: none; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="exit-modal" class="fixed inset-0 z-[2000] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <h3 class="text-xl font-900 text-slate-800 mb-2">هل تريد الخروج؟</h3>
            <div class="flex gap-3 mt-6">
                <a href="grade7.html" class="flex-1 py-3 bg-red-50 text-red-600 rounded-2xl font-bold text-center">خروج</a>
                <button onclick="toggleExitModal(false)" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-bold">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="quiz-wrapper" class="max-w-3xl mx-auto hidden">
        <div class="flex justify-between items-center mb-10">
            <button onclick="toggleExitModal(true)" class="flex items-center gap-2 p-3 bg-white rounded-2xl shadow-sm text-slate-500 border border-slate-100">
                <i class="fas fa-sign-out-alt rotate-180"></i>
                <span class="font-bold text-sm">خروج</span>
            </button>
            <div class="bg-white px-6 py-2 rounded-2xl shadow-sm border border-slate-100 font-900 text-purple-600">
                <span id="q-count">1</span> / 20
            </div>
            <div class="p-3 bg-purple-50 rounded-2xl text-purple-500"><i class="fas fa-graduation-cap"></i></div>
        </div>

        <div class="h-3 bg-slate-200 rounded-full mb-12 overflow-hidden">
            <div id="progress-bar" class="progress-glow" style="width: 5%;"></div>
        </div>

        <div class="glass-card p-8 md:p-12 mb-10">
            <h2 id="main-question" class="text-2xl md:text-3xl font-900 text-slate-800 leading-snug text-center mb-12">جاري التحميل...</h2>
            <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
        </div>

        <button onclick="goToNext()" class="btn-confirm w-full py-6 rounded-3xl text-white font-900 text-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
            <span>تأكيد الإجابة</span>
            <i class="fas fa-chevron-left"></i>
        </button>
    </div>

    <div id="result-view" class="hidden max-w-xl mx-auto text-center pt-10">
        <div class="glass-card p-12 shadow-2xl">
            <div class="text-7xl mb-6">🏆</div>
            <h1 class="text-4xl font-900 text-slate-800 mb-4">أداء رائع!</h1>
            <div class="relative inline-block mb-10">
                <svg class="w-40 h-40 transform -rotate-90">
                    <circle cx="80" cy="80" r="70" stroke="#f1f5f9" stroke-width="12" fill="transparent" />
                    <circle id="score-circle" cx="80" cy="80" r="70" stroke="#a855f7" stroke-width="12" fill="transparent" stroke-dasharray="440" stroke-dashoffset="440" class="transition-all duration-1000" />
                </svg>
                <div class="absolute inset-0 flex items-center justify-center font-900 text-4xl text-slate-800" id="score-text">0%</div>
            </div>

            <button onclick="sendToWhatsApp()" class="w-full py-5 bg-emerald-500 text-white rounded-2xl font-black shadow-lg mb-4 flex items-center justify-center gap-3 hover:bg-emerald-600 transition">
                <i class="fab fa-whatsapp text-2xl"></i>
                إرسال النتيجة للمستر
            </button>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="location.reload()" class="py-4 bg-purple-100 text-purple-700 rounded-2xl font-bold">إعادة</button>
                <a href="grade7.html" class="py-4 bg-slate-800 text-white rounded-2xl font-bold flex items-center justify-center">الرئيسية</a>
            </div>
        </div>
    </div>

    <script>
        const MY_PHONE = "201559116736"; 
        const LESSON_NAME = "سكان إفريقيا - أولى إعدادي";
        
        const questions = [
            { q: "يرجع سبب أهمية دراسة إحصاءات السكان في المقام الأول إلى:", a: ["زيادة عدد المواليد فقط", "وضع خطط تنموية تناسب احتياجات المجتمع", "معرفة عدد الوفيات السنوي", "تحديد مساحة القارات بدقة"], c: 1 },
            { q: "تحتل قارة أفريقيا المرتبة ........ عالمياً من حيث عدد السكان:", a: ["الأولى", "الثانية", "الثالثة", "الخامسة"], c: 1 },
            { q: "بلغ عدد سكان قارة أفريقيا عام 2023م نحو:", a: ["1.5 مليار نسمة", "2.4 مليار نسمة", "500 مليون نسمة", "3 مليار نسمة"], c: 0 },
            { q: "من المتوقع أن يصل عدد سكان أفريقيا بحلول عام 2050م إلى حوالي:", a: ["1.5 مليار نسمة", "1.9 مليار نسمة", "2.4 مليار نسمة", "4 مليار نسمة"], c: 2 },
            { q: "أي من الدول التالية تعتبر أكبر دول أفريقيا من حيث عدد السكان؟", a: ["مصر", "إثيوبيا", "نيجيريا", "جنوب أفريقيا"], c: 2 },
            { q: "يُقصد بـ النمو السكاني هو:", a: ["انتقال الأفراد من دولة لأخرى", "زيادة عدد السكان خلال فترة زمنية معينة", "الفرق بين الصادرات والواردات", "تركز السكان في المدن فقط"], c: 1 },
            { q: "يرجع النمو السكاني السريع في أفريقيا إلى عامل الزيادة الطبيعية و:", a: ["الهجرة (الزيادة غير الطبيعية)", "اتساع مساحة الغابات", "انخفاض مستوى المعيشة", "استخراج المعادن"], c: 0 },
            { q: "تعتبر دولة ........ في المرتبة الأولى عالمياً وأفريقياً من حيث ارتفاع معدل المواليد:", a: ["مصر", "الصومال", "النيجر", "تشاد"], c: 2 },
            { q: "يرجع انخفاض معدل الوفيات في أفريقيا في السنوات الأخيرة إلى:", a: ["زيادة عدد الحروب", "تطوير النظم الصحية والاهتمام بصحة الطفل", "انتشار الأمراض المتوطنة", "قلة عدد كبار السن"], c: 1 },
            { q: "ترتفع معدلات الوفيات في دول مثل (نيجيريا وتشاد وليسوتو) بسبب:", a: ["الرعاية الطبية الفائقة", "تفشي الأمراض المتوطنة مثل الملاريا", "انخفاض معدل المواليد", "كثرة المساحات الخضراء"], c: 1 },
            { q: "تتركز الكثافة السكانية المرتفعة (أكثر من 100 نسمة/كم٢) في:", a: ["وادي النيل ودلتاه بمصر", "الصحراء الكبرى", "جبال دراكنزبرج", "منطقة المستنقعات"], c: 0 },
            { q: "من المناطق ذات الكثافة السكانية المنخفضة في أفريقيا:", a: ["مدينة لاجوس", "سواحل المغرب العربي", "نطاق السافانا والاستبس", "وادي النيل في السودان"], c: 2 },
            { q: "يقل السكان في المناطق الصحراوية بأفريقيا نتيجة:", a: ["ندرة المياه والظروف المناخية السيئة", "وفرة التربة الخصبة", "تركز النشاط الصناعي", "اعتدال درجات الحرارة"], c: 0 },
            { q: "أي من المدن التالية تعتبر من أكثر المدن اكتظاظاً بالسكان في أفريقيا؟", a: ["لاجوس", "نيروبي", "طرابلس", "مقديشو"], c: 0 },
            { q: "الهجرة النازحة من أفريقيا تتجه غالباً نحو:", a: ["أمريكا الجنوبية فقط", "أوروبا ودول الخليج العربي", "أستراليا والقارة القطبية", "وسط أفريقيا"], c: 1 },
            { q: "تُعرف الهجرة التي تتم بطرق غير قانونية ودون تصريح بـ:", a: ["الهجرة الداخلية", "الهجرة الوافدة", "الهجرة غير الشرعية", "الهجرة الموسمية"], c: 2 },
            { q: "تعاني أفريقيا من مشكلة سكانية بسبب عدم التوازن بين السكان و:", a: ["مساحة البحار والمحيطات", "معدلات النمو الاقتصادي", "عدد خطوط الطول", "شكل القارة المثلث"], c: 1 },
            { q: "من النتائج المترتبة على زيادة فئة صغار السن في أفريقيا:", a: ["زيادة الإنتاج الاقتصادي فوراً", "الضغط على الخدمات التعليمية والصحية", "تشجيع الهجرة الخارجية", "قلة استهلاك الموارد الطبيعية"], c: 1 },
            { q: "الأمن الغذائي يعني قدرة الدولة على:", a: ["زيادة عدد المواليد سنوياً", "توفير الغذاء الكافي والمستقر للسكان", "تصدير المحاصيل للخارج فقط", "بناء المصانع الحربية"], c: 1 },
            { q: "لحل المشكلة السكانية، تقوم الدول الأفريقية بإنشاء مدن جديدة بهدف:", a: ["زيادة التلوث البيئي", "إعادة توزيع السكان وتخفيف الضغط عن المناطق المزدحمة", "تشجيع الناس على الهجرة لأوروبا", "تقليل مساحة الأراضي الزراعية"], c: 1 }
        ];

        let index = 0, score = 0, picked = null, studentName = "";

        window.onload = async () => {
            const { value: name } = await Swal.fire({
                title: 'اكتب اسمك الثلاثي يا بطل',
                input: 'text',
                confirmButtonText: 'ابدأ الاختبار',
                confirmButtonColor: '#8b5cf6',
                allowOutsideClick: false,
                inputValidator: (v) => !v && 'الاسم مطلوب للبدء!'
            });
            studentName = name;
            document.getElementById('quiz-wrapper').classList.remove('hidden');
            render();
        };

        function render() {
            picked = null;
            const q = questions[index];
            document.getElementById('main-question').innerText = q.q;
            document.getElementById('q-count').innerText = index + 1;
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            q.a.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = 'option-box p-6 rounded-2xl flex items-center gap-4';
                btn.innerHTML = `<div class="opt-prefix">${String.fromCharCode(65 + i)}</div><span class="text-lg font-bold">${opt}</span>`;
                btn.onclick = () => {
                    document.querySelectorAll('.option-box').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    picked = i;
                };
                grid.appendChild(btn);
            });
            document.getElementById('progress-bar').style.width = ((index / questions.length) * 100) + '%';
        }

        function goToNext() {
            if (picked === null) return Swal.fire({text:'اختر إجابة أولاً!', icon:'warning'});
            if (picked === questions[index].c) score++;
            index++;
            if (index < questions.length) render(); else finish();
        }

        function finish() {
            document.getElementById('quiz-wrapper').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            const pct = Math.round((score / questions.length) * 100);
            document.getElementById('score-text').innerText = pct + '%';
            document.getElementById('score-circle').style.strokeDashoffset = 440 - (440 * pct) / 100;
        }

        function sendToWhatsApp() {
            const pct = Math.round((score / questions.length) * 100);
            const message = `يا مستر إيهاب، أنا الطالب: ${studentName}\nخلصت اختبار: ${LESSON_NAME}\nدرجتي هي: ${pct}%\nعدد الإجابات الصحيحة: ${score} من 20`;
            const encodedMsg = encodeURIComponent(message);
            
            // رابط API الأساسي
            const apiUrl = `https://api.whatsapp.com/send?phone=${MY_PHONE}&text=${encodedMsg}`;
            // رابط wa.me الاحتياطي
            const waUrl = `https://wa.me/${MY_PHONE}?text=${encodedMsg}`;

            // المحاولة عبر فتح نافذة جديدة، وإذا فشلت يتم التحويل المباشر
            const newWindow = window.open(apiUrl, '_blank');
            if (!newWindow || newWindow.closed || typeof newWindow.closed == 'undefined') {
                window.location.href = waUrl;
            }
        }

        function toggleExitModal(s) { document.getElementById('exit-modal').style.display = s?'flex':'none'; }
    </script>
</body>
</html>
