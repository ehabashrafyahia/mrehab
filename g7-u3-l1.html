<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار عهد محمد علي | منصة أطلس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%); 
            min-height: 100vh; 
            user-select: none; 
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.5); 
            box-shadow: 0 25px 50px -12px rgba(124, 58, 237, 0.1); 
            border-radius: 2rem; 
        }
        .option-box { 
            background: white; border: 2px solid #e2e8f0; 
            transition: all 0.3s ease; text-align: right; cursor: pointer; 
        }
        .option-box:hover { border-color: #8b5cf6; transform: scale(1.02); }
        .option-box.selected { 
            background: linear-gradient(135deg, #a855f7 0%, #7e22ce 100%); 
            border-color: transparent; color: white; 
        }
        .opt-prefix { 
            background: #f1f5f9; width: 38px; height: 38px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 10px; font-weight: 900; color: #64748b; 
        }
        .option-box.selected .opt-prefix { background: rgba(255, 255, 255, 0.2); color: white; }
        .progress-glow { 
            height: 100%; background: linear-gradient(90deg, #a855f7, #6366f1); 
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); border-radius: 100px; 
            transition: width 0.6s ease; 
        }
        .btn-confirm { 
            background: linear-gradient(135deg, #6d28d9 0%, #4c1d95 100%); 
            box-shadow: 0 15px 30px -10px rgba(109, 40, 217, 0.4); 
        }
        #exit-modal { display: none; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="exit-modal" class="fixed inset-0 z-[2000] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <h3 class="text-xl font-900 text-slate-800 mb-2">هل تريد الخروج؟</h3>
            <div class="flex gap-3 mt-6">
                <a href="grade7.html" class="flex-1 py-3 bg-red-50 text-red-600 rounded-2xl font-bold text-center">خروج</a>
                <button onclick="toggleExitModal(false)" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-bold">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="quiz-wrapper" class="max-w-3xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <button onclick="toggleExitModal(true)" class="flex items-center gap-2 p-3 bg-white rounded-2xl shadow-sm text-slate-500 border border-slate-100 transition-colors hover:text-red-500">
                <i class="fas fa-sign-out-alt rotate-180"></i>
                <span class="font-bold text-sm text-slate-800">خروج</span>
            </button>
            <div class="bg-white px-6 py-2 rounded-2xl shadow-sm border border-slate-100 font-900 text-purple-600">
                <span id="q-count">1</span> / 40
            </div>
            <div class="p-3 bg-purple-50 rounded-2xl text-purple-500"><i class="fas fa-history"></i></div>
        </div>

        <div class="h-3 bg-slate-200 rounded-full mb-12 overflow-hidden">
            <div id="progress-bar" class="progress-glow" style="width: 0%;"></div>
        </div>

        <div class="glass-card p-8 md:p-12 mb-10">
            <h2 id="main-question" class="text-2xl md:text-3xl font-900 text-slate-800 leading-snug text-center mb-12">جاري التحميل...</h2>
            <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
        </div>

        <button onclick="goToNext()" class="btn-confirm w-full py-6 rounded-3xl text-white font-900 text-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
            <span>تأكيد الإجابة</span>
            <i class="fas fa-chevron-left"></i>
        </button>
    </div>

    <div id="result-view" class="hidden max-w-xl mx-auto text-center pt-10">
        <div class="glass-card p-12 bg-white mb-6 border-2 border-purple-100">
            <div class="text-7xl mb-6">🏆</div>
            <h1 class="text-4xl font-900 text-slate-800 mb-2">نتيجة الاختبار</h1>
            <p class="text-slate-500 font-bold mb-8">الزراعة والثروة الحيوانية والسمكية في افريقيا</p>
            
            <div class="relative inline-block mb-10">
                <svg class="w-40 h-40 transform -rotate-90">
                    <circle cx="80" cy="80" r="70" stroke="#f1f5f9" stroke-width="12" fill="transparent" />
                    <circle id="score-circle" cx="80" cy="80" r="70" stroke="#a855f7" stroke-width="12" fill="transparent" stroke-dasharray="440" stroke-dashoffset="440" class="transition-all duration-1000" />
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <span class="font-900 text-4xl text-slate-800" id="score-text">0%</span>
                </div>
            </div>
            <div id="result-msg" class="text-xl font-black text-purple-600"></div>
        </div>

        <div class="flex flex-col gap-4">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="location.reload()" class="py-4 bg-purple-100 text-purple-700 rounded-2xl font-bold shadow-lg hover:bg-purple-200 transition">إعادة</button>
                <a href="grade7.html" class="py-4 bg-slate-800 text-white rounded-2xl font-bold shadow-lg flex items-center justify-center hover:bg-slate-700 transition">العودة للدروس</a>
            </div>
        </div>
    </div>

    <script>
        const questions = [
    { q: "تمثل مساحة الأراضي الزراعية في أفريقيا نحو ....... مساحة الأراضي الزراعية في العالم.", a: ["الربع", "الخمس", "الثلث", "النصف"], c: 1 },
    { q: "تأتي قارة أفريقيا في المرتبة ....... عالمياً من حيث مساحة الأراضي الزراعية.", a: ["الأولى", "الثانية", "الثالثة", "الرابعة"], c: 2 },
    { q: "من الأنهار التي تتركز حولها السهول الفيضية الخصبة في غرب أفريقيا نهر .......", a: ["النيل", "الزمبيزي", "النيجر", "الأورانج"], c: 2 },
    { q: "تعد الزراعة الركيزة الأساسية للاقتصاد الأفريقي حيث يعمل بها نحو ....... من القوى العاملة.", a: ["20%", "50%", "70%", "90%"], c: 1 },
    { q: "يعتبر محصول ....... من الحبوب الغذائية التي تنتج أفريقيا أكثر من نصف إنتاجها العالمي.", a: ["القمح", "الذرة الرفيعة", "الأرز", "الشعير"], c: 1 },
    { q: "تزرع المحاصيل الدرنية مثل الكسافا واليام في المناطق .......", a: ["الصحراوية", "القطبية", "الاستوائية", "المعتدلة"], c: 2 },
    { q: "تنتج أفريقيا نحو 70% من الإنتاج العالمي لمحصول .......", a: ["البن", "الشاي", "الكاكاو", "المطاط"], c: 2 },
    { q: "تحتل دولة ....... المركز الأول أفريقياً في إنتاج الأبقار.", a: ["مصر", "إثيوبيا", "السودان", "نيجيريا"], c: 1 },
    { q: "تمثل المراعي الطبيعية في أفريقيا نحو ....... مساحة المراعي في العالم.", a: ["الربع", "الخمس", "الثلث", "النصف"], c: 0 },
    { q: "تأتي قارة أفريقيا في المرتبة ....... عالمياً في إنتاج الأسماك.", a: ["الأولى", "الثانية", "الثالثة", "الرابعة"], c: 3 },
    { q: "تتركز التربة البركانية الخصبة في شرق القارة بدولتي .......", a: ["نيجيريا وغانا", "مصر والسودان", "إثيوبيا وكينيا", "المغرب وتونس"], c: 2 },
    { q: "الهدف الأساسي من 'الزراعة الواسعة' في أفريقيا هو .......", a: ["الاكتفاء الذاتي", "الأغراض التجارية", "الاستهلاك المحلي", "توفير البذور"], c: 1 },
    { q: "أدى تنوع المناخ في أفريقيا نتيجة مرور أكثر من 70 دائرة عرض إلى .......", a: ["ضيق المساحة", "تنوع المحاصيل", "زيادة الجفاف", "قلة السكان"], c: 1 },
    { q: "تستخدم محاصيل 'اليام والكسافا' في بعض دول أفريقيا في صناعة .......", a: ["المنسوجات", "الخبز", "الإطارات", "الزيوت"], c: 1 },
    { q: "تتركز زراعة محاصيل المنبهات (مثل الشاي) بشكل أساسي في ....... القارة.", a: ["شمال", "جنوب", "شرق", "غرب"], c: 2 },
    { q: "تعد دولتا مصر والسودان من أشهر الدول الأفريقية إنتاجاً لقطن .......", a: ["قصير التيلة", "متوسط التيلة", "طويل التيلة", "خشن التيلة"], c: 2 },
    { q: "يستخرج المطاط الطبيعي في أفريقيا ويستخدم بشكل أساسي في صناعة .......", a: ["الورق", "الملابس", "إطارات الطائرات والسيارات", "الأثاث"], c: 2 },
    { q: "القيمة الاقتصادية للأبقار في إثيوبيا محدودة بسبب .......", a: ["قلة عددها", "ضعف إنتاجها من الألبان واللحوم", "صغر حجمها", "عدم وجود مراعي"], c: 1 },
    { q: "تحتل دولة ....... المركز الأول في إنتاج الأسماك من المصايد الطبيعية.", a: ["مصر", "المغرب", "نيجيريا", "موريتانيا"], c: 1 },
    { q: "المسؤول عن تجريف التربة وتدمير المحاصيل وانخفاض الإنتاجية هو .......", a: ["الجفاف", "الفيضانات القوية", "الرعي الجائر", "الصراعات"], c: 1 },
    { q: "أي من المحاصيل التالية يساهم في الحصول على 'النقد الأجنبي' للقارة؟", a: ["الذرة الرفيعة", "اليام", "المطاط الطبيعي", "الكسافا"], c: 2 },
    { q: "يظهر أثر 'المعتقدات الاجتماعية' سلباً على الثروة الحيوانية عند بعض القبائل من خلال .......", a: ["استخدامها في الزراعة", "تقديمها كمهر للزواج فقط", "تصديرها للخارج", "تحسين سلالاتها"], c: 1 },
    { q: "تعتبر دولة نيجيريا الرائدة أفريقياً في تربية .......", a: ["الإبل", "الأبقار", "الأغنام والماعز", "الخيول"], c: 2 },
    { q: "يرتبط نقص مساحة الأراضي الزراعية في بعض مناطق أفريقيا بظاهرة .......", a: ["الفيضان", "الجفاف", "هجمات الجراد", "التوسع العمراني"], c: 1 },
    { q: "السبب الرئيسي لاتجاه أفريقيا نحو 'الاستزراع السمكي' هو .......", a: ["وفرة المياه", "سد حاجة السكان", "تصدير الزينة", "قلة البحار"], c: 1 },
    { q: "تعد دولة ....... هي المركز الأول أفريقياً في إنتاج الأسماك من 'المزارع السمكية'.", a: ["المغرب", "موريتانيا", "مصر", "السنغال"], c: 2 },
    { q: "من المشكلات 'السياسية' التي تؤثر سلباً على الثروة الحيوانية في أفريقيا .......", a: ["الجفاف", "الصراعات المسلحة وهجرة الشباب", "ضعف التمويل", "العادات والتقاليد"], c: 1 },
    { q: "مصطلح 'الموائل البحرية' يشير إلى .......", a: ["السفن الضخمة", "بيئة طبيعية مأهولة بنوع من الكائنات البحرية", "أدوات الصيد", "المصانع"], c: 1 },
    { q: "أطلق الاتحاد الأفريقي برنامجاً عام 2002م يهدف إلى .......", a: ["بناء السدود", "تحقيق الأمن الغذائي", "زيادة التعدين", "محو الأمية"], c: 1 },
    { q: "مشروع 'بركة غليون' في مصر هو نموذج ناجح للتوسع في .......", a: ["زراعة القطن", "الاستزراع السمكي", "تربية الأبقار", "زراعة القمح"], c: 1 },
    { q: "تعتمد دول مثل (مصر، غانا، مالي) 'الزراعة الذكية مناخياً' لمواجهة .......", a: ["الفقر", "التغيرات المناخية السلبية", "زيادة السكان", "نقص الآلات"], c: 1 },
    { q: "ترجع سيادة 'الزراعة البسيطة' في أفريقيا قديماً إلى .......", a: ["توفر التكنولوجيا", "تحقيق الاكتفاء الذاتي", "الرغبة في التصدير", "كثرة الأيدي العاملة"], c: 1 },
    { q: "تساهم قارة أفريقيا بنحو ....... من الإنتاج العالمي لمحصول البن.", a: ["النصف", "الثلث", "الخمس", "الدشر"], c: 2 },
    { q: "تنتشر 'المصايد الداخلية' في أفريقيا في مناطق .......", a: ["المحيط الأطلنطي", "البحر المتوسط", "الأنهار والبحيرات", "البحر الأحمر"], c: 2 },
    { q: "أي من العوامل التالية يعد 'بشرياً' ويؤدي لتدهور التربة في أفريقيا؟", a: ["الرياح", "الأمطار", "الرعي الجائر", "الزلازل"], c: 2 },
    { q: "أخطر أنواع الجراد الذي دمر مساحات واسعة في شرق أفريقيا عام 2020 هو الجراد .......", a: ["القطبي", "الاستوائي", "الصحراوي", "الساحلي"], c: 2 },
    { q: "من جهود مصر لتنمية الثروة الحيوانية في أفريقيا تدريب الكوادر الفنية في مجال .......", a: ["الصيد", "الاستزراع السمكي", "صناعة الجلود", "التعدين"], c: 1 },
    { q: "يرتبط وجود 'الإبل' في أفريقيا بشكل أساسي بالمناطق .......", a: ["المدارية", "الصحراوية", "القطبية", "الجبلية"], c: 1 },
    { q: "تمثل دولة ....... المرتبة الثانية أفريقياً في استيراد الأسماك رغم إنتاجها الكبير.", a: ["ليبيا", "مصر", "الجزائر", "جنوب أفريقيا"], c: 1 },
    { q: "تتوزع 'المراعي الطبيعية' في أفريقيا بين حشائش السافانا وحشائش .......", a: ["التندرا", "الاستبس", "المعتدلة", "الغابات المشوكة"], c: 1 }
];


        let index = 0, score = 0, picked = null;

        window.onload = () => { render(); };

        function render() {
            picked = null;
            const q = questions[index];
            document.getElementById('main-question').innerText = q.q;
            document.getElementById('q-count').innerText = index + 1;
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            q.a.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = 'option-box p-6 rounded-2xl flex items-center gap-4 transition-all';
                btn.innerHTML = `<div class="opt-prefix">${String.fromCharCode(65 + i)}</div><span class="text-lg font-bold">${opt}</span>`;
                btn.onclick = () => {
                    document.querySelectorAll('.option-box').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    picked = i;
                };
                grid.appendChild(btn);
            });
            document.getElementById('progress-bar').style.width = ((index / questions.length) * 100) + '%';
        }

        function goToNext() {
            if (picked === null) return Swal.fire({text:'اختر إجابة أولاً يا بطل!', icon:'warning', confirmButtonColor: '#8b5cf6'});
            if (picked === questions[index].c) score++;
            index++;
            if (index < questions.length) render(); else finish();
        }

        function finish() {
            document.getElementById('quiz-wrapper').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            const pct = Math.round((score / questions.length) * 100);
            document.getElementById('score-text').innerText = pct + '%';
            document.getElementById('score-circle').style.strokeDashoffset = 440 - (440 * pct) / 100;
            document.getElementById('result-msg').innerText = pct >= 50 ? "بطل حقيقي! مستواك رائع" : "محاولة جيدة، راجع الدرس مرة أخرى";
        }

        function toggleExitModal(s) { document.getElementById('exit-modal').style.display = s?'flex':'none'; }
    </script>
</body>
</html>
