<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار خصائص سكان أفريقيا | أطلس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%); 
            min-height: 100vh; 
            user-select: none; 
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.5); 
            box-shadow: 0 25px 50px -12px rgba(124, 58, 237, 0.1); 
            border-radius: 2rem; 
        }
        .option-box { 
            background: white; border: 2px solid #e2e8f0; 
            transition: all 0.3s ease; text-align: right; cursor: pointer; 
        }
        .option-box:hover { border-color: #8b5cf6; transform: scale(1.02); }
        .option-box.selected { 
            background: linear-gradient(135deg, #a855f7 0%, #7e22ce 100%); 
            border-color: transparent; color: white; 
        }
        .opt-prefix { 
            background: #f1f5f9; width: 38px; height: 38px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 10px; font-weight: 900; color: #64748b; 
        }
        .option-box.selected .opt-prefix { background: rgba(255, 255, 255, 0.2); color: white; }
        .progress-glow { 
            height: 100%; background: linear-gradient(90deg, #a855f7, #6366f1); 
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); border-radius: 100px; 
            transition: width 0.6s ease; 
        }
        .btn-confirm { 
            background: linear-gradient(135deg, #6d28d9 0%, #4c1d95 100%); 
            box-shadow: 0 15px 30px -10px rgba(109, 40, 217, 0.4); 
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="quiz-wrapper" class="max-w-3xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <a href="home.html" class="flex items-center gap-2 p-3 bg-white rounded-2xl shadow-sm text-slate-500 border border-slate-100 transition-colors hover:text-red-500">
                <i class="fas fa-arrow-right"></i>
                <span class="font-bold text-sm text-slate-800">رجوع</span>
            </a>
            <div class="bg-white px-6 py-2 rounded-2xl shadow-sm border border-slate-100 font-900 text-purple-600">
                <span id="q-count">1</span> / 20
            </div>
            <div class="p-3 bg-purple-50 rounded-2xl text-purple-500"><i class="fas fa-globe-africa"></i></div>
        </div>

        <div class="h-3 bg-slate-200 rounded-full mb-12 overflow-hidden">
            <div id="progress-bar" class="progress-glow" style="width: 0%;"></div>
        </div>

        <div class="glass-card p-8 md:p-12 mb-10">
            <h2 id="main-question" class="text-xl md:text-2xl font-900 text-slate-800 leading-snug text-center mb-12">جاري التحميل...</h2>
            <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
        </div>

        <button onclick="goToNext()" class="btn-confirm w-full py-6 rounded-3xl text-white font-900 text-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
            <span>تأكيد الإجابة</span>
            <i class="fas fa-chevron-left"></i>
        </button>
    </div>

    <div id="result-view" class="hidden max-w-xl mx-auto text-center pt-10">
        <div class="glass-card p-12 bg-white mb-6 border-2 border-purple-100">
            <div class="text-7xl mb-6">🏆</div>
            <h1 class="text-4xl font-900 text-slate-800 mb-2">النتيجة النهائية</h1>
            <p class="text-slate-500 font-bold mb-8">خصائص سكان أفريقيا - أطلس</p>
            
            <div class="relative inline-block mb-10">
                <svg class="w-40 h-40 transform -rotate-90">
                    <circle cx="80" cy="80" r="70" stroke="#f1f5f9" stroke-width="12" fill="transparent" />
                    <circle id="score-circle" cx="80" cy="80" r="70" stroke="#a855f7" stroke-width="12" fill="transparent" stroke-dasharray="440" stroke-dashoffset="440" class="transition-all duration-1000" />
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <span class="font-900 text-4xl text-slate-800" id="score-text">0%</span>
                </div>
            </div>
            <div id="result-msg" class="text-xl font-black text-purple-600"></div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="location.reload()" class="py-4 bg-purple-100 text-purple-700 rounded-2xl font-bold shadow-lg">إعادة الاختبار</button>
            <a href="home.html" class="py-4 bg-slate-800 text-white rounded-2xl font-bold shadow-lg flex items-center justify-center">الرئيسية</a>
        </div>
    </div>

    <script>
        const questions = [
            { q: "ما هو النشاط الاقتصادي الذي يعمل به نحو نصف القوة العاملة في قارة أفريقيا؟", a: ["الصناعة", "التجارة", "الزراعة", "التعدين"], c: 2 },
            { q: "أي من اللغات التالية تنتشر بشكل رئيسي في شمال أفريقيا؟", a: ["اللغة السواحلية", "اللغة العربية", "اللغة الإنجليزية", "لغة الهوسا"], c: 1 },
            { q: "الهرم السكاني لقارة أفريقيا من النوع ذي القاعدة العريضة بسبب ارتفاع معدل:", a: ["الوفيات", "المواليد", "الهجرة", "الأطباء"], c: 1 },
            { q: "أي من الأدباء الأفارقة حصل على جائزة نوبل عام 1988م؟", a: ["وولي سوينكا", "نجيب محفوظ", "نيلسون مانديلا", "أحمد زويل"], c: 1 },
            { q: "تبلغ نسبة الإناث في قارة أفريقيا وفق تقديرات 2024م حوالي:", a: ["40%", "49.9%", "50.1%", "60%"], c: 2 },
            { q: "أي لغة تنتشر في شرق أفريقيا بشكل رئيسي؟", a: ["الفرنسية", "السواحلية", "الماندي", "العربية"], c: 1 },
            { q: "تبلغ نسبة فئة كبار السن (65 عاماً فأكثر) في أفريقيا حوالي:", a: ["3%", "10%", "15%", "25%"], c: 0 },
            { q: "يرجع انتشار اللغتين الإنجليزية والفرنسية في بعض دول أفريقيا بشكل أساسي إلى:", a: ["التجارة العالمية", "الهجرات العربية", "الاحتلال الأوروبي", "الرغبة في تعلم لغات جديدة"], c: 2 },
            { q: "أي من الدول التالية حققت تقدماً ملحوظاً في الوصول بالتعليم الابتدائي لمستوى الاستيعاب الكامل؟", a: ["إريتريا", "الصومال", "مصر", "الكونغو الديمقراطية"], c: 2 },
            { q: "ترتبط الموسيقى في التراث الأفريقي القديم بشكل وثيق بـ:", a: ["الأنشطة الاقتصادية", "الطقوس الدينية", "الحروب والنزاعات", "الدراسات الأكاديمية"], c: 1 },
            { q: "تمثل فئة 'سن العمل' (15 - 64 عاماً) في الهرم السكاني الأفريقي منطقة:", a: ["قاعدة الهرم", "قمة الهرم", "منتصف الهرم", "خارج الهرم"], c: 2 },
            { q: "أي من الأمراض التالية ينتقل بواسطة 'ذبابة تسى تسى' في أفريقيا؟", a: ["الملاريا", "مرض النوم", "الإيدز", "السرطان"], c: 1 },
            { q: "تبلغ نسبة القوة العاملة في مجال 'الأنشطة الاقتصادية الأخرى' (تجارة، خدمات، تعليم) حوالي:", a: ["13.6%", "50%", "36.4%", "10%"], c: 2 },
            { q: "تتركز لغة 'الهوسا والماندي' في قارة أفريقيا جهة:", a: ["الشمال", "الشرق", "الجنوب", "الغرب"], c: 3 },
            { q: "انخفاض نسبة صغار السن المتوقعة في أفريقيا بحلول عام 2050 يعكس نجاح القارة في:", a: ["زيادة معدلات المواليد", "برامج تنظيم الأسرة ورعاية صحة المرأة", "زيادة عدد المهاجرين للخارج", "تقليل الاعتماد على التكنولوجيا"], c: 1 },
            { q: "تعد 'إريتريا والصومال' من أولى الدول عالمياً وأفريقياً في مشكلة:", a: ["زيادة عدد الأطباء", "عمالة الأطفال", "ارتفاع نسبة كبار السن", "التطور الصناعي"], c: 1 },
            { q: "ما هو العامل المشترك الذي أدى لاختلاف نسبة الإناث والذكور في بعض الدول الأفريقية؟", a: ["اختلاف اللغات", "الهجرة وارتفاع معدلات الوفيات بين الذكور نتيجة الحروب", "تطور الحرف التراثية", "اختلاف المناخ"], c: 1 },
            { q: "يقل معدل الأطباء في دول 'جنوب الصحراء الكبرى' عن المعدل العالمي ليصل إلى حوالي:", a: ["1.7 طبيب لكل 1000 نسمة", "1.4 طبيب لكل 1000 نسمة", "0.25 طبيب لكل 1000 نسمة", "2.4 طبيب لكل 1000 نسمة"], c: 2 },
            { q: "الهدف الرابع من أهداف التنمية المستدامة الذي تسعى الدول الأفريقية لتحقيقه يتعلق بـ:", a: ["القضاء على الفقر", "ضمان التعليم الجيد المنصف والشامل", "حماية التراث الثقافي", "الرعاية الصحية"], c: 1 },
            { q: "أي مما يلي يعد من الحرف التراثية التي تعبر عن الهوية الأفريقية؟", a: ["صناعة الفخار والخزف", "صناعة السيارات", "التكنولوجيا الحيوية", "الصناعات الكيماوية"], c: 0 }
        ];

        let index = 0, score = 0, picked = null;

        window.onload = () => { render(); };

        function render() {
            picked = null;
            const q = questions[index];
            document.getElementById('main-question').innerText = q.q;
            document.getElementById('q-count').innerText = index + 1;
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            q.a.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = 'option-box p-5 rounded-2xl flex items-center gap-4 transition-all';
                btn.innerHTML = `<div class="opt-prefix">${String.fromCharCode(65 + i)}</div><span class="text-md font-bold text-slate-700">${opt}</span>`;
                btn.onclick = () => {
                    document.querySelectorAll('.option-box').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    picked = i;
                };
                grid.appendChild(btn);
            });
            document.getElementById('progress-bar').style.width = ((index / questions.length) * 100) + '%';
        }

        function goToNext() {
            if (picked === null) return Swal.fire({text:'اختر إجابة أولاً يا بطل!', icon:'warning', confirmButtonColor: '#8b5cf6'});
            if (picked === questions[index].c) score++;
            index++;
            if (index < questions.length) render(); else finish();
        }

        function finish() {
            document.getElementById('quiz-wrapper').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            const pct = Math.round((score / questions.length) * 100);
            document.getElementById('score-text').innerText = pct + '%';
            document.getElementById('score-circle').style.strokeDashoffset = 440 - (440 * pct) / 100;
            document.getElementById('result-msg').innerText = pct >= 50 ? "أداء ممتاز! استمر في التفوق يا بطل" : "تحتاج لمراجعة الدرس مرة أخرى!";
        }
    </script>
</body>
</html>
