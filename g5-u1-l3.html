<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مراجعة البيئات المصرية | مستر إيهاب أشرف</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            min-height: 100vh;
            user-select: none;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(16, 185, 129, 0.2);
            box-shadow: 0 25px 50px -12px rgba(16, 185, 129, 0.15);
            border-radius: 2.5rem;
        }
        .option-box {
            background: white; border: 2px solid #e2e8f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); text-align: right; cursor: pointer;
        }
        .option-box:hover { border-color: #10b981; transform: translateY(-3px); }
        .option-box.selected {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-color: transparent; color: white;
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
        }
        .opt-prefix {
            background: #f1f5f9; width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px; font-weight: 900; color: #10b981;
        }
        .option-box.selected .opt-prefix { background: rgba(255, 255, 255, 0.2); color: white; }
        .progress-glow {
            height: 100%; background: linear-gradient(90deg, #10b981, #fbbf24);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); border-radius: 100px;
            transition: width 0.6s ease;
        }
        .btn-confirm {
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            box-shadow: 0 15px 30px -10px rgba(16, 185, 129, 0.4);
        }
        #exit-modal { display: none; }
    </style>
</head>
<body class="p-4 md:p-10 text-right">

    <div id="exit-modal" class="fixed inset-0 z-[2000] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] p-8 max-w-sm w-full text-center shadow-2xl">
            <h3 class="text-xl font-900 text-slate-800 mb-2">هل تريد إنهاء المراجعة؟</h3>
            <div class="flex gap-3 mt-6">
                <a href="grade5.html" class="flex-1 py-4 bg-red-50 text-red-600 rounded-2xl font-bold text-center">خروج</a>
                <button onclick="toggleExitModal(false)" class="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="quiz-wrapper" class="max-w-3xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <button onclick="toggleExitModal(true)" class="flex items-center gap-2 p-3 bg-white rounded-2xl shadow-sm text-slate-500 border border-slate-100 transition-colors hover:text-red-500">
                <i class="fas fa-sign-out-alt rotate-180"></i>
                <span class="font-bold text-sm text-slate-800">خروج</span>
            </button>
            <div class="bg-white px-6 py-2 rounded-2xl shadow-sm border border-emerald-100 font-900 text-emerald-600">
                <span id="q-count">1</span> / 40
            </div>
            <div class="p-3 bg-emerald-50 rounded-2xl text-emerald-500"><i class="fas fa-globe-africa"></i></div>
        </div>

        <div class="h-3 bg-slate-200 rounded-full mb-12 overflow-hidden">
            <div id="progress-bar" class="progress-glow" style="width: 0%;"></div>
        </div>

        <div class="glass-card p-8 md:p-12 mb-10">
            <h2 id="main-question" class="text-2xl md:text-3xl font-900 text-slate-800 leading-snug text-center mb-12">جاري التحميل...</h2>
            <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-5 text-right"></div>
        </div>

        <button onclick="goToNext()" class="btn-confirm w-full py-6 rounded-[2rem] text-white font-900 text-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
            <span>تأكيد الإجابة</span>
            <i class="fas fa-chevron-left"></i>
        </button>
    </div>

    <div id="result-view" class="hidden max-w-xl mx-auto text-center pt-10">
        <div class="glass-card p-12 bg-white mb-6 border-2 border-emerald-100">
            <div id="result-emoji" class="text-7xl mb-6">🏆</div>
            <h1 id="result-title" class="text-4xl font-900 text-slate-800 mb-2">أداء مذهل!</h1>
            <p class="text-slate-500 font-bold mb-8">مراجعة البيئات المصرية - مستر إيهاب أشرف</p>
            
            <div class="relative inline-block mb-10">
                <svg class="w-40 h-40 transform -rotate-90">
                    <circle cx="80" cy="80" r="70" stroke="#f1f5f9" stroke-width="12" fill="transparent" />
                    <circle id="score-circle" cx="80" cy="80" r="70" stroke="#10b981" stroke-width="12" fill="transparent" stroke-dasharray="440" stroke-dashoffset="440" class="transition-all duration-1000" />
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <span class="font-900 text-4xl text-slate-800" id="score-text">0%</span>
                </div>
            </div>
            <div id="result-msg" class="text-xl font-black text-emerald-600"></div>
        </div>

        <div class="flex flex-col gap-4">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="location.reload()" class="py-5 bg-emerald-100 text-emerald-700 rounded-3xl font-bold hover:bg-emerald-200 transition">إعادة</button>
                <a href="grade5.html" class="py-5 bg-slate-800 text-white rounded-3xl font-bold flex items-center justify-center hover:bg-slate-700 transition">الدروس</a>
            </div>
        </div>
    </div>

    <script>
        // الأسئلة الـ 40 التي أرسلتها مسبقاً عن البيئات المصرية
        const questions = [
            { q: "البيئة التي نجد فيها الرمال والجبال وتتميز بندرة الأمطار هي:", a: ["البيئة الزراعية", "البيئة الحضارية", "البيئة الصحراوية", "البيئة الساحلية"], c: 2 },
            { q: "تقع 'البيئة الزراعية' في مصر في:", a: ["الصحراء الشرقية", "وادي النيل والدلتا", "ساحل البحر الأحمر", "شبه جزيرة سيناء"], c: 1 },
            { q: "أي من المدن التالية تعتبر 'مدينة ساحلية' تقع على البحر المتوسط؟", a: ["الغردقة", "السويس", "مرسى مطروح", "شرم الشيخ"], c: 2 },
            { q: "يتميز سكان البيئة الزراعية بـ:", a: ["الانعزال", "التمسك بالعادات والتقاليد والتعاون", "العمل في التعدين فقط", "ترك الأرض بورا"], c: 1 },
            { q: "البيئة التي أنشأها الإنسان وتضم المدن والمناطق العمرانية هي:", a: ["البيئة الصحراوية", "البيئة الحضرية", "البيئة الساحلية", "البيئة الريفية"], c: 1 },
            { q: "من محاصيل البيئة الصحراوية المميزة التي تتحمل الجفاف:", a: ["الأرز", "الزيتون والنخيل", "قصب السكر", "القطن"], c: 1 },
            { q: "يعمل معظم سكان البيئة الساحلية في حرفة:", a: ["صيد الأسماك والعمل بالموانئ", "تربية الأبقار", "زراعة القمح", "المحارة والنقاشة"], c: 0 },
            { q: "تعتبر محافظة ........ من المحافظات الحضرية تماماً في مصر:", a: ["المنيا", "القاهرة", "سوهاج", "أسيوط"], c: 1 },
            { q: "تبلغ مساحة البيئة الصحراوية في مصر حوالي ....... من مساحة الدولة:", a: ["10%", "50%", "96%", "20%"], c: 2 },
            { q: "أي من المناطق التالية تتبع 'البيئة الساحلية' على البحر الأحمر؟", a: ["الإسكندرية", "الغردقة", "بورسعيد", "السلوم"], c: 1 },
            { q: "تتميز البيئة الزراعية بـ ........ مما يساعد على قيام الزراعة:", a: ["التربة الخصبة واستواء السطح", "الجبال المرتفعة", "الرمال الناعمة", "قلة المياه"], c: 0 },
            { q: "الصناعات البسيطة مثل 'حفظ وتعلب الفواكه' تتركز في البيئة:", a: ["الصحراوية", "الريفية (الزراعية)", "الحضرية", "الساحلية"], c: 1 },
            { q: "من الأنشطة الاقتصادية في البيئة الحضرية:", a: ["الرعي", "الصناعة والتجارة والخدمات", "صيد الأسماك فقط", "الزراعة الموسمية"], c: 1 },
            { q: "قامت الدولة بإنشاء مدن جديدة في البيئة الساحلية مثل مدينة:", a: ["الأقصر", "العلمين الجديدة", "أسوان", "الفيوم"], c: 1 },
            { q: "يعتمد سكان 'الواحات' في البيئة الصحراوية على:", a: ["مياه النيل", "المياه الجوفية", "تحلية مياه البحر", "الأمطار الصيفية"], c: 1 },
            { q: "من أهمية البيئة الزراعية أنها توفر لنا:", a: ["المعادن", "الغذاء الأساسي (محاصيل ولحوم وألبان)", "البترول", "السفن والبوارج"], c: 1 },
            { q: "أي من المدن التالية تعد 'أول نموذج لمدينة حضرية' في تاريخ مصر القديم؟", a: ["القاهرة", "منف", "السويس", "بورسعيد"], c: 1 },
            { q: "يتميز مناخ البيئة الصحراوية بـ:", a: ["الاعتدال طوال العام", "البرودة الشديدة صيفاً", "الارتفاع الشديد في الحرارة صيفاً والجفاف", "الأمطار الغزيرة دائمًا"], c: 2 },
            { q: "يتركز سكان البيئة الساحلية في المدن التي تطل على:", a: ["البحر الأحمر والمتوسط", "المنخفضات", "الجبال", "الصحراء الغربية"], c: 0 },
            { q: "قامت ثورة 23 يوليو عام 1952 بإعادة توزيع الأراضي على:", a: ["المهندسين", "الفلاحين", "التجار", "السياح"], c: 1 },
            { q: "من خصائص البيئة الحضرية توفر 'البنية التحتية' التي تشمل:", a: ["الطرق والمواصلات والكهرباء", "الخيام فقط", "الآبار الجافة", "الغابات الكثيفة"], c: 0 },
            { q: "البيئة التي يوجد بها 'سياحة السفاري' هي البيئة:", a: ["الزراعية", "الصحراوية", "الحضرية", "الساحلية"], c: 1 },
            { q: "الصناعات التحويلية مثل 'الحديد والصلب' نجدها بكثرة في البيئة:", a: ["الريفية", "الساحلية", "الحضرية", "الصحراوية"], c: 2 },
            { q: "تعتبر 'المناظر الطبيعية الخلابة والشواطئ الرملية' من خصائص البيئة:", a: ["الزراعية", "الحضرية", "الساحلية", "الجبلية"], c: 2 },
            { q: "عملت الدولة على تطوير البيئة الصحراوية من خلال:", a: ["إهمال الموارد", "إدارة الموارد المائية وتحسين الطرق", "تقليل المساحة الخضراء", "منع السياحة"], c: 1 },
            { q: "أي مما يلي يُعد من جهود الدولة لتطوير البيئة الريفية؟", a: ["مبادرة حياة كريمة وتطوير البنية التحتية", "زيادة العشوائيات", "تقليل فرص العمل", "بناء مصانع الحديد وسط القرى"], c: 0 },
            { q: "يعمل بعض سكان البيئة الصحراوية في حرفة 'التعدين' لاستخراج:", a: ["الأسماك", "المعادن ومصادر الطاقة", "الأخشاب", "المحاصيل الشتوية"], c: 1 },
            { q: "التخطيط العمراني وجودة الخدمات من أهم ما يميز البيئة:", a: ["الساحلية", "الحضرية", "الصحراوية", "الريفية"], c: 1 },
            { q: "منخفض 'الفيوم' يتبع البيئة الزراعية رغم وقوعه في الصحراء بسبب:", a: ["قربه من البحر", "وصول مياه النيل إليه عبر ترعة بحر يوسف", "كثرة الأمطار فيه", "وجود مصانع فيه"], c: 1 },
            { q: "تجارة البترول والغاز الطبيعي من الأنشطة الهامة في البيئة:", a: ["الزراعية", "الحضرية", "الساحلية", "الريفية"], c: 2 },
            { q: "أي من المحافظات التالية تعتبر محافظة 'ساحلية حضرية' في نفس الوقت؟", a: ["الإسكندرية", "مطروح", "الوادي الجديد", "قنا"], c: 0 },
            { q: "يساعد 'تنوع البيئات المصرية' على:", a: ["قلة الموارد", "تنوع الأنشطة الاقتصادية والثروات", "تشابه السكان في كل شيء", "زيادة المشكلات بين المحافظات"], c: 1 },
            { q: "البيئة التي يقل فيها عدد السكان بشكل كبير هي البيئة:", a: ["الحضرية", "الزراعية", "الصحراوية", "الساحلية"], c: 2 },
            { q: "تعاني البيئة الحضرية من مشكلة ........ التي تعمل الدولة على حلها:", a: ["العشوائيات", "ندرة السكان", "كثرة الأراضي الزراعية", "قلة المصانع"], c: 0 },
            { q: "من الأنشطة الاقتصادية المشتركة بين البيئة الصحراوية والساحلية:", a: ["زراعة القمح", "استخراج البترول", "تربية الأبقار", "صناعة المنسوجات"], c: 1 },
            { q: "توصف العلاقة بين البيئات المصرية بأنها علاقة:", a: ["تنافر", "تكامل (كل بيئة تمد الأخرى بما تحتاجه)", "عزلة", "تشابه تام"], c: 1 },
            { q: "البيئة التي توفر لنا 'الأملاح والأسماك والمعادن' هي:", a: ["البيئة الزراعية", "البيئة الساحلية", "البيئة الحضرية", "البيئة الجبلية"], c: 1 },
            { q: "طريق الواحات الجديد هو مشروع يهدف لتطوير البيئة:", a: ["الساحلية", "الزراعية", "الصحراوية", "الحضرية"], c: 2 },
            { q: "يظهر 'التركيب السكاني' في البيئة الحضرية من خلال تنوع:", a: ["المحاصيل", "المهن والخدمات مثل التعليم والبنوك", "أنواع الرمال", "جبال البحر الأحمر"], c: 1 },
            { q: "لكي نحافظ على مستقبل وطننا، يجب علينا تجاه 'البيئات المصرية':", a: ["استنزاف مواردها", "الحفاظ عليها وتطويرها بشكل مستدام", "إهمال البيئة الصحراوية", "التركيز على بيئة واحدة فقط"], c: 1 }
        ];

        let index = 0, score = 0, picked = null;

        window.onload = () => { render(); };

        function render() {
            picked = null;
            const q = questions[index];
            document.getElementById('main-question').innerText = q.q;
            document.getElementById('q-count').innerText = index + 1;
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            q.a.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = 'option-box p-6 rounded-2xl flex items-center gap-4';
                btn.innerHTML = `<div class="opt-prefix">${String.fromCharCode(65 + i)}</div><span class="text-lg font-bold">${opt}</span>`;
                btn.onclick = () => {
                    document.querySelectorAll('.option-box').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    picked = i;
                };
                grid.appendChild(btn);
            });
            document.getElementById('progress-bar').style.width = ((index / questions.length) * 100) + '%';
        }

        function goToNext() {
            if (picked === null) return Swal.fire({text:'يا بطل! اختر إجابة للمتابعة.', icon:'warning', confirmButtonColor: '#10b981'});
            if (picked === questions[index].c) score++;
            index++;
            if (index < questions.length) render(); else finish();
        }

        function finish() {
            document.getElementById('quiz-wrapper').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            const pct = Math.round((score / questions.length) * 100);
            document.getElementById('score-text').innerText = pct + '%';
            document.getElementById('score-circle').style.strokeDashoffset = 440 - (440 * pct) / 100;
            
            if (pct >= 90) {
                document.getElementById('result-title').innerText = "عاش يا بطل!";
                document.getElementById('result-msg').innerText = "أنت خبير في جغرافيا مصر وبيئاتها المختلفة.";
            } else if (pct >= 50) {
                document.getElementById('result-title').innerText = "أداء جيد!";
                document.getElementById('result-msg').innerText = "لقد حققت نتيجة جيدة، يمكنك المراجعة مرة أخرى للتميز.";
            } else {
                document.getElementById('result-title').innerText = "محاولة أخرى";
                document.getElementById('result-msg').innerText = "ركز أكثر في خصائص كل بيئة وأعد الاختبار.";
                document.getElementById('result-emoji').innerText = "📖";
            }
        }

        function toggleExitModal(s) { document.getElementById('exit-modal').style.display = s?'flex':'none'; }
    </script>
</body>
</html>
