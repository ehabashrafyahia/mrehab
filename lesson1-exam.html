<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار تفاعلي | منصة التميز</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            user-select: none; /* منع النسخ أثناء الامتحان */
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            border-radius: 2rem;
        }

        .option-box {
            background: white;
            border: 2px solid #e2e8f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .option-box:hover {
            border-color: #10b981;
            transform: scale(1.02);
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.1);
        }

        .option-box.selected {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-color: transparent;
            color: white;
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
        }

        .opt-prefix {
            background: #f1f5f9;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-weight: 900;
            color: #64748b;
        }

        .option-box.selected .opt-prefix {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .progress-glow {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #3b82f6);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
            border-radius: 100px;
            transition: width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-confirm {
            background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
            box-shadow: 0 15px 30px -10px rgba(79, 70, 229, 0.4);
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.04); }
            100% { transform: scale(1); }
        }
        .animate-pop { animation: pop 0.3s ease-out; }

        /* شاشة تأكيد الخروج */
        #exit-modal { display: none; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="exit-modal" class="fixed inset-0 z-[2000] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <div class="text-4xl mb-4">🏠</div>
            <h3 class="text-xl font-900 text-slate-800 mb-2">هل تريد الخروج؟</h3>
            <p class="text-slate-500 mb-6 font-bold">سيتم فقدان تقدمك في هذا الامتحان</p>
            <div class="flex gap-3">
                <a href="grade4.html" class="flex-1 py-3 bg-red-50 text-red-600 rounded-2xl font-bold hover:bg-red-100 transition">خروج</a>
                <button onclick="toggleExitModal(false)" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-bold">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="quiz-wrapper" class="max-w-3xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <button onclick="toggleExitModal(true)" class="flex items-center gap-2 p-3 bg-white rounded-2xl shadow-sm text-slate-500 hover:text-red-500 transition-all border border-slate-100">
                <i class="fas fa-sign-out-alt rotate-180"></i>
                <span class="font-bold text-sm">خروج</span>
            </button>
            <div class="flex flex-col items-center">
                <div class="bg-white px-6 py-2 rounded-2xl shadow-sm border border-slate-100 font-900 text-indigo-600">
                    <span id="q-count">1</span> / 20
                </div>
            </div>
            <div class="p-3 bg-indigo-50 rounded-2xl text-indigo-500">
                <i class="fas fa-graduation-cap"></i>
            </div>
        </div>

        <div class="h-3 bg-slate-200 rounded-full mb-12 overflow-hidden">
            <div id="progress-bar" class="progress-glow" style="width: 5%;"></div>
        </div>

        <div class="glass-card p-8 md:p-12 mb-10 relative">
            <h2 id="main-question" class="text-2xl md:text-3xl font-900 text-slate-800 leading-snug text-center mb-12">
                جاري التحميل...
            </h2>
            <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
        </div>

        <button id="next-action" onclick="goToNext()" class="btn-confirm w-full py-6 rounded-3xl text-white font-900 text-xl flex items-center justify-center gap-3 transition-all active:scale-95">
            <span>تأكيد الإجابة</span>
            <i class="fas fa-chevron-left"></i>
        </button>
    </div>

    <div id="result-view" class="hidden max-w-xl mx-auto text-center pt-10">
        <div class="glass-card p-12 shadow-2xl">
            <div class="text-7xl mb-6">🏆</div>
            <h1 class="text-4xl font-900 text-slate-800 mb-4">أداء ممتاز!</h1>
            <p class="text-slate-500 font-bold mb-10">درجة التقييم النهائي:</p>
            
            <div class="relative inline-block mb-10">
                <svg class="w-40 h-40 transform -rotate-90">
                    <circle cx="80" cy="80" r="70" stroke="#f1f5f9" stroke-width="12" fill="transparent" />
                    <circle id="score-circle" cx="80" cy="80" r="70" stroke="#10b981" stroke-width="12" fill="transparent" stroke-dasharray="440" stroke-dashoffset="440" class="transition-all duration-1000" />
                </svg>
                <div class="absolute inset-0 flex items-center justify-center font-900 text-4xl text-slate-800" id="score-text">0%</div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="location.reload()" class="py-4 bg-emerald-500 text-white rounded-2xl font-bold shadow-lg">إعادة</button>
                <a href="grade4.html" class="py-4 bg-slate-800 text-white rounded-2xl font-bold shadow-lg flex items-center justify-center">الرئيسية</a>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "المقصود بصنع القرار هو:", a: ["تنفيذ القوانين فقط", "تحديد بدائل متعددة واختيار الأفضل لحل مشكلة", "إصدار الأوامر العسكرية", "فرض الرأي بالقوة"], c: 1 },
            { q: "المقصود بالمشاركة في صنع القرار هو:", a: ["ترك القرار للحكومة فقط", "إشراك المواطنين في اتخاذ القرارات التي تؤثر على حياتهم", "تنفيذ القرارات دون مناقشة", "إلغاء رأي المجتمع"], c: 1 },
            { q: "القرار الذي يتخذه فرد بمفرده يسمى:", a: ["قرار جماعي", "قرار فردي", "قرار حكومي", "قرار اقتصادي"], c: 1 },
            { q: "القرار الذي يشارك في صنعه مجموعة من الأشخاص يسمى:", a: ["قرار فردي", "قرار جماعي", "قرار عشوائي", "قرار شخصي"], c: 1 },
            { q: "من أمثلة المشاركة في صنع القرار في التاريخ المصري:", a: ["حرب أكتوبر 1973م", "ثورة 1919م", "بناء الأهرامات", "اكتشاف قناة السويس"], c: 0 },
            { q: "شارك في اتخاذ قرار حرب أكتوبر 1973م:", a: ["الشعب فقط", "الجيش فقط", "قادة الجيش مع رئيس الجمهورية", "التجار فقط"], c: 2 },
            { q: "أول خطوة من خطوات صنع القرار السليم هي:", a: ["جمع المعلومات", "تنفيذ القرار", "تحديد المشكلة أو الهدف", "اختيار البديل الأفضل"], c: 2 },
            { q: "الخطوة التي يتم فيها معرفة الحقائق والبيانات عن المشكلة هي:", a: ["جمع المعلومات", "تنفيذ القرار", "تحديد المشكلة", "اختيار البديل"], c: 0 },
            { q: "وضع بدائل لحل المشكلة يحدث في خطوة:", a: ["تحديد المشكلة", "جمع المعلومات", "وضع بدائل للحل", "تنفيذ القرار"], c: 2 },
            { q: "التفكير في إيجابيات وسلبيات كل بديل يساعد على:", a: ["تجاهل المشكلة", "اختيار القرار الأفضل", "إلغاء البدائل", "تأجيل القرار"], c: 1 },
            { q: "اختيار البديل الأنسب بعد دراسة البدائل يسمى:", a: ["تنفيذ القرار", "اختيار أفضل البدائل", "جمع المعلومات", "تحديد المشكلة"], c: 1 },
            { q: "تنفيذ القرار يعني:", a: ["التفكير في المشكلة", "تطبيق البديل المناسب على أرض الواقع", "جمع معلومات جديدة", "إلغاء القرار"], c: 1 },
            { q: "إذا لم ينجح البديل الذي تم تنفيذه فإننا:", a: ["نتوقف عن التفكير", "نعود لاختيار بديل آخر", "نلغي المشكلة", "نتجاهل القرار"], c: 1 },
            { q: "من أمثلة صنع القرار داخل الأسرة:", a: ["اختيار قائد الفصل", "تحديد مكان قضاء الإجازة", "انتخاب رئيس المدينة", "إنشاء مستشفى"], c: 1 },
            { q: "من أمثلة صنع القرار داخل المدرسة:", a: ["اختيار مكان السفر", "اختيار قائد الفصل", "شراء أثاث المنزل", "بناء طريق جديد"], c: 1 },
            { q: "من أمثلة صنع القرار داخل المجتمع:", a: ["اختيار قائد الفصل", "تحديد الإجازة المدرسية", "اختيار رئيس مجلس المدينة", "شراء ملابس جديدة"], c: 2 },
            { q: "المشاركة في صنع القرار داخل الأسرة تساعدنا على تعلم:", a: ["الأنانية", "التعاون وتحمل المسؤولية", "الكسل", "تجاهل الآخرين"], c: 1 },
            { q: "من أهمية صنع القرار أنه يساعد على:", a: ["زيادة المشكلات", "عيش حياة أفضل", "تقليل التعاون", "إلغاء الآراء المختلفة"], c: 1 },
            { q: "احترام آراء الآخرين أثناء اتخاذ القرار يؤدي إلى:", a: ["الخلاف الدائم", "تعزيز روح الفريق والتعاون", "إلغاء المشاركة", "ضعف المجتمع"], c: 1 },
            { q: "التدريب على مهارات اتخاذ القرار يساعد الإنسان على أن يصبح:", a: ["إنسانًا غير مسؤول", "إنسانًا مسؤولًا", "إنسانًا منعزلًا", "إنسانًا ضعيف الشخصية"], c: 1 }
        ];

        let index = 0, score = 0, picked = null;

        function toggleExitModal(show) {
            document.getElementById('exit-modal').style.display = show ? 'flex' : 'none';
        }

        function render() {
            picked = null;
            const q = questions[index];
            document.getElementById('main-question').innerText = q.q;
            document.getElementById('q-count').innerText = index + 1;
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            
            q.a.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-box p-6 rounded-2xl text-right font-bold flex items-center gap-4 group';
                btn.innerHTML = `<div class="opt-prefix">${String.fromCharCode(65 + i)}</div><span class="text-lg">${opt}</span>`;
                btn.onclick = () => {
                    document.querySelectorAll('.option-box').forEach(b => b.classList.remove('selected', 'animate-pop'));
                    btn.classList.add('selected', 'animate-pop');
                    picked = i;
                };
                grid.appendChild(btn);
            });
            document.getElementById('progress-bar').style.width = ((index / questions.length) * 100) + '%';
        }

        function goToNext() {
            if (picked === null) return alert("اختر إجابة أولاً!");
            if (picked === questions[index].c) score++;
            index++;
            if (index < questions.length) render(); else finish();
        }

        function finish() {
            document.getElementById('quiz-wrapper').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            const pct = Math.round((score / questions.length) * 100);
            document.getElementById('score-text').innerText = pct + '%';
            document.getElementById('score-circle').style.strokeDashoffset = 440 - (440 * pct) / 100;
        }

        render();
    </script>
</body>
</html>
