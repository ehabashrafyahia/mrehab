<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار سكان مصر | مراجعة ذاتية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            user-select: none;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            border-radius: 2rem;
        }
        .option-box {
            background: white; border: 2px solid #e2e8f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: right; cursor: pointer;
        }
        .option-box:hover { border-color: #10b981; transform: scale(1.02); }
        .option-box.selected {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-color: transparent; color: white;
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
        }
        .opt-prefix {
            background: #f1f5f9; width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; font-weight: 900; color: #64748b;
        }
        .option-box.selected .opt-prefix { background: rgba(255, 255, 255, 0.2); color: white; }
        .progress-glow {
            height: 100%; background: linear-gradient(90deg, #10b981, #3b82f6);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); border-radius: 100px;
            transition: width 0.6s ease;
        }
        .btn-confirm {
            background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
            box-shadow: 0 15px 30px -10px rgba(79, 70, 229, 0.4);
        }
        #exit-modal { display: none; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="exit-modal" class="fixed inset-0 z-[2000] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <h3 class="text-xl font-900 text-slate-800 mb-2">هل تريد الخروج؟</h3>
            <p class="text-slate-500 mb-6 font-bold">سيتم فقدان تقدمك في الاختبار</p>
            <div class="flex gap-3 mt-6">
                <a href="grade4.html" class="flex-1 py-3 bg-red-50 text-red-600 rounded-2xl font-bold text-center">خروج</a>
                <button onclick="toggleExitModal(false)" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-bold">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="quiz-wrapper" class="max-w-3xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <button onclick="toggleExitModal(true)" class="p-3 bg-white rounded-2xl shadow-sm text-slate-500 hover:text-red-500 border border-slate-100">
                <i class="fas fa-sign-out-alt rotate-180"></i>
            </button>
            <div class="bg-white px-6 py-2 rounded-2xl shadow-sm border border-slate-100 font-900 text-indigo-600">
                <span id="q-count">1</span> / 15
            </div>
            <div class="p-3 bg-indigo-50 rounded-2xl text-indigo-500">
                <i class="fas fa-graduation-cap"></i>
            </div>
        </div>

        <div class="h-3 bg-slate-200 rounded-full mb-12 overflow-hidden">
            <div id="progress-bar" class="progress-glow" style="width: 0%;"></div>
        </div>

        <div class="glass-card p-8 md:p-12 mb-10 relative">
            <h2 id="main-question" class="text-2xl md:text-3xl font-900 text-slate-800 leading-snug text-center mb-12"></h2>
            <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
        </div>

        <button onclick="goToNext()" class="btn-confirm w-full py-6 rounded-3xl text-white font-900 text-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
            <span>تأكيد الإجابة</span>
            <i class="fas fa-chevron-left"></i>
        </button>
    </div>

    <div id="result-view" class="hidden max-w-xl mx-auto text-center pt-10">
        <div id="capture-area" class="glass-card p-12 shadow-2xl mb-6 bg-white">
            <div class="text-7xl mb-6">🎯</div>
            <h1 class="text-4xl font-900 text-slate-800 mb-4">نتيجة الاختبار</h1>
            <p class="text-slate-500 font-bold mb-4">اختبار سكان مصر - الصف الرابع</p>
            <div class="relative inline-block mb-6">
                <svg class="w-40 h-40 transform -rotate-90">
                    <circle cx="80" cy="80" r="70" stroke="#f1f5f9" stroke-width="12" fill="transparent" />
                    <circle id="score-circle" cx="80" cy="80" r="70" stroke="#10b981" stroke-width="12" fill="transparent" stroke-dasharray="440" stroke-dashoffset="440" class="transition-all duration-1000" />
                </svg>
                <div class="absolute inset-0 flex items-center justify-center font-900 text-4xl text-slate-800" id="score-text">0%</div>
            </div>
            <div id="result-message" class="text-xl font-bold text-indigo-600 mb-2"></div>
        </div>

        <div class="flex flex-col gap-4">
            <button onclick="saveAsImage()" class="w-full py-5 bg-blue-600 text-white rounded-2xl font-black shadow-lg flex items-center justify-center gap-3 hover:bg-blue-700 transition">
                <i class="fas fa-download text-2xl"></i>
                حفظ النتيجة كصورة
            </button>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="location.reload()" class="py-4 bg-emerald-100 text-emerald-700 rounded-2xl font-bold hover:bg-emerald-200 transition">إعادة الاختبار</button>
                <a href="grade4.html" class="py-4 bg-slate-800 text-white rounded-2xl font-bold flex items-center justify-center hover:bg-slate-900 transition">الرئيسية</a>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "أي من المحافظات التالية تُصنف كواحدة من 'أكثر المحافظات ازدحاماً' بالسكان في مصر؟", a: ["الوادي الجديد", "مطروح", "الجيزة", "شمال سيناء"], c: 2 },
            { q: "يرجع تركز السكان في محافظة 'القاهرة' بشكل كبير إلى:", a: ["ممارستهم لحرفة الرعي والزراعة", "أنها العاصمة وتوافر الخدمات والوزارات بها", "وقوعها في منطقة صحراوية واسعة", "انخفاض نسبة المواليد بها"], c: 1 },
            { q: "يقصد بـ 'التركيب النوعي' للسكان تصنيفهم حسب:", a: ["الفئات العمرية", "الحالة التعليمية", "النوع (ذكور وإناث)", "النشاط الاقتصادي"], c: 2 },
            { q: "تعتبر فئة 'كبار السن' (أكبر من 65 سنة) في الهرم السكاني المصري فئة:", a: ["تمثل النسبة الأكبر من السكان", "تمثل الفئة العاملة والمنتجة", "تمثل الفئة الأقل وتحتاج لرعاية", "تمثل قاعدة الهرم السكاني"], c: 2 },
            { q: "يختلف النشاط الاقتصادي (المهن) من محافظة لأخرى، فنجد سكان 'الوادي الجديد' يعملون بـ:", a: ["الصناعة والخدمات", "السياحة والتجارة", "الزراعة والرعي", "صيد الأسماك"], c: 2 },
            { q: "يقل عدد السكان في محافظة 'الوادي الجديد' بسبب:", a: ["صغر مساحة المحافظة الشديد", "ندرة المياه العذبة والطبيعة الصحراوية", "كثرة المصانع والشركات", "ازدحام الشوارع وارتفاع المباني"], c: 1 },
            { q: "تختلف نسبة الذكور عن الإناث من محافظة لأخرى في مصر ويرجع ذلك أساساً إلى:", a: ["اختلاف عدد المواليد", "الهجرة الداخلية (انتقال الشباب للعمل)", "اختلاف مساحة المحافظات", "العادات والتقاليد المختلفة"], c: 1 },
            { q: "تعتبر فئة 'الشباب' (15-64 سنة) هي الفئة الأهم في الهرم السكاني لأنها:", a: ["تحتاج إلى رعاية صحية واجتماعية كبيرة", "تمثل قاعدة الهرم السكاني العريضة", "تمثل النسبة الأكبر وهي الفئة المنتجة", "الفئة التي لا تعمل وتعتمد على غيرها"], c: 2 },
            { q: "يبلغ إجمالي عدد سكان مصر طبقاً لإحصائيات عام 2025م حوالي:", a: ["50 مليون نسمة", "108 مليون نسمة", "80 مليون نسمة", "120 مليون نسمة"], c: 1 },
            { q: "تعتبر محافظة 'جنوب سيناء' من المحافظات:", a: ["المزدحمة جداً بالسكان", "متوسطة السكان", "قليلة السكان", "العاصمة الإدارية"], c: 2 },
            { q: "يقصد بـ 'التركيب العمري' للسكان تصنيفهم حسب:", a: ["النوع (ذكور وإناث)", "الفئات العمرية (أعمارهم)", "المهن والوظائف", "الحالة التعليمية"], c: 1 },
            { q: "تزداد نسبة الأطفال (أقل من 15 سنة) في بعض المحافظات بسبب:", a: ["كثرة فرص العمل", "كثرة الإنجاب (المواليد)", "الهجرة الداخلية", "اهتمام الأسر بالتعليم"], c: 1 },
            { q: "يتركز سكان محافظة 'سوهاج' في:", a: ["المناطق الجبلية الوعرة", "المدن الساحلية فقط", "القرى على ضفاف النيل", "الصحراء الغربية"], c: 2 },
            { q: "أي من الفئات التالية تمثل 'قاعدة' الهرم السكاني في مصر:", a: ["الشباب (15-64 سنة)", "كبار السن (أكثر من 65 سنة)", "الأطفال (أقل من 15 سنة)", "الموظفون في الحكومة"], c: 2 },
            { q: "تتميز محافظة 'القاهرة' بارتفاع نسبة المتعلمين بها نتيجة:", a: ["عمل سكانها في الزراعة", "اهتمام الأسر بالتعليم وتوفر المدارس", "انخفاض عدد المواليد بها", "وقوعها في منطقة صحراوية"], c: 1 }
        ];

        let index = 0, score = 0, picked = null;

        window.onload = () => { render(); };

        function toggleExitModal(show) { 
            document.getElementById('exit-modal').style.display = show ? 'flex' : 'none'; 
        }

        function render() {
            picked = null;
            const q = questions[index];
            document.getElementById('main-question').innerText = q.q;
            document.getElementById('q-count').innerText = index + 1;
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            
            q.a.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = 'option-box p-6 rounded-2xl flex items-center gap-4 group';
                btn.innerHTML = `<div class="opt-prefix">${String.fromCharCode(65 + i)}</div><span class="text-lg font-bold">${opt}</span>`;
                btn.onclick = () => {
                    document.querySelectorAll('.option-box').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    picked = i;
                };
                grid.appendChild(btn);
            });
            document.getElementById('progress-bar').style.width = ((index / questions.length) * 100) + '%';
        }

        function goToNext() {
            if (picked === null) {
                Swal.fire({ icon: 'warning', title: 'عفواً!', text: 'يرجى اختيار إجابة أولاً', confirmButtonColor: '#4f46e5' });
                return;
            }
            if (picked === questions[index].c) score++;
            index++;
            if (index < questions.length) render();
            else showFinalResult();
        }

        function showFinalResult() {
            document.getElementById('quiz-wrapper').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            const percent = Math.round((score / questions.length) * 100);
            document.getElementById('score-text').innerText = percent + '%';
            
            // تحديد رسالة التقدير
            let msg = percent >= 50 ? "أحسنت يا بطل! استمر" : "حاول مرة أخرى، أنت تستطيع!";
            if(percent >= 90) msg = "ممتاز! أنت عبقري!";
            document.getElementById('result-message').innerText = msg;

            const offset = 440 - (440 * percent / 100);
            document.getElementById('score-circle').style.strokeDashoffset = offset;
        }

        // دالة حفظ النتيجة كصورة
        function saveAsImage() {
    const area = document.getElementById('capture-area');
    
    // إظهار رسالة انتظار بسيطة
    Swal.fire({
        title: 'جاري الحفظ...',
        timer: 800,
        showConfirmButton: false,
        didOpen: () => { Swal.showLoading(); }
    });

    html2canvas(area, { backgroundColor: "#f5f3ff", scale: 2 }).then(canvas => {
        // تحويل الصورة إلى نص (Base64)
        const imageData = canvas.toDataURL("image/png").replace("data:image/png;base64,", "");
        
        // إرسال النص إلى التطبيق (الأندرويد)
        if (window.Android && window.Android.saveImage) {
            window.Android.saveImage(imageData);
        } else {
            // حل احتياطي للمتصفحات العادية (كروم، سفاري)
            const link = document.createElement('a');
            link.download = `نتيجة_الاختبار.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        }
    });
}

    </script>
</body>
</html>
