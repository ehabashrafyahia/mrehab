<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار خصائص قارات العالم | مراجعة ذاتية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            min-height: 100vh;
            user-select: none;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(16, 185, 129, 0.1);
            border-radius: 2rem;
        }
        .option-box {
            background: white; border: 2px solid #e2e8f0;
            transition: all 0.3s ease; text-align: right; cursor: pointer;
        }
        .option-box:hover { border-color: #10b981; transform: scale(1.02); }
        .option-box.selected {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-color: transparent; color: white;
        }
        .opt-prefix {
            background: #f1f5f9; width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; font-weight: 900; color: #64748b;
        }
        .option-box.selected .opt-prefix { background: rgba(255, 255, 255, 0.2); color: white; }
        .progress-glow {
            height: 100%; background: linear-gradient(90deg, #10b981, #3b82f6);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); border-radius: 100px;
            transition: width 0.6s ease;
        }
        .btn-confirm {
            background: linear-gradient(135deg, #059669 0%, #064e3b 100%);
            box-shadow: 0 15px 30px -10px rgba(5, 150, 105, 0.4);
        }
        #exit-modal { display: none; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="exit-modal" class="fixed inset-0 z-[2000] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <h3 class="text-xl font-900 text-slate-800 mb-2">هل تريد الخروج؟</h3>
            <div class="flex gap-3 mt-6">
                <a href="grade5.html" class="flex-1 py-3 bg-red-50 text-red-600 rounded-2xl font-bold text-center">خروج</a>
                <button onclick="toggleExitModal(false)" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-bold">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="quiz-wrapper" class="max-w-3xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <button onclick="toggleExitModal(true)" class="flex items-center gap-2 p-3 bg-white rounded-2xl shadow-sm text-slate-500 border border-slate-100">
                <i class="fas fa-sign-out-alt rotate-180"></i>
                <span class="font-bold text-sm text-slate-800">خروج</span>
            </button>
            <div class="bg-white px-6 py-2 rounded-2xl shadow-sm border border-slate-100 font-900 text-emerald-600">
                <span id="q-count">1</span> / 30
            </div>
            <div class="p-3 bg-emerald-50 rounded-2xl text-emerald-500"><i class="fas fa-map-marked-alt"></i></div>
        </div>

        <div class="h-3 bg-slate-200 rounded-full mb-12 overflow-hidden">
            <div id="progress-bar" class="progress-glow" style="width: 5%;"></div>
        </div>

        <div class="glass-card p-8 md:p-12 mb-10">
            <h2 id="main-question" class="text-2xl md:text-3xl font-900 text-slate-800 leading-snug text-center mb-12">جاري التحميل...</h2>
            <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
        </div>

        <button onclick="goToNext()" class="btn-confirm w-full py-6 rounded-3xl text-white font-900 text-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
            <span>تأكيد الإجابة</span>
            <i class="fas fa-chevron-left"></i>
        </button>
    </div>

    <div id="result-view" class="hidden max-w-xl mx-auto text-center pt-10">
        <div class="glass-card p-12 shadow-2xl bg-white mb-6 border-2 border-emerald-100">
            <div class="text-7xl mb-6">🌍</div>
            <h1 class="text-4xl font-900 text-slate-800 mb-2">نتيجة الاختبار</h1>
            <p class="text-slate-500 font-bold mb-8">الغذاء و حياتنا</p>
            
            <div class="relative inline-block mb-10">
                <svg class="w-40 h-40 transform -rotate-90">
                    <circle cx="80" cy="80" r="70" stroke="#f1f5f9" stroke-width="12" fill="transparent" />
                    <circle id="score-circle" cx="80" cy="80" r="70" stroke="#10b981" stroke-width="12" fill="transparent" stroke-dasharray="440" stroke-dashoffset="440" class="transition-all duration-1000" />
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <span class="font-900 text-4xl text-slate-800" id="score-text">0%</span>
                </div>
            </div>
            <div id="result-msg" class="text-xl font-black text-emerald-600"></div>
        </div>

        <div class="flex flex-col gap-4">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="location.reload()" class="py-4 bg-emerald-100 text-emerald-700 rounded-2xl font-bold shadow-lg hover:bg-emerald-200 transition">إعادة الاختبار</button>
                <a href="grade5.html" class="py-4 bg-slate-800 text-white rounded-2xl font-bold shadow-lg flex items-center justify-center hover:bg-slate-700 transition">الرئيسية</a>
            </div>
        </div>
    </div>

    <script>
        const questions = [
    { q: "ما هو المقصود بالغذاء؟", a: ["هو مصدر الطاقة والنمو للإنسان", "هو نوع من أنواع الترفيه", "هو الوسيلة الوحيدة للراحة", "هو بديل عن شرب الماء"], c: 0 },
    { q: "أي من الأطعمة التالية يُعد مثالاً على الغذاء الصحي؟", a: ["المشروبات الغازية", "الحبوب الكاملة والبروتين", "الوجبات السريعة", "الأطعمة الغنية بالدهون الضارة"], c: 1 },
    { q: "الغذاء الذي يحتوي على كميات كبيرة من الدهون الضارة أو السكريات يسمى:", a: ["غذاءً متكاملاً", "غذاءً صحياً", "غذاءً غير صحي", "غذاءً نباتياً"], c: 2 },
    { q: "من فوائد التغذية السليمة للجسم أنها:", a: ["تزيد من الشعور بالكسل", "تضعف جهاز المناعة", "تساعد على النمو السليم", "تقلل من النشاط الرياضي"], c: 2 },
    { q: "أي مما يلي يعد من المحاصيل الغذائية الرئيسية في مصر؟", a: ["القمح والذرة", "القطن والكتان", "الزهور ونباتات الزينة", "المطاط والغابات"], c: 0 },
    { q: "يعتبر قصب السكر وبنجر السكر من المحاصيل:", a: ["البقولية", "السكرية", "الزيتية", "النسيجية"], c: 1 },
    { q: "من أمثلة الفاكهة التي تنتجها مصر وتعتبر من مصادر الغذاء:", a: ["الطماطم والخيار", "القمح والأرز", "البرتقال والعنب", "العدس والفول"], c: 2 },
    { q: "أنشأ المصريون القدماء ________ لتنظيم الري قديماً.", a: ["السد العالي", "القناطر الخيرية", "سد اللاهون", "قناطر اسنا"], c: 2 },
    { q: "قامت الدولة بمشروع ________ في الصحراء الغربية لاستصلاح الأراضي.", a: ["مشروع الفرافرة", "السد العالي", "قناة السويس", "مزارع غليون"], c: 0 },
    { q: "يقع مشروع 'شرق العوينات' في الجزء ________ من مصر.", a: ["الشمالي الشرقي", "الجنوبي الغربي", "الشمالي الغربي", "الجنوبي الشرقي"], c: 1 },
    { q: "من جهود الدولة لتحقيق الأمن الغذائي في الزراعة:", a: ["استخدام أساليب الري التقليدية", "إهمال الفلاحين", "استصلاح الأراضي الصحراوية", "تقليل مساحة الأراضي الزراعية"], c: 2 },
    { q: "تعد الثروة الحيوانية مهمة لأنها توفر للإنسان البروتين:", a: ["النباتي", "الحيواني", "المعدني", "الصناعي"], c: 1 },
    { q: "من الحيوانات التي تندرج تحت فئة 'الماشية' في مصر:", a: ["الدجاج والبط", "الأبقار والجاموس", "الأسماك والجمبري", "النحل والحرير"], c: 1 },
    { q: "تعد الدواجن مصدراً مهماً للحوم ________ والبيض.", a: ["الحمراء", "البيضاء", "المجمدة", "المصنعة"], c: 1 },
    { q: "أكبر محافظات مصر في تربية الثروة الحيوانية لعام 2022 هي محافظة:", a: ["الشرقية", "المنيا", "البحيرة", "المنوفية"], c: 2 },
    { q: "أي محافظة تأتي في المركز الثاني بعد البحيرة في تربية الحيوانات؟", a: ["الدقهلية", "المنوفية", "الشرقية", "المنيا"], c: 2 },
    { q: "استخدم المصريون القدماء الماشية في أعمال:", a: ["الصيد البحري", "الحرث والنقل", "الصناعات التكنولوجية", "الرياضات السريعة"], c: 1 },
    { q: "من جهود الدولة لتنمية الثروة الحيوانية:", a: ["تقليل عدد المزارع", "تحسين السلالات الحيوانية", "إغلاق الوحدات البيطرية", "الاعتماد على استيراد الأعلاف فقط"], c: 1 },
    { q: "تحتل المزارع السمكية نسبة ________ من إنتاج الأسماك في مصر.", a: ["20%", "50%", "80%", "100%"], c: 2 },
    { q: "من المصايد الطبيعية للأسماك في مصر:", a: ["بركة غليون", "مشروع الفيروز", "البحر الأحمر والمتوسط", "المزارع السمكية بالشرقية"], c: 2 },
    { q: "مشروع 'بركة غليون' في محافظة كفر الشيخ مخصص لإنتاج:", a: ["اللحوم الحمراء", "الأسماك", "المحاصيل السكرية", "الدواجن"], c: 1 },
    { q: "المصيد الطبيعي العذب الوحيد المذكور في الخريطة هو:", a: ["البحر المتوسط", "بحيرة ناصر", "بحيرة البرلس", "بحيرة المنزلة"], c: 1 },
    { q: "تساهم المصايد الطبيعية بنسبة ________ من إنتاج مصر للأسماك.", a: ["10%", "20%", "80%", "90%"], c: 1 },
    { q: "أي مما يلي يعد من الكائنات البحرية التي تنتجها مصر بجانب الأسماك؟", a: ["المرجان فقط", "الجمبري والسبيط", "التماسيح", "حيوان الفقمة"], c: 1 },
    { q: "من جهود الدولة لتنمية الثروة السمكية حماية المسطحات المائية من:", a: ["الصيد الجائر", "التلوث", "التبخر", "الملاحة الدولية"], c: 1 },
    { q: "اعتمد المصريون القدماء في غذائهم بشكل رئيسي على:", a: ["المعلبات الجاهزة", "القمح والخضروات والأسماك", "الوجبات السريعة", "السكريات فقط"], c: 1 },
    { q: "الحفاظ على الأرض الزراعية وعدم البناء عليها هو مسؤولية:", a: ["الدولة فقط", "الفلاح فقط", "كل مواطن", "المهندسين فقط"], c: 2 },
    { q: "المشروع السمكي الذي يقع في شمال سيناء هو:", a: ["توشكى", "الدلتا الجديدة", "مشروع الفيروز", "شرق العوينات"], c: 2 },
    { q: "أي من البحيرات التالية تقع في شمال مصر وتعتبر مصيداً طبيعياً؟", a: ["بحيرة ناصر", "بحيرة قارون", "بحيرة المنزلة", "بحيرة توشكى"], c: 2 },
    { q: "الهدف النهائي من جهود الدولة في الزراعة والحيوانات والأسماك هو تحقيق:", a: ["التصدير فقط", "الأمن الغذائي", "زيادة الأسعار", "تقليل الاستهلاك"], c: 1 }
];


        let index = 0, score = 0, picked = null;

        window.onload = () => {
            render();
        };

        function render() {
            picked = null;
            const q = questions[index];
            document.getElementById('main-question').innerText = q.q;
            document.getElementById('q-count').innerText = index + 1;
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            q.a.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = 'option-box p-6 rounded-2xl flex items-center gap-4 group';
                btn.innerHTML = `<div class="opt-prefix">${String.fromCharCode(65 + i)}</div><span class="text-lg font-bold">${opt}</span>`;
                btn.onclick = () => {
                    document.querySelectorAll('.option-box').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    picked = i;
                };
                grid.appendChild(btn);
            });
            document.getElementById('progress-bar').style.width = ((index / questions.length) * 100) + '%';
        }

        function goToNext() {
            if (picked === null) return Swal.fire({text:'اختر إجابة أولاً يا بطل!', icon:'warning', confirmButtonColor: '#10b981'});
            if (picked === questions[index].c) score++;
            index++;
            if (index < questions.length) render(); else finish();
        }

        function finish() {
            document.getElementById('quiz-wrapper').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            const pct = Math.round((score / questions.length) * 100);
            document.getElementById('score-text').innerText = pct + '%';
            document.getElementById('score-circle').style.strokeDashoffset = 440 - (440 * pct) / 100;
            
            let msg = pct >= 50 ? "أداء ممتاز! أنت جغرافي بارع" : "حاول مرة أخرى لتتقن تضاريس العالم";
            document.getElementById('result-msg').innerText = msg;
        }

        function toggleExitModal(s) { document.getElementById('exit-modal').style.display = s?'flex':'none'; }
    </script>
</body>
</html>
