<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <link rel="manifest" href="./manifest.json">
    <title>منصة أطلس التعليمية | أ. إيهاب أشرف</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800;900&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* إخفاء الجسم لحين التحقق من الهوية */
        body { display: none; font-family: 'Cairo', sans-serif; background-color: #f8fafc; color: #1e293b; }
        
        /* --- شاشة الـ Splash --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000; transition: opacity 0.8s ease;
        }
        .hidden-splash { opacity: 0; visibility: hidden; }
        .loader-bar { width: 140px; height: 3px; background: #f1f5f9; position: relative; overflow: hidden; margin-top: 20px; }
        .loader-bar::after {
            content: ""; position: absolute; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, #10b981, transparent);
            animation: loadingProgress 1.5s infinite linear;
        }
        @keyframes loadingProgress { 0% { left: -100%; } 100% { left: 100%; } }

        /* --- التصميم البصري --- */
        .logo-container { position: relative; width: 130px; height: 100px; margin: 0 auto; display: flex; align-items: center; justify-content: center; }
        .logo-shape {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            animation: morph 6s linear infinite;
        }
        .logo-text { position: relative; z-index: 10; color: white; font-family: 'Reem Kufi', sans-serif; font-size: 2.2rem; }
        @keyframes morph { 0%, 100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; } 50% { border-radius: 50% 50% 33% 67% / 55% 27% 73% 45%; } }

        .list-card {
            border-radius: 24px; padding: 18px 24px; margin-bottom: 15px;
            display: flex; align-items: center; transition: 0.4s; color: white;
        }
        .grad-primary { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .grad-prep { background: linear-gradient(135deg, #a855f7 0%, #7e22ce 100%); }
        .grad-secondary { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .grad-locked { background: #94a3b8; opacity: 0.6; pointer-events: none; }
        
        .number-box { width: 54px; height: 54px; border-radius: 18px; background: rgba(255, 255, 255, 0.2); display: flex; align-items: center; justify-content: center; font-weight: 900; margin-left: 15px; }
        
        /* شريط المتميزين */
        .news-ticker { background: white; border-top: 1px solid #e2e8f0; padding: 10px 0; overflow: hidden; display: flex; margin-top: 15px; }
        .ticker-content { display: flex; white-space: nowrap; animation: ticker-move 25s linear infinite; }
        @keyframes ticker-move { 0% { transform: translateX(0); } 100% { transform: translateX(100%); } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="logo-container" style="transform: scale(1.2);">
            <div class="logo-shape"></div>
            <div class="logo-text">اطلس</div>
        </div>
        <div class="loader-bar"></div>
        <p class="text-slate-400 font-bold text-[11px] mt-4">جاري التحقق من الحساب...</p>
    </div>

    <header class="pt-8 text-center px-4">
        <div class="logo-container"><div class="logo-shape"></div><div class="logo-text">اطلس</div></div>
        <h2 class="font-black text-slate-800 mt-3 text-xl">أهلاً بك يا <span id="welcome-name" class="text-emerald-600">بطل</span> 👋</h2>
        <button onclick="localStorage.clear(); window.location.href='index.html';" class="text-[10px] font-bold text-red-500 underline mt-2">تسجيل خروج</button>
    </header>

    <div class="news-ticker">
        <div class="ticker-content" id="ticker-names"></div>
    </div>

    <main class="px-4 mt-6 max-w-md mx-auto">
        <div class="mb-4 font-black text-slate-600">المرحلة الابتدائية</div>
        <a href="grade4.html" class="list-card grad-primary"><div class="number-box">٤</div><div><h3>الصف الرابع الابتدائي</h3></div></a>
        <a href="grade5.html" class="list-card grad-primary"><div class="number-box">٥</div><div><h3>الصف الخامس الابتدائي</h3></div></a>
        <a href="grade6.html" class="list-card grad-primary"><div class="number-box">٦</div><div><h3>الصف السادس الابتدائي</h3></div></a>

        <div class="mb-4 mt-6 font-black text-slate-600">المرحلة الإعدادية</div>
        <a href="grade7.html" class="list-card grad-prep"><div class="number-box">١</div><div><h3>الصف الأول الإعدادي</h3></div></a>
    </main>

    <script>
        // 1. نظام الحماية الصارم (قبل كل شيء)
        async function secureAuth() {
            const u = localStorage.getItem("username");
            const p = localStorage.getItem("password");

            if (!u || !p) {
                window.location.href = "index.html";
                return;
            }

            const scriptURL = "https://script.google.com/macros/s/AKfycbwblRnifgkx3zLlRfW60GgdQRyaYHf9cRwO2LpN6p-6JlXGGRAFGW3JxrnOmDa-ZATr/exec";

            try {
                const res = await fetch(`${scriptURL}?action=validate&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`);
                const status = await res.text();

                if (status.trim() === "valid") {
                    // البيانات صحيحة -> اظهر الصفحة وابدأ الـ Splash
                    document.body.style.display = "block";
                    startInterface();
                } else {
                    // البيانات تغيرت في الشيت -> طرد فوري
                    localStorage.clear();
                    alert("⚠️ تم تحديث بياناتك.. يرجى تسجيل الدخول مجدداً");
                    window.location.href = "index.html";
                }
            } catch (e) {
                // في حالة انقطاع النت، نسمح بالدخول إذا كان هناك جلسة سابقة
                document.body.style.display = "block";
                startInterface();
            }
        }

        function startInterface() {
            // اسم الطالب
            document.getElementById('welcome-name').innerText = localStorage.getItem("student_identity") || "بطل";
            
            // شريط المتميزين
            const students = ["ياسين محمد", "مريم خالد", "أحمد إبراهيم", "سلمى يوسف"];
            const ticker = document.getElementById('ticker-names');
            ticker.innerHTML = students.map(s => `<span class="px-6 font-bold text-slate-600">🏆 ${s}</span>`).join('').repeat(5);

            // إخفاء الـ Splash
            setTimeout(() => {
                document.getElementById('splash-screen').classList.add('hidden-splash');
            }, 1500);
        }

        // تشغيل الفحص فوراً
        secureAuth();
    </script>
</body>
</html>
