<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مراجعة الموارد الاقتصادية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            min-height: 100vh;
            user-select: none;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(16, 185, 129, 0.2);
            box-shadow: 0 25px 50px -12px rgba(16, 185, 129, 0.15);
            border-radius: 2.5rem;
        }
        .option-box {
            background: white; border: 2px solid #e2e8f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); text-align: right; cursor: pointer;
        }
        .option-box:hover { border-color: #10b981; transform: translateY(-3px); }
        .option-box.selected {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-color: transparent; color: white;
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
        }
        .opt-prefix {
            background: #f1f5f9; width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px; font-weight: 900; color: #10b981;
        }
        .option-box.selected .opt-prefix { background: rgba(255, 255, 255, 0.2); color: white; }
        .progress-glow {
            height: 100%; background: linear-gradient(90deg, #10b981, #fbbf24);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); border-radius: 100px;
            transition: width 0.4s ease;
        }
        .btn-confirm {
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            box-shadow: 0 15px 30px -10px rgba(16, 185, 129, 0.4);
        }
        #exit-modal { display: none; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="exit-modal" class="fixed inset-0 z-[2000] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] p-8 max-w-sm w-full text-center shadow-2xl">
            <h3 class="text-xl font-900 text-slate-800 mb-2">هل تريد إنهاء الاختبار؟</h3>
            <div class="flex gap-3 mt-6">
                <a href="home.html" class="flex-1 py-4 bg-red-50 text-red-600 rounded-2xl font-bold text-center">خروج</a>
                <button onclick="toggleExitModal(false)" class="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="quiz-wrapper" class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <button onclick="toggleExitModal(true)" class="flex items-center gap-2 p-3 bg-white rounded-2xl shadow-sm text-slate-500 border border-slate-100 transition-colors hover:text-red-500">
                <i class="fas fa-times text-xl"></i>
                <span class="font-bold text-sm text-slate-800">خروج</span>
            </button>

            <div class="bg-white px-8 py-3 rounded-2xl shadow-sm border border-emerald-100 font-900 text-emerald-600 text-xl">
                <span id="q-count">1</span> / 40
            </div>

            <div class="p-3 bg-emerald-50 rounded-2xl text-emerald-500 shadow-sm opacity-0 md:opacity-100"><i class="fas fa-list-check"></i></div>
        </div>

        <div class="h-3 bg-slate-200 rounded-full mb-12 overflow-hidden">
            <div id="progress-bar" class="progress-glow" style="width: 0%;"></div>
        </div>

        <div class="glass-card p-8 md:p-12 mb-10">
            <h2 id="main-question" class="text-xl md:text-2xl font-900 text-slate-800 leading-snug text-center mb-12">جاري التحميل...</h2>
            <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
        </div>

        <button onclick="goToNext()" class="btn-confirm w-full py-6 rounded-[2rem] text-white font-900 text-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
            <span>تأكيد الإجابة</span>
            <i class="fas fa-check-circle"></i>
        </button>
    </div>

    <div id="result-view" class="hidden max-w-2xl mx-auto text-center pt-5">
        <div class="glass-card p-12 bg-white mb-6 border-2 border-emerald-100">
            <div id="result-emoji" class="text-7xl mb-6">🏆</div>
            <h1 id="result-title" class="text-4xl font-900 text-slate-800 mb-2">أحسنت يا بطل!</h1>
            <p class="text-slate-500 font-bold mb-8">لقد أكملت بنك الأسئلة الشامل بنجاح</p>
            
            <div class="flex justify-center gap-10 mb-10">
                <div class="text-center">
                    <div class="text-slate-400 text-sm font-bold">الدرجة</div>
                    <div class="text-3xl font-900 text-emerald-600" id="final-score">0 / 40</div>
                </div>
                <div class="text-center">
                    <div class="text-slate-400 text-sm font-bold">النسبة</div>
                    <div class="text-3xl font-900 text-emerald-600" id="score-text">0%</div>
                </div>
            </div>
            <div id="result-msg" class="text-xl font-black text-slate-700"></div>
        </div>
        <button onclick="location.reload()" class="w-full py-5 bg-emerald-600 text-white rounded-3xl font-bold shadow-xl">إعادة المحاولة</button>
    </div>

    <script>
        const questions = [
            { q: "يقصد بالصناعة عملية تحويل المواد الخام لمنتجات لتلبية احتياجات الإنسان.", a: ["الزراعة", "الصناعة", "التجارة", "الرعي"], c: 1 },
            { q: "أي من الآتي يعد من المقومات البشرية اللازمة لقيام الصناعة في الوطن العربي؟", a: ["الموقع الجغرافي", "المواد الخام", "الأيدي العاملة", "مصادر الطاقة"], c: 2 },
            { q: "تصنف صناعة 'استخراج البترول والغاز الطبيعي' ضمن الصناعات:", a: ["التحويلية", "الاستخراجية", "الاستهلاكية", "الحديثة"], c: 1 },
            { q: "تعتمد الصناعات التحويلية على تحويل المواد الخام إلى منتجات جديدة مثل:", a: ["الفوسفات والحديد", "صناعة الغزل والنسيج", "البترول الخام", "المعادن النفيسة"], c: 1 },
            { q: "ترتبط الصناعات الحديثة (التكنولوجية) في المقام الأول بـ:", a: ["الحرف اليدوية", "التطور العلمي والتكنولوجي", "استخراج الفحم", "رعي الأغنام"], c: 1 },
            { q: "تتركز صناعة البتروكيماويات بشكل كبير في دول:", a: ["السودان والصومال", "السعودية والإمارات والكويت", "موريتانيا وجيبوتي", "لبنان والأردن"], c: 1 },
            { q: "تساهم الصناعة في دعم الاقتصاد العربي من خلال:", a: ["زيادة التبعية للخارج", "زيادة الدخل القومي وتوفير فرص عمل", "تقليل عدد السكان", "إهمال الموارد الطبيعية"], c: 1 },
            { q: "تعد صناعة الحديد والصلب والأسمنت هي الأساس لمشروعات:", a: ["الصيد البحري", "البناء والتعمير", "استصلاح الأراضي الزراعية", "النسيج والملابس"], c: 1 },
            { q: "من التحديات التي تواجه الصناعة في الوطن العربي:", a: ["وفرة المواد الخام", "ضعف الاستثمارات في البحث العلمي والتكنولوجي", "الموقع المتميز", "تنوع مصادر الطاقة"], c: 1 },
            { q: "يشمل النقل البري في الوطن العربي كل من:", a: ["السفن والموانئ", "الطرق السريعة وخطوط السكك الحديدية", "المطارات الدولية", "قناة السويس"], c: 1 },
            { q: "تعد قناة السويس من أهم طرق الملاحة العالمية وتقع في دولة:", a: ["السعودية", "مصر", "الإمارات", "العراق"], c: 1 },
            { q: "يقصد بالتجارة البينية تبادل السلع والخدمات بين:", a: ["الدول العربية ودول العالم", "الدول العربية وبعضها البعض", "القرى والمدن داخل الدولة", "الأفراد والشركات الأجنبية"], c: 1 },
            { q: "من أهم الصادرات العربية للعالم الخارجي:", a: ["الآلات والمعدات", "البترول والغاز الطبيعي والفواكه", "المنتجات الطبية", "السيارات الحديثة"], c: 1 },
            { q: "يعاني الوطن العربي من ضعف التجارة البينية بسبب:", a: ["جودة المنتجات العالية", "الحواجز الجمركية وتشابه الإنتاج", "سرعة النقل البري", "انخفاض الضرائب"], c: 1 },
            { q: "يُسمى البيع والشراء عبر شبكة المعلومات الدولية والمنصات بـ:", a: ["التجارة التقليدية", "التجارة الإلكترونية", "المقايضة", "التجارة الخارجية"], c: 1 },
            { q: "يقصد بالتكامل الاقتصادي العربي التعاون لتحقيق قوة قادرة على:", a: ["انعزال عن العالم", "المنافسة عالمياً وتحقيق الاكتفاء الذاتي", "زيادة الديون الخارجية", "منع انتقال الأيدي العاملة"], c: 1 },
            { q: "من مقومات التكامل الاقتصادي (المقومات البشرية):", a: ["الموارد المعدنية", "وحدة اللغة والثقافة والتاريخ", "مصادر الطاقة", "التنوع المناخي"], c: 1 },
            { q: "أي مما يلي يعد من معوقات تحقيق التكامل الاقتصادي العربي؟", a: ["تنوع الموارد الطبيعية", "الصراعات والاضطرابات الداخلية ببعض الدول", "زيادة الاستثمارات المشتركة", "الموقع الجغرافي المتميز"], c: 1 },
            { q: "تهدف اتفاقية منطقة التجارة الحرة العربية الكبرى عام 1997م إلى:", a: ["فرض رسوم جمركية جديدة", "تقليل الرسوم الجمركية بين الدول العربية", "منع التبادل التجاري", "تشجيع الاستيراد من الخارج"], c: 1 },
            { q: "يتحقق التكامل الاقتصادي العربي من خلال:", a: ["تشابه الإنتاج في كل الدول", "حسن استغلال الموارد وتنوع الإنتاج", "زيادة الحواجز الجمركية", "تصدير كل المواد الخام للخارج"], c: 1 },
            { q: "أي من الآتي يعد من 'المقومات الطبيعية' لقيام الصناعة؟", a: ["رأس المال", "المواد الخام ومصادر الطاقة", "الأسواق الواسعة", "وسائل النقل المتطورة"], c: 1 },
            { q: "تهدف الصناعة إلى تحويل المادة الخام من صورتها الأولية إلى صورة:", a: ["أقل قيمة", "أكثر نفعاً وقيمة للإنسان", "غازية فقط", "صعبة التداول"], c: 1 },
            { q: "من أمثلة الصناعات 'التحويلية' التي تعتمد على الإنتاج الزراعي:", a: ["استخراج الحديد", "صناعة تعليب الخضر والفاكهة", "توليد الكهرباء", "صناعة البرمجيات"], c: 1 },
            { q: "تساعد الصناعة في الوطن العربي على رفع مستوى المعيشة من خلال:", a: ["زيادة الأسعار", "زيادة الدخل القومي والقدرة الشرائية", "خفض الرواتب", "تقليل كمية الإنتاج"], c: 1 },
            { q: "أي من المدن التالية تعتبر من أكبر مراكز الصناعات البتروكيماوية في العالم؟", a: ["مدينة مطروح", "مدينة الجبيل بالمملكة العربية السعودية", "مدينة الخرطوم", "مدينة مقديشو"], c: 1 },
            { q: "يتميز النقل الجوي في الوطن العربي بـ:", a: ["البطء الشديد", "السرعة واختصار الوقت والمسافات", "القدرة على حمل أوزان ضخمة", "الاعتماد على الرياح فقط"], c: 1 },
            { q: "يُعد مطار ........ من أهم المطارات الدولية التي تربط القارات في وطننا العربي:", a: ["مطار صغير محلي", "مطار دبي أو مطار القاهرة", "مطار زراعي", "مطار عسكري مهجور"], c: 1 },
            { q: "أي مما يلي يندرج تحت قائمة 'الواردات' العربية من الخارج؟", a: ["المنسوجات القطنية", "السيارات والآلات والمنتجات الطبية", "البترول الخام", "التمور والفاكهة"], c: 1 },
            { q: "من الجهود التي تبذلها الدول العربية لتنشيط التجارة:", a: ["زيادة التعقيدات الإدارية", "تحسين جودة المنتجات العربية للمنافسة عالمياً", "رفع قيمة الجمارك بين الدول العربية", "الاهتمام بمنتج واحد فقط"], c: 1 },
            { q: "التسويق الإلكتروني يساعد الشركات الصغيرة على:", a: ["الإغلاق الفوري", "الوصول لأسواق عالمية بتكلفة أقل", "احتكار السوق المحلي فقط", "تقليل جودة المنتج"], c: 1 },
            { q: "وحدة التاريخ والمصير المشترك بين العرب تعتبر مقوماً ........ للتكامل:", a: ["طبيعيًا", "بشرياً واجتماعياً", "جيولوجياً", "اصطناعياً"], c: 1 },
            { q: "يمتلك الوطن العربي مساحات واسعة من الأراضي الصالحة للزراعة، وهذا يدعم التكامل في مجال:", a: ["التعدين", "الأمن الغذائي", "صناعة الطائرات", "السياحة الثقافية"], c: 1 },
            { q: "تشابه الإنتاج الزراعي وصناعي في الدول العربية يؤدي إلى:", a: ["زيادة قوة التكامل", "ضعف التبادل التجاري بينهم (التنافس)", "انخفاض نسبة الاستيراد", "تحقيق فائض ضخم للتصدير"], c: 1 },
            { q: "تأسست جامعة الدول العربية بهدف تنسيق العمل العربي المشترك في عام:", a: ["1990م", "1945م", "2010م", "1800م"], c: 1 },
            { q: "لتحقيق تكامل اقتصادي ناجح، يجب على الدول العربية:", a: ["زيادة الخلافات السياسية", "تنسيق الخطط الاقتصادية وتطوير التعليم الفني", "الاعتماد الكلي على الخبرات الأجنبية", "تقليل الاستثمارات"], c: 1 },
            { q: "ما النتيجة المترتبة على تحقيق التكامل الاقتصادي العربي؟", a: ["زيادة البطالة", "خفض التبعية الاقتصادية للخارج وتحقيق القوة", "ضعف الإنتاج المحلي", "غلاء الأسعار المستمر"], c: 1 },
            { q: "استثمار رؤوس الأموال العربية داخل الوطن العربي يقلل من:", a: ["الأرباح المالية", "هجرة الأموال للخارج", "فرص العمل المحلية", "جودة الطرق والكباري"], c: 1 },
            { q: "أي من الآتي يمثل صناعة استخراجية؟", a: ["صناعة الورق", "استخراج المنجنيز من باطن الأرض", "صناعة الأثاث", "صناعة السيارات"], c: 1 },
            { q: "تعتبر التجارة الإلكترونية مريحة للمستهلك لأنها:", a: ["تتطلب الذهاب للمتجر دائماً", "توفر مرونة في الوقت وطرق دفع متنوعة", "تمنع مقارنة الأسعار", "لا توفر خدمة التوصيل"], c: 1 },
            { q: "مجلس الوحدة الاقتصادية العربية هو مثال للمؤسسات التي تدعم:", a: ["التفكك الاقتصادي", "العمل العربي المشترك والتكامل", "السياحة الخارجية فقط", "الزراعة البدائية"], c: 1 }
        ];

        let index = 0, score = 0, picked = null;
        window.onload = () => render();

        function render() {
            picked = null;
            const q = questions[index];
            document.getElementById('main-question').innerText = q.q;
            document.getElementById('q-count').innerText = index + 1;
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            q.a.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = 'option-box p-5 rounded-2xl flex items-center gap-4';
                btn.innerHTML = `<div class="opt-prefix">${String.fromCharCode(65 + i)}</div><span class="text-md font-bold text-slate-700">${opt}</span>`;
                btn.onclick = () => {
                    document.querySelectorAll('.option-box').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    picked = i;
                };
                grid.appendChild(btn);
            });
            document.getElementById('progress-bar').style.width = ((index / questions.length) * 100) + '%';
        }

        function goToNext() {
            if (picked === null) return Swal.fire({text:'من فضلك اختر إجابة يا بطل!', icon:'warning', confirmButtonColor: '#10b981'});
            if (picked === questions[index].c) score++;
            index++;
            if (index < questions.length) render(); else finish();
        }

        function toggleExitModal(show) { document.getElementById('exit-modal').style.display = show ? 'flex' : 'none'; }

        function finish() {
            document.getElementById('quiz-wrapper').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            const pct = Math.round((score / questions.length) * 100);
            document.getElementById('score-text').innerText = pct + '%';
            document.getElementById('final-score').innerText = score + ' / 40';
            
            if (pct >= 90) {
                document.getElementById('result-title').innerText = "عبقري بامتياز! 🌟";
                document.getElementById('result-msg').innerText = "أنت مستعد تماماً للامتحان النهائي، فخور بك جداً.";
            } else if (pct >= 70) {
                document.getElementById('result-title').innerText = "رائع جداً! 👍";
                document.getElementById('result-msg').innerText = "مستوى ممتاز، راجع فقط الأخطاء البسيطة وستصل للدرجة النهائية.";
            } else {
                document.getElementById('result-title').innerText = "تحتاج للمذاكرة 📚";
                document.getElementById('result-msg').innerText = "لا بأس، أعد قراءة الدروس وحاول مرة أخرى لرفع درجتك.";
            }
        }
    </script>
</body>
</html>
