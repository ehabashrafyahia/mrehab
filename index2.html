<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول المنصة | مستر إيهاب أشرف</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); width: 100%; max-width: 380px; text-align: center; }
        .input-field { width: 100%; padding: 15px; background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 15px; margin-bottom: 15px; text-align: center; font-weight: bold; outline: none; transition: 0.3s; }
        .input-field:focus { border-color: #10b981; background: white; }
        .btn-login { width: 100%; padding: 15px; background: #10b981; color: white; border-radius: 15px; font-weight: 900; font-size: 1.1rem; shadow: 0 10px 20px rgba(16, 185, 129, 0.2); transition: 0.3s; }
        .btn-login:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="mb-6">
            <h1 class="text-3xl font-black text-slate-800">أطلس 🚀</h1>
            <p class="text-slate-400 text-sm font-bold mt-2">منصة مستر إيهاب أشرف</p>
        </div>

        <div id="login-form">
            <input type="text" id="user" class="input-field" placeholder="اسم المستخدم" autocomplete="off">
            <input type="password" id="pass" class="input-field" placeholder="كلمة المرور">
            <button onclick="handleLogin()" class="btn-login">دخول المنصة</button>
        </div>

        <div class="mt-8 pt-6 border-t border-slate-50">
            <p class="text-[10px] text-slate-400 font-bold">إعداد وتصميم: أ. إيهاب أشرف</p>
        </div>
    </div>

    <script>
        // رابط الشيت الخاص بك (CSV)
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5wBVZeNv3Ijg80p-YkD57IPnAXnzWFT1kyoIVXIn46zY-U9fcykFNd3vgAzjMkJlOk0J2hqazdIoI/pub?gid=0&single=true&output=csv";

        async function handleLogin() {
            const uInput = document.getElementById('user').value.toLowerCase().trim();
            const pInput = document.getElementById('pass').value.toLowerCase().trim();

            if (!uInput || !pInput) {
                Swal.fire({ icon: 'warning', title: 'تنبيه', text: 'برجاء كتابة البيانات كاملة' });
                return;
            }

            // إظهار علامة التحميل
            Swal.fire({ title: 'جاري التحقق...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });

            try {
                const response = await fetch(SHEET_URL);
                const csvData = await response.text();
                
                // تحويل الـ CSV إلى مصفوفة (Array)
                const rows = csvData.split("\n").map(row => row.split(","));
                
                let found = false;
                let userRole = "student";

                // البحث في الصفوف (تجاهل صف العنوان الأول)
                for (let i = 1; i < rows.length; i++) {
                    const user = rows[i][0]?.trim().toLowerCase();
                    const pass = rows[i][1]?.trim().toLowerCase();

                    if (user === uInput && pass === pInput) {
                        found = true;
                        // لو اليوزر هو mrehab خليه أدمن
                        if (user === "mrehab") userRole = "admin";
                        break;
                    }
                }

                if (found) {
                    localStorage.setItem("atlas_auth", "true");
                    localStorage.setItem("user_role", userRole);
                    localStorage.setItem("user_id", uInput);

                    Swal.fire({ icon: 'success', title: 'أهلاً بك يا بطل', showConfirmButton: false, timer: 1500 });
                    
                    setTimeout(() => {
                        window.location.href = (userRole === "admin") ? "dashboard.html" : "home.html";
                    }, 1500);
                } else {
                    Swal.fire({ icon: 'error', title: 'فشل الدخول', text: 'اسم المستخدم أو كلمة المرور غير صحيحة' });
                }

            } catch (error) {
                console.error(error);
                Swal.fire({ icon: 'error', title: 'خطأ في الاتصال', text: 'تأكد من اتصالك بالإنترنت' });
            }
        }

        // لو مسجل دخول قبل كدة يحوله فوراً
        window.onload = function() {
            if(localStorage.getItem("atlas_auth") === "true") {
                const role = localStorage.getItem("user_role");
                window.location.href = (role === "admin") ? "dashboard.html" : "home.html";
            }
        }
    </script>
</body>
</html>
