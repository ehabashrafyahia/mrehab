<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار صنع القرار | مراجعة مستر إيهاب أشرف</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            min-height: 100vh;
            user-select: none;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(16, 185, 129, 0.2);
            box-shadow: 0 25px 50px -12px rgba(16, 185, 129, 0.15);
            border-radius: 2.5rem;
        }
        .option-box {
            background: white; border: 2px solid #e2e8f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); text-align: right; cursor: pointer;
        }
        .option-box:hover { border-color: #10b981; transform: translateY(-3px); }
        .option-box.selected {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-color: transparent; color: white;
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
        }
        .opt-prefix {
            background: #f1f5f9; width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px; font-weight: 900; color: #10b981;
        }
        .option-box.selected .opt-prefix { background: rgba(255, 255, 255, 0.2); color: white; }
        .progress-glow {
            height: 100%; background: linear-gradient(90deg, #10b981, #fbbf24);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); border-radius: 100px;
            transition: width 0.6s ease;
        }
        .btn-confirm {
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            box-shadow: 0 15px 30px -10px rgba(16, 185, 129, 0.4);
        }
        #exit-modal { display: none; }
    </style>
</head>
<body class="p-4 md:p-10 text-right">

    <div id="exit-modal" class="fixed inset-0 z-[2000] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] p-8 max-w-sm w-full text-center shadow-2xl">
            <h3 class="text-xl font-900 text-slate-800 mb-2">هل تريد إنهاء المراجعة؟</h3>
            <div class="flex gap-3 mt-6">
                <a href="grade4.html" class="flex-1 py-4 bg-red-50 text-red-600 rounded-2xl font-bold text-center">خروج</a>
                <button onclick="toggleExitModal(false)" class="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="quiz-wrapper" class="max-w-3xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <button onclick="toggleExitModal(true)" class="flex items-center gap-2 p-3 bg-white rounded-2xl shadow-sm text-slate-500 border border-slate-100 transition-colors hover:text-red-500">
                <i class="fas fa-sign-out-alt rotate-180"></i>
                <span class="font-bold text-sm text-slate-800">خروج</span>
            </button>
            <div class="bg-white px-6 py-2 rounded-2xl shadow-sm border border-emerald-100 font-900 text-emerald-600">
                <span id="q-count">1</span> / 20
            </div>
            <div class="p-3 bg-emerald-50 rounded-2xl text-emerald-500"><i class="fas fa-users-cog"></i></div>
        </div>

        <div class="h-3 bg-slate-200 rounded-full mb-12 overflow-hidden">
            <div id="progress-bar" class="progress-glow" style="width: 0%;"></div>
        </div>

        <div class="glass-card p-8 md:p-12 mb-10">
            <h2 id="main-question" class="text-2xl md:text-3xl font-900 text-slate-800 leading-snug text-center mb-12">جاري التحميل...</h2>
            <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-5 text-right"></div>
        </div>

        <button onclick="goToNext()" class="btn-confirm w-full py-6 rounded-[2rem] text-white font-900 text-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
            <span>تأكيد الإجابة</span>
            <i class="fas fa-chevron-left"></i>
        </button>
    </div>

    <div id="result-view" class="hidden max-w-xl mx-auto text-center pt-10">
        <div class="glass-card p-12 bg-white mb-6 border-2 border-emerald-100">
            <div id="result-emoji" class="text-7xl mb-6">🏆</div>
            <h1 id="result-title" class="text-4xl font-900 text-slate-800 mb-2">أداء مذهل!</h1>
            <p class="text-slate-500 font-bold mb-8">صنع القرار - الصف الرابع</p>
            
            <div class="relative inline-block mb-10">
                <svg class="w-40 h-40 transform -rotate-90">
                    <circle cx="80" cy="80" r="70" stroke="#f1f5f9" stroke-width="12" fill="transparent" />
                    <circle id="score-circle" cx="80" cy="80" r="70" stroke="#10b981" stroke-width="12" fill="transparent" stroke-dasharray="440" stroke-dashoffset="440" class="transition-all duration-1000" />
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <span class="font-900 text-4xl text-slate-800" id="score-text">0%</span>
                </div>
            </div>
            <div id="result-msg" class="text-xl font-black text-emerald-600"></div>
        </div>

        <div class="flex flex-col gap-4">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="location.reload()" class="py-5 bg-emerald-100 text-emerald-700 rounded-3xl font-bold hover:bg-emerald-200 transition">إعادة</button>
                <a href="grade4.html" class="py-5 bg-slate-800 text-white rounded-3xl font-bold flex items-center justify-center hover:bg-slate-700 transition">الدروس</a>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "تحديد بدائل متعددة واختيار الأفضل منها لحل مشكلة ما يُسمى:", a: ["المشاركة المجتمعية", "صنع القرار", "التفكير الناقد", "جمع المعلومات"], c: 1 },
            { q: "القرار الذي يتخذه فرد بمفرده يُعرف بأنه قرار:", a: ["جماعي", "تعاوني", "فردي", "عشوائي"], c: 2 },
            { q: "عاصمة دولة كندا هي مدينة:", a: ["تورنتو", "أوتوا", "مونتريال", "كيبك"], c: 1 },
            { q: "تم إنشاء برج القاهرة في عهد الرئيس الراحل:", a: ["محمد أنور السادات", "محمد نجيب", "جمال عبد الناصر", "حسني مبارك"], c: 2 },
            { q: "تُغطي الغابات في كندا حوالي ....... من مساحة الدولة:", a: ["10%", "50%", "70%", "25%"], c: 1 },
            { q: "مشاركة المواطنين في اتخاذ القرارات التي تؤثر على حياتهم تعني:", a: ["الفردية", "الديكتاتورية", "المشاركة في صنع القرار", "التخطيط المستقبلي"], c: 2 },
            { q: "من الخطوات الأساسية لصنع قرار سليم (الخطوة الأولى):", a: ["جمع المعلومات", "اختيار البدائل", "تحديد المشكلة أو الهدف", "تنفيذ القرار"], c: 2 },
            { q: "المشاركة في صنع القرار داخل 'الأسرة' تجعلنا نتعلم:", a: ["الأنانية", "التعاون وتحمل المسؤولية", "الاعتماد على النفس فقط", "التسرع"], c: 1 },
            { q: "تعتمد كندا في اقتصادها بشكل كبير على تصدير:", a: ["السيارات", "البترول", "المنسوجات", "الأجهزة الإلكترونية"], c: 1 },
            { q: "صمم المهندس 'نعوم شبيب' برج القاهرة على شكل:", a: ["هرم", "زهرة اللوتس", "مسلة فرعونية", "منارة"], c: 1 },
            { q: "يعتبر 'منتزه بانف الوطني' من أشهر المعالم في دولة:", a: ["مصر", "فرنسا", "كندا", "الولايات المتحدة"], c: 2 },
            { q: "اختيار رئيس مجلس المدينة يعد من نماذج القرارات على مستوى:", a: ["الأسرة", "المدرسة", "المجتمع", "الفرد"], c: 2 },
            { q: "اللغات الرسمية في دولة كندا هي:", a: ["الإنجليزية والألمانية", "الإنجليزية والفرنسية", "الفرنسية والإسبانية", "العربية والإنجليزية"], c: 1 },
            { q: "ضربت 'حرب أكتوبر 1973' أروع الأمثلة في صنع القرار بسبب:", a: ["القرار الفردي", "مشاركة قادة الجيش مع القائد الأعلى", "سرعة التنفيذ بلا خطة", "عدم وجود بدائل"], c: 1 },
            { q: "إذا لم يصلح البديل الذي تم تنفيذه، يجب علينا:", a: ["الاستسلام", "معاودة اختيار بديل آخر", "لوم الآخرين", "تجاهل النتائج"], c: 1 },
            { q: "الهدف من خطوة 'التفكير في إيجابيات وسلبيات كل بديل' هو:", a: ["إضاعة الوقت", "الوصول لأفضل بديل ممكن", "تعقيد المشكلة", "إلغاء القرار"], c: 1 },
            { q: "حملات زراعة الأشجار هي قرارات جماعية تخدم:", a: ["مصلحة الفرد", "مصلحة الأسرة", "الصالح العام للمجتمع", "المدرسة فقط"], c: 2 },
            { q: "يتميز خليج 'هدسن' في كندا بظاهرة جغرافية وهي:", a: ["الجفاف صيفاً", "التجمد بالكامل في الشتاء", "كونه أعمق خليج", "قلة الأسماك"], c: 1 },
            { q: "من نتائج 'أهمية صنع القرار' تعزيز:", a: ["المشكلات", "الثقة بالنفس", "التواكل", "الانعزال"], c: 1 },
            { q: "العلاقة بين مصر وكندا في التعليم والهجرة توصف بأنها:", a: ["تنافسية", "تعاونية", "ضعيفة", "تجارية فقط"], c: 1 }
        ];

        let index = 0, score = 0, picked = null;

        window.onload = () => { render(); };

        function render() {
            picked = null;
            const q = questions[index];
            document.getElementById('main-question').innerText = q.q;
            document.getElementById('q-count').innerText = index + 1;
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            q.a.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = 'option-box p-6 rounded-2xl flex items-center gap-4';
                btn.innerHTML = `<div class="opt-prefix">${String.fromCharCode(65 + i)}</div><span class="text-lg font-bold text-right">${opt}</span>`;
                btn.onclick = () => {
                    document.querySelectorAll('.option-box').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    picked = i;
                };
                grid.appendChild(btn);
            });
            document.getElementById('progress-bar').style.width = ((index / questions.length) * 100) + '%';
        }

        function goToNext() {
            if (picked === null) return Swal.fire({text:'يا بطل! اختر إجابة أولاً.', icon:'warning', confirmButtonColor: '#10b981'});
            if (picked === questions[index].c) score++;
            index++;
            if (index < questions.length) render(); else finish();
        }

        function finish() {
            document.getElementById('quiz-wrapper').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            const pct = Math.round((score / questions.length) * 100);
            document.getElementById('score-text').innerText = pct + '%';
            document.getElementById('score-circle').style.strokeDashoffset = 440 - (440 * pct) / 100;
            
            if (pct >= 90) {
                document.getElementById('result-title').innerText = "قائد متميز!";
                document.getElementById('result-msg').innerText = "أنت بارع في صنع القرار وفهم الدرس بعمق.";
            } else if (pct >= 50) {
                document.getElementById('result-title').innerText = "أحسنت يا بطل!";
                document.getElementById('result-msg').innerText = "لقد حققت نتيجة جيدة جداً، استمر في التقدم.";
            } else {
                document.getElementById('result-title').innerText = "تحتاج مراجعة";
                document.getElementById('result-msg').innerText = "حاول قراءة الدرس مرة أخرى لتحسن مهارتك في صنع القرار.";
                document.getElementById('result-emoji').innerText = "📚";
            }
        }

        function toggleExitModal(s) { document.getElementById('exit-modal').style.display = s?'flex':'none'; }
    </script>
</body>
</html>
