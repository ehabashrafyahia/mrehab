<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار خصائص قارات العالم | مراجعة ذاتية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            min-height: 100vh;
            user-select: none;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(16, 185, 129, 0.1);
            border-radius: 2rem;
        }
        .option-box {
            background: white; border: 2px solid #e2e8f0;
            transition: all 0.3s ease; text-align: right; cursor: pointer;
        }
        .option-box:hover { border-color: #10b981; transform: scale(1.02); }
        .option-box.selected {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-color: transparent; color: white;
        }
        .opt-prefix {
            background: #f1f5f9; width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; font-weight: 900; color: #64748b;
        }
        .option-box.selected .opt-prefix { background: rgba(255, 255, 255, 0.2); color: white; }
        .progress-glow {           height: 100%; background: linear-gradient(90deg, #10b981, #3b82f6);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); border-radius: 100px;
            transition: width 0.6s ease;
        }
        .btn-confirm {
            background: linear-gradient(135deg, #059669 0%, #064e3b 100%);
بلااتا           box-shadow: 0 15px 30px -10px rgba(5, 150, 105, 0.4);
        }
        #exit-modal { display: none; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="exit-modal" class="fixed inset-0 z-[2000] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <h3 class="text-xl font-900 text-slate-800 mb-2">هل تريد الخروج؟</h3>
            <div class="flex gap-3 mt-6">
                <a href="grade5.html" class="flex-1 py-3 bg-red-50 text-red-600 rounded-2xl font-bold text-center">خروج</a>
                <button onclick="toggleExitModal(false)" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-bold">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="quiz-wrapper" class="max-w-3xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <button onclick="toggleExitModal(true)" class="flex items-center gap-2 p-3 bg-white rounded-2xl shadow-sm text-slate-500 border border-slate-100">
                <i class="fas fa-sign-out-alt rotate-180"></i>
                <span class="font-bold text-sm text-slate-800">خروج</span>
            </button>
            <div class="bg-white px-6 py-2 rounded-2xl shadow-sm border border-slate-100 font-900 text-emerald-600">
                <span id="q-count">1</span> / 30
            </div>
            <div class="p-3 bg-emerald-50 rounded-2xl text-emerald-500"><i class="fas fa-map-marked-alt"></i></div>
        </div>

        <div class="h-3 bg-slate-200 rounded-full mb-12 overflow-hidden">
            <div id="progress-bar" class="progress-glow" style="width: 5%;"></div>
        </div>

        <div class="glass-card p-8 md:p-12 mb-10">
            <h2 id="main-question" class="text-2xl md:text-3xl font-900 text-slate-800 leading-snug text-center mb-12">جاري التحميل...</h2>
            <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
        </div>

        <button onclick="goToNext()" class="btn-confirm w-full py-6 rounded-3xl text-white font-900 text-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
            <span>تأكيد الإجابة</span>
            <i class="fas fa-chevron-left"></i>
        </button>
    </div>

    <div id="result-view" class="hidden max-w-xl mx-auto text-center pt-10">
        <div class="glass-card p-12 shadow-2xl bg-white mb-6 border-2 border-emerald-100">
            <div class="text-7xl mb-6">🌍</div>
            <h1 class="text-4xl font-900 text-slate-800 mb-2">نتيجة الاختبار</h1>
            <p class="text-slate-500 font-bold mb-8">بلادي مسؤليتي</p>
            
            <div class="relative inline-block mb-10">
                <svg class="w-40 h-40 transform -rotate-90">
                    <circle cx="80" cy="80" r="70" stroke="#f1f5f9" stroke-width="12" fill="transparent" />
                    <circle id="score-circle" cx="80" cy="80" r="70" stroke="#10b981" stroke-width="12" fill="transparent" stroke-dasharray="440" stroke-dashoffset="440" class="transition-all duration-1000" />
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <span class="font-900 text-4xl text-slate-800" id="score-text">0%</span>
                </div>
            </div>
            <div id="result-msg" class="text-xl font-black text-emerald-600"></div>
        </div>

        <div class="flex flex-col gap-4">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="location.reload()" class="py-4 bg-emerald-100 text-emerald-700 rounded-2xl font-bold shadow-lg hover:bg-emerald-200 transition">إعادة الاختبار</button>
                <a href="grade5.html" class="py-4 bg-slate-800 text-white rounded-2xl font-bold shadow-lg flex items-center justify-center hover:bg-slate-700 transition">الرئيسية</a>
            </div>
        </div>
    </div>

    <script>
        const questions = [
    { q: "واجب المواطن تجاه وطنه والالتزام بالقوانين والحفاظ على موارده يعرف بـ:", a: ["الحقوق الشخصية", "المسئولية الوطنية", "الطموح المهني", "التبادل التجاري"], c: 1 },
    { q: "أي مما يلي يعد من واجباتك كمواطن صالح نحو الوطن؟", a: ["ترديد الشائعات", "إهمال المرافق العامة", "الالتزام بالقوانين واحترام النظام", "تلويث الشوارع والحدائق"], c: 2 },
    { q: "المشاركة في 'الأعمال التطوعية' تعتبر جزءاً من:", a: ["الترفيه عن النفس", "واجبنا نحو الوطن", "التهرب من الدراسة", "البحث عن عمل بأجر"], c: 1 },
    { q: "من واجب المواطن تجاه بيئته الحفاظ على نظافة:", a: ["منزله فقط", "الشوارع والحدائق", "الغرف الخاصة", "المحلات التجارية فقط"], c: 1 },
    { q: "التصرف الصحيح تجاه الشائعات التي تسعى لهدم المجتمع هو:", a: ["نشرها بسرعة", "تصديقها دائماً", "عدم ترديدها", "كتابتها في الصحف"], c: 2 },
    { q: "يجب علينا المحافظة على الموارد الطبيعية والبشرية لأنها:", a: ["تزيد من الفوضى", "سر نهضتنا وتقدمنا", "ملك لشخص واحد", "لا قيمة لها"], c: 1 },
    { q: "ترشيد استهلاك المياه والكهرباء يعد شكلاً من أشكال:", a: ["حماية موارد الوطن", "إهدار ثروات الدولة", "الكسل والخمول", "معارضة القوانين"], c: 0 },
    { q: "المساهمة في حماية 'الآثار والتراث' من وسائل:", a: ["هدم الوطن", "حماية موارد الوطن", "التوسع العمراني", "زيادة التلوث"], c: 1 },
    { q: "من طرق حماية الموارد المائية:", a: ["إلقاء المخلفات في النيل", "حماية المياه من التلوث", "زيادة استهلاك المياه", "ري الأرض وقت الظهيرة"], c: 1 },
    { q: "اعتبر المصريون القدماء أن استقرار فيضان النيل مرهون بالعدل والحق، وهو ما عرف بمبدأ:", a: ["إيزيس", "ماعت", "رع", "حتحور"], c: 1 },
    { q: "يستطيع كل فرد أن يشارك في تنمية وطنه من خلال:", a: ["الغياب عن المدرسة", "الاجتهاد في الدراسة", "إهمال العمل", "شراء المنتجات المستوردة فقط"], c: 1 },
    { q: "تشجيع 'المنتجات المحلية' يؤدي إلى:", a: ["إضعاف اقتصاد الوطن", "تنمية الوطن واقتصاده", "زيادة البطالة", "توقف المصانع"], c: 1 },
    { q: "أي من السلوكيات التالية يعبر عن 'الإخلاص في العمل'؟", a: ["التأخر عن المواعيد", "إنجاز العمل بإتقان", "ترك العمل دون إنهاء", "الاعتماد على الآخرين دائماً"], c: 1 },
    { q: "التعاون بين أفراد المجتمع يجعل المجتمع:", a: ["ضعيفاً ومفككاً", "أكثر ترابطاً", "مليئاً بالخلافات", "بطيئاً في الحركة"], c: 1 },
    { q: "من صور التعاون بين أفراد المجتمع:", a: ["العمل بشكل فردي دائماً", "العمل بشكل جماعي", "تجاهل الآخرين", "التنافس الهدام"], c: 1 },
    { q: "مساندة بعضنا البعض في وقت 'الشدة والرخاء' من مهام:", a: ["الأعداء", "أفراد المجتمع المتعاون", "الغرباء فقط", "الدول المجاورة فقط"], c: 1 },
    { q: "التعاون يساعد أفراد المجتمع على الحفاظ على:", a: ["الفوضى والنزاع", "الأمن والسلام", "التلوث والضجيج", "التبذير والإسراف"], c: 1 },
    { q: "الشخص الذي 'يربي الأجيال ويغرس فيهم القيم' هو:", a: ["العامل", "المعلم", "الطبيب", "الشرطي"], c: 1 },
    { q: "الجندي له دور عظيم في الوطن لأنه:", a: ["يعالج المرضى", "يدافع عن الوطن ويحمي حدوده", "يبني المنازل", "يزرع الأرض"], c: 1 },
    { q: "المسئول عن 'الحفاظ على الأمن والنظام' داخل الدولة هو:", a: ["المعلم", "الطبيب", "الشرطي", "الفلاح"], c: 2 },
    { q: "الطبيب يؤدي مسئوليته الوطنية من خلال:", a: ["حماية الحدود", "علاج المرضى بإخلاص", "تعليم التلاميذ", "رصف الشوارع"], c: 1 },
    { q: "يساهم 'العامل' في خدمة المجتمع عن طريق:", a: ["غرس القيم فقط", "إنجاز عمله بإتقان", "كتابة الشائعات", "الجلوس دون عمل"], c: 1 },
    { q: "خير دليل على شجاعة وتضحية الجنود المصريين لحماية الحدود هو حرب:", a: ["أكتوبر 1973م", "يونيو 1967م", "الاستنزاف", "العالمية الأولى"], c: 0 },
    { q: "بناء الوطن هو مسئولية:", a: ["الحاكم فقط", "المعلم فقط", "كل فرد في المجتمع", "كبار السن فقط"], c: 2 },
    { q: "حماية الموارد في الوطن تعتبر مسئولية:", a: ["فردية", "جماعية", "اختيارية", "غير ضرورية"], c: 1 },
    { q: "الالتزام بالقوانين يساعد على تحقيق ________ في المجتمع.", a: ["التوتر", "النظام والعدل", "الازدحام", "الاختلاف"], c: 1 },
    { q: "أي من الشخصيات التالية يعتبر 'قدوة' في أداء واجبه؟", a: ["المعلم المخلص", "الجندي الشجاع", "الطبيب المتفاني", "جميع ما سبق"], c: 3 },
    { q: "المحافظة على 'المرافق العامة' مثل المواصلات العامة تعني:", a: ["تخريبها بالرسم عليها", "الحفاظ عليها للأجيال القادمة", "كسر المقاعد فيها", "استخدامها دون نظام"], c: 1 },
    { q: "مخالفة مبادئ الحق والعدل عند المصريين القدماء كانت تجلب:", a: ["الاستقرار والفيضان", "الفوضى والخراب", "الثراء والمال", "الأمطار والزرع"], c: 1 },
    { q: "من نتائج الاجتهاد في الدراسة:", a: ["الفشل الدراسي", "المشاركة في تنمية الوطن مستقبلاً", "زيادة وقت الفراغ", "ضعف الشخصية"], c: 1 }
];


        let index = 0, score = 0, picked = null;

        window.onload = () => {
            render();
        };

        function render() {
            picked = null;
            const q = questions[index];
            document.getElementById('main-question').innerText = q.q;
            document.getElementById('q-count').innerText = index + 1;
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            q.a.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = 'option-box p-6 rounded-2xl flex items-center gap-4 group';
                btn.innerHTML = `<div class="opt-prefix">${String.fromCharCode(65 + i)}</div><span class="text-lg font-bold">${opt}</span>`;
                btn.onclick = () => {
                    document.querySelectorAll('.option-box').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    picked = i;
                };
                grid.appendChild(btn);
            });
            document.getElementById('progress-bar').style.width = ((index / questions.length) * 100) + '%';
        }

        function goToNext() {
            if (picked === null) return Swal.fire({text:'اختر إجابة أولاً يا بطل!', icon:'warning', confirmButtonColor: '#10b981'});
            if (picked === questions[index].c) score++;
            index++;
            if (index < questions.length) render(); else finish();
        }

        function finish() {
            document.getElementById('quiz-wrapper').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            const pct = Math.round((score / questions.length) * 100);
            document.getElementById('score-text').innerText = pct + '%';
            document.getElementById('score-circle').style.strokeDashoffset = 440 - (440 * pct) / 100;
            
            let msg = pct >= 50 ? "أداء ممتاز! أنت جغرافي بارع" : "حاول مرة أخرى لتتقن تضاريس العالم";
            document.getElementById('result-msg').innerText = msg;
        }

        function toggleExitModal(s) { document.getElementById('exit-modal').style.display = s?'flex':'none'; }
    </script>
</body>
</html>
