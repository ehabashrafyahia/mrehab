<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أ. إيهاب أشرف | WhatsApp Ready</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #f9c74f;
            --accent: #ff7f6e;
            --dark: #0d1a21;
        }

        body {
            margin: 0;
            background: #0f1c23;
            font-family: 'Cairo', sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .container { width: 100%; max-width: 450px; }

        .input-card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            border: 1px dashed var(--gold);
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 200px;
            background: #1a3a4a;
            color: #fff;
            border-radius: 8px;
            padding: 10px;
            font-family: 'Cairo';
            margin: 10px 0;
            resize: none;
            outline: none;
            border: 1px solid #333;
        }

        #captureArea {
            background: linear-gradient(145deg, #16313f, #0d1a21);
            padding: 25px 20px;
            border: 3px solid var(--gold);
            border-radius: 20px;
            position: relative;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        /* تنسيق رقم السؤال العلوي */
        .q-number-badge {
            background: var(--accent);
            color: white;
            padding: 2px 12px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.5;
            color: #fff;
            border-right: 4px solid var(--gold);
            padding-right: 12px;
        }

        .options-list {
            display: grid;
            gap: 10px;
        }

        .option-item {
            background: rgba(255,255,255,0.06);
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 16px;
            display: flex;
            align-items: center;
        }

        .option-label {
            background: var(--gold);
            color: #000;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-left: 10px;
            font-weight: 900;
            font-size: 13px;
            flex-shrink: 0;
        }

        .watermark {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(249,199,79,0.2);
            padding-top: 12px;
            font-size: 12px;
            font-weight: 600;
            color: var(--gold);
        }

        .controls { display: flex; gap: 8px; margin-top: 15px; }
        
        .btn {
            padding: 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-family: 'Cairo';
            font-weight: 700;
            font-size: 14px;
        }

        .btn-main { background: var(--gold); color: #000; width: 100%; }
        .btn-nav { background: #2c4e5e; color: #fff; flex: 1; }
        .btn-snap { background: var(--accent); color: #fff; flex: 2; }

        .hidden { display: none; }
        #counter { text-align: center; margin-top: 10px; color: var(--gold); font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup" class="input-card">
        <h3 style="color: var(--gold); margin: 0;">مُجهز واتساب أ. إيهاب أشرف 📱</h3>
        <p style="font-size: 12px; color: #ccc;">ضع الأسئلة مرقمة (1- سؤال .. أ- اختيار)</p>
        <textarea id="inputText" placeholder="1) ما هي عاصمة مصر؟&#10;أ) القاهرة&#10;ب) الإسكندرية"></textarea>
        <button onclick="processData()" class="btn btn-main">بدء التجهيز ⚡</button>
    </div>

    <div id="display" class="hidden">
        <div id="captureArea">
            <div id="qNumber" class="q-number-badge"></div>
            <div id="qBody" class="question-text"></div>
            <div id="optsBody" class="options-list"></div>
            <div class="watermark">
                <span>🌍 دراسات إجتماعية</span>
                <span>أ. إيهاب أشرف ⚓</span>
            </div>
        </div>

        <div class="controls">
            <button onclick="prev()" class="btn btn-nav">السابق</button>
            <button onclick="snap()" class="btn btn-snap">📸 حفظ الصورة</button>
            <button onclick="next()" class="btn btn-nav">التالي</button>
        </div>
        <p id="counter"></p>
        <button onclick="location.reload()" style="background:none; border:none; color:#999; cursor:pointer; width:100%; margin-top:5px; font-family:'Cairo'; font-size:12px; text-decoration:underline;">إدخال أسئلة جديدة</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
    let questions = [];
    let current = 0;

    function processData() {
        const raw = document.getElementById('inputText').value;
        if(!raw.trim()) return;

        // تقسيم ذكي بناءً على الأرقام
        const regex = /\d+[\)\-\.]\s+/;
        const parts = raw.split(regex);
        const blocks = parts.filter(p => p.trim().length > 5);
        
        questions = blocks.map(block => {
            const lines = block.split('\n').map(l => l.trim()).filter(l => l !== "");
            const q = lines[0];
            const opts = lines.filter(l => /^[A-Dأ-د][\)\-\.]/i.test(l))
                              .map(l => l.replace(/^[A-Dأ-د][\)\-\.]\s*/i, '').trim());
            return { q, opts };
        }).filter(item => item.opts.length > 0);

        if(questions.length > 0) {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('display').classList.remove('hidden');
            render();
        }
    }

    function render() {
        const item = questions[current];
        
        // تحديث رقم السؤال داخل التصميم
        document.getElementById('qNumber').innerText = `سؤال رقم (${current + 1})`;
        
        // نص السؤال
        document.getElementById('qBody').innerText = item.q;
        
        // الخيارات
        const container = document.getElementById('optsBody');
        container.innerHTML = '';
        const labels = ['أ', 'ب', 'ج', 'د'];
        item.opts.forEach((text, i) => {
            if(i < 4) { // لضمان عدم تجاوز 4 خيارات
                const div = document.createElement('div');
                div.className = 'option-item';
                div.innerHTML = `<div class="option-label">${labels[i]}</div> <div>${text}</div>`;
                container.appendChild(div);
            }
        });
        
        document.getElementById('counter').innerText = `استعراض ${current + 1} من ${questions.length}`;
    }

    function next() { if(current < questions.length - 1) { current++; render(); } }
    function prev() { if(current > 0) { current--; render(); } }

    async function snap() {
        const area = document.getElementById('captureArea');
        // زيادة الجودة للحصول على نص واضح في واتساب
        const canvas = await html2canvas(area, { 
            scale: 3, 
            backgroundColor: '#0d1a21',
            useCORS: true 
        });
        const link = document.createElement('a');
        link.download = `Ehab_Ashraf_Q${current+1}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
    }
</script>

</body>
</html>
