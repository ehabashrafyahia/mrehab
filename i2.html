<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التميز | أ. إيهاب أشرف</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --gold: #f9c74f;
            --teal: #2b9c76;
            --dark: #13262f;
            --accent: #ff7f6e;
        }

        body {
            margin: 0;
            background: #0f1c23;
            font-family: 'Cairo', sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container { width: 100%; max-width: 650px; }

        /* شاشة الإدخال */
        .input-card {
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 20px;
            border: 2px dashed var(--gold);
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 300px;
            background: #1a3a4a;
            color: #fff;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            font-family: 'Cairo';
            font-size: 15px;
            margin: 15px 0;
            resize: none;
            outline: none;
        }

        /* مربع السؤال المصمم للتصوير */
        #captureArea {
            background: linear-gradient(145deg, #16313f, #0d1a21);
            padding: 45px 35px;
            border: 4px solid var(--gold);
            border-radius: 30px;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* ديكور خلفية المربع */
        #captureArea::after {
            content: "🌍";
            position: absolute;
            bottom: -20px;
            left: -20px;
            font-size: 120px;
            opacity: 0.05;
            transform: rotate(-20deg);
        }

        .question-text {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 35px;
            line-height: 1.7;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }

        .options-list {
            display: grid;
            gap: 15px;
            position: relative;
            z-index: 1;
        }

        .option-item {
            background: rgba(255,255,255,0.08);
            padding: 18px 25px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.15);
            font-size: 20px;
            display: flex;
            align-items: center;
            transition: 0.3s;
        }

        .option-label {
            background: var(--gold);
            color: #000;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-left: 15px;
            font-weight: 900;
            font-size: 16px;
            flex-shrink: 0;
        }

        .watermark {
            margin-top: 45px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(249,199,79,0.3);
            padding-top: 20px;
            font-size: 15px;
            font-weight: 700;
            color: var(--gold);
        }

        /* التحكم */
        .controls { display: flex; gap: 12px; margin-top: 25px; }
        
        .btn {
            padding: 14px 20px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-family: 'Cairo';
            font-weight: 800;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .btn-main { background: var(--gold); color: #000; width: 100%; }
        .btn-nav { background: #2c4e5e; color: #fff; flex: 1; }
        .btn-snap { background: var(--accent); color: #fff; flex: 2; box-shadow: 0 10px 20px rgba(255,127,110,0.3); }
        .btn:active { transform: scale(0.95); }

        .hidden { display: none; }
        #counter { text-align: center; margin-top: 15px; color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup" class="input-card">
        <h2 style="color: var(--gold); margin-top: 0;">مُجهز خرائط الأسئلة 🗺️</h2>
        <p style="opacity: 0.8;">الصق الأسئلة المرقمة مباشرة وسيتكفل الكود بالباقي</p>
        <textarea id="inputText" placeholder="مثال:&#10;1) وُلد محمد علي باشا في:&#10;A) إستانبول&#10;..."></textarea>
        <button onclick="processData()" class="btn btn-main">تجهيز الأسئلة الآن ✨</button>
    </div>

    <div id="display" class="hidden">
        <div id="captureArea">
            <div id="qBody" class="question-text"></div>
            <div id="optsBody" class="options-list"></div>
            <div class="watermark">
                <span>🌍 مادة الدراسات الاجتماعية</span>
                <span>الأستاذ/ إيهاب أشرف ⚓</span>
            </div>
        </div>

        <div class="controls">
            <button onclick="prev()" class="btn btn-nav">السابق</button>
            <button onclick="snap()" class="btn btn-snap">📸 حفظ كصورة (HD)</button>
            <button onclick="next()" class="btn btn-nav">التالي</button>
        </div>
        <p id="counter"></p>
        <button onclick="location.reload()" style="background:none; border:none; color:#999; cursor:pointer; width:100%; margin-top:10px; font-family:'Cairo'; text-decoration:underline;">إدخال أسئلة جديدة</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
    let questions = [];
    let current = 0;

    function processData() {
        const raw = document.getElementById('inputText').value;
        if(!raw.trim()) return Swal.fire('عذراً','المربع فارغ!','warning');

        // تقسيم ذكي جداً يبحث عن الرقم متبوعاً بقوس في أي مكان
        const parts = raw.split(/\n?\d+[\)\-\.]\s+/);
        const blocks = parts.filter(p => p.trim().length > 10);
        
        questions = blocks.map(block => {
            const lines = block.split('\n').map(l => l.trim()).filter(l => l !== "");
            
            // أول سطر هو السؤال
            const q = lines[0];
            
            // الخيارات هي أي سطر يبدأ بـ A,B,C,D (مع حذف الإجابة)
            const opts = lines.filter(l => /^[A-D][\)\-\.]/i.test(l))
                              .map(l => l.replace(/^[A-D][\)\-\.]\s*/i, '').trim());
            
            return { q, opts };
        }).filter(item => item.opts.length > 0);

        if(questions.length > 0) {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('display').classList.remove('hidden');
            render();
        } else {
            Swal.fire('خطأ في التنسيق','تأكد أن الأسئلة تبدأ بـ 1) والخيارات بـ A)','error');
        }
    }

    function render() {
        const item = questions[current];
        document.getElementById('qBody').innerText = item.q;
        const container = document.getElementById('optsBody');
        container.innerHTML = '';

        const labels = ['أ', 'ب', 'ج', 'د'];
        item.opts.forEach((text, i) => {
            const div = document.createElement('div');
            div.className = 'option-item';
            div.innerHTML = `<div class="option-label">${labels[i]}</div> <div>${text}</div>`;
            container.appendChild(div);
        });

        document.getElementById('counter').innerText = `السؤال رقم (${current + 1}) من إجمالي (${questions.length})`;
    }

    function next() { if(current < questions.length - 1) { current++; render(); } }
    function prev() { if(current > 0) { current--; render(); } }

    async function snap() {
        const area = document.getElementById('captureArea');
        // جودة فائقة التصوير
        const canvas = await html2canvas(area, { 
            scale: 3, 
            backgroundColor: '#0d1a21',
            borderRadius: 30
        });
        
        const link = document.createElement('a');
        link.download = `Geo_Lesson_Q${current+1}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
    }
</script>

</body>
</html>
