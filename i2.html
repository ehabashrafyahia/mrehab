<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنصة الذكية | أ. إيهاب أشرف</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --terracotta: #c44536;
            --desert-gold: #f9c74f;
            --oasis-teal: #2b9c76;
            --deep-ocean: #1a5e6b;
            --night-sky: #13262f;
            --sand-dune: #e9c46a;
            --coral-reef: #ff7f6e;
            --volcanic: #5e3a2c;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at center, #1e4a5f 0%, #13262f 100%);
            font-family: 'Cairo', sans-serif;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* تحسين الخلفية الجغرافية */
        .bg-pattern {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255,215,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,215,0,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 650px;
            z-index: 10;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(249, 199, 79, 0.3);
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            text-align: center;
        }

        h1 {
            color: var(--desert-gold);
            font-weight: 900;
            font-size: 28px;
            margin-bottom: 30px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        textarea {
            width: 100%;
            height: 180px;
            background: rgba(0,0,0,0.2);
            border: 2px dashed var(--desert-gold);
            border-radius: 15px;
            color: #fff;
            padding: 20px;
            font-family: 'Cairo';
            resize: none;
            outline: none;
            transition: 0.3s;
            margin-bottom: 20px;
        }

        textarea:focus {
            border-style: solid;
            background: rgba(0,0,0,0.4);
            box-shadow: 0 0 20px rgba(249, 199, 79, 0.2);
        }

        /* منطقة تصوير السؤال */
        #captureArea {
            background: #13262f;
            padding: 40px;
            border-radius: 20px;
            border: 4px solid var(--desert-gold);
            position: relative;
            margin-bottom: 20px;
        }

        #question {
            font-size: 24px;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 35px;
            color: #fff;
            padding-right: 20px;
            border-right: 5px solid var(--coral-reef);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .opt-card {
            background: rgba(255,255,255,0.05);
            border: 1.5px solid rgba(43, 156, 118, 0.4);
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .opt-card:hover {
            background: rgba(43, 156, 118, 0.2);
            transform: translateY(-2px);
        }

        .opt-card.selected {
            background: var(--oasis-teal);
            border-color: var(--desert-gold);
            box-shadow: 0 5px 15px rgba(43, 156, 118, 0.4);
        }

        /* أزرار التحكم */
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 10px;
            border: none;
            font-family: 'Cairo';
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            flex: 1;
        }

        .btn-primary { background: var(--desert-gold); color: #000; }
        .btn-primary:hover { opacity: 0.9; transform: scale(1.02); }

        .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #fff; }
        .btn-secondary:hover { background: rgba(255,255,255,0.2); }

        .progress-container {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #progressFill {
            height: 100%;
            background: var(--desert-gold);
            width: 0%;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .watermark {
            margin-top: 30px;
            text-align: left;
            font-size: 14px;
            opacity: 0.6;
            color: var(--sand-dune);
            font-style: italic;
        }

        .hidden { display: none; }
        
        @media (max-width: 500px) {
            .options-grid { grid-template-columns: 1fr; }
            h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="bg-pattern"></div>

<div class="container">
    <div id="startScreen" class="glass-panel">
        <h1>🌍 محرك جغرافيا أ. إيهاب أشرف</h1>
        <p style="margin-bottom: 20px; opacity: 0.8;">أدخل السؤال متبوعاً بأربعة خيارات، كل عنصر في سطر جديد.</p>
        <textarea id="rawInput" placeholder="مثال:&#10;ما هي عاصمة مصر؟&#10;القاهرة&#10;الإسكندرية&#10;أسوان&#10;الجيزة"></textarea>
        <button onclick="launch()" class="btn btn-primary" style="width: 100%; font-size: 18px;">ابدأ المعالجة 🚀</button>
    </div>

    <div id="quizScreen" class="hidden">
        <div class="progress-container">
            <div id="progressFill"></div>
        </div>

        <div id="captureArea">
            <div id="question"></div>
            <div id="options" class="options-grid"></div>
            <div class="watermark">أ.إيهاب أشرف - استاذ التاريخ و الجغرافيا</div>
        </div>

        <div class="controls">
            <button onclick="goBack()" class="btn btn-secondary">السابق 🔙</button>
            <button onclick="takeShot()" class="btn btn-primary">📸 حفظ كصورة</button>
            <button onclick="goNext()" class="btn btn-secondary">التالي ⏭️</button>
        </div>
        
        <button onclick="location.reload()" class="btn" style="width: 100%; margin-top: 15px; background: transparent; color: #ff7f6e;">إنهاء الجلسة ❌</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
    let questionsData = [];
    let currentIdx = 0;

    function launch() {
        const input = document.getElementById('rawInput').value.trim();
        if(!input) {
            return Swal.fire('تنبيه', 'من فضلك أضف بعض الأسئلة أولاً', 'warning');
        }

        // تقسيم النص لأسئلة (يعتمد على وجود 5 أسطر لكل سؤال)
        const lines = input.split('\n').map(l => l.trim()).filter(l => l !== "");
        questionsData = [];
        
        for (let i = 0; i < lines.length; i += 5) {
            if (lines[i]) {
                questionsData.push({
                    q: lines[i],
                    opts: lines.slice(i + 1, i + 5)
                });
            }
        }

        if(questionsData.length === 0) {
            return Swal.fire('خطأ', 'تنسيق الأسئلة غير مدعوم', 'error');
        }

        document.getElementById('startScreen').classList.add('hidden');
        document.getElementById('quizScreen').classList.remove('hidden');
        render();
    }

    function render() {
        const item = questionsData[currentIdx];
        document.getElementById('question').innerText = `س: ${item.q}`;
        
        const optsBox = document.getElementById('options');
        optsBox.innerHTML = '';

        const icons = ["⛰️", "🗺️", "🏜️", "🌊"];
        item.opts.forEach((opt, index) => {
            const div = document.createElement('div');
            div.className = 'opt-card';
            div.innerHTML = `<span>${icons[index] || '🔹'}</span> <span>${opt}</span>`;
            div.onclick = function() {
                document.querySelectorAll('.opt-card').forEach(c => c.classList.remove('selected'));
                this.classList.add('selected');
            };
            optsBox.appendChild(div);
        });

        // تحديث شريط التقدم
        const progress = ((currentIdx + 1) / questionsData.length) * 100;
        document.getElementById('progressFill').style.width = progress + '%';
    }

    function goNext() {
        if(currentIdx < questionsData.length - 1) {
            currentIdx++;
            render();
        } else {
            Swal.fire('تم بنجاح', 'وصلت لنهاية الأسئلة', 'success');
        }
    }

    function goBack() {
        if(currentIdx > 0) {
            currentIdx--;
            render();
        }
    }

    async function takeShot() {
        const area = document.getElementById('captureArea');
        const btn = event.target;
        btn.innerText = "جاري الحفظ...";
        
        try {
            const canvas = await html2canvas(area, {
                scale: 3, // جودة عالية جداً
                backgroundColor: '#13262f',
                logging: false,
                useCORS: true
            });

            const link = document.createElement('a');
            link.download = `Ehab_Ashraf_Question_${currentIdx + 1}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
            
            Swal.fire({
                title: 'تم الحفظ!',
                text: 'تم تحميل الصورة بجودة عالية',
                icon: 'success',
                timer: 1500,
                showConfirmButton: false
            });
        } catch (err) {
            Swal.fire('خطأ', 'فشل التقاط الصورة', 'error');
        } finally {
            btn.innerText = "📸 حفظ كصورة";
        }
    }
</script>

</body>
</html>
