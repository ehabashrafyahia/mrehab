<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أ. إيهاب أشرف | Lava Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* ألوان الحرارة والتوهج */
            --heat-core: #ffae00; /* أصفر ذهبي متوهج */
            --heat-mid: #ff5200;  /* برتقالي ناري */
            --heat-edge: #940000; /* أحمر داكن */
            --dark-bg: #0a0302;   /* أسود محمر */
            --card-bg: #140805;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at center, #240b06 0%, var(--dark-bg) 100%);
            font-family: 'Cairo', sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .container { width: 100%; max-width: 480px; }

        /* كارت الإدخال */
        .input-card {
            background: rgba(20, 8, 5, 0.8);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 82, 0, 0.3);
            box-shadow: 0 0 30px rgba(255, 82, 0, 0.1);
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 220px;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            border-radius: 12px;
            padding: 15px;
            font-family: 'Cairo';
            margin: 15px 0;
            resize: none;
            outline: none;
            border: 1px solid var(--heat-mid);
            box-shadow: inset 0 0 10px rgba(255, 82, 0, 0.1);
            font-size: 15px;
            box-sizing: border-box;
        }

        textarea:focus {
            box-shadow: inset 0 0 15px rgba(255, 174, 0, 0.2), 0 0 15px rgba(255, 82, 0, 0.3);
            border-color: var(--heat-core);
        }

        /* منطقة التصوير (التصميم الحراري) */
        #captureArea {
            background: linear-gradient(135deg, #1f0804 0%, #0a0302 100%);
            padding: 30px 25px;
            border: 2px solid transparent;
            background-clip: padding-box;
            border-radius: 24px;
            position: relative;
            /* تأثير التوهج الحراري */
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.8),
                0 0 20px rgba(255, 82, 0, 0.2),
                inset 0 0 60px rgba(255, 82, 0, 0.05);
            overflow: hidden;
        }

        /* خط حراري علوي */
        #captureArea::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--heat-edge), var(--heat-core), var(--heat-mid), var(--heat-edge));
        }

        /* رقم السؤال */
        .q-number-badge {
            background: linear-gradient(90deg, var(--heat-mid), var(--heat-core));
            color: #000;
            padding: 4px 18px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 900;
            display: inline-block;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(255, 174, 0, 0.4);
        }

        .question-text {
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 25px;
            line-height: 1.6;
            color: #ffffff;
            border-right: 5px solid var(--heat-core);
            padding-right: 15px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* الخيارات */
        .options-list {
            display: grid;
            gap: 12px;
        }

        .option-item {
            background: linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255, 82, 0, 0.05));
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 174, 0, 0.1);
            font-size: 17px;
            font-weight: 600;
            display: flex;
            align-items: center;
        }

        .option-label {
            background: linear-gradient(135deg, var(--heat-core), var(--heat-mid));
            color: #000;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-left: 12px;
            font-weight: 900;
            font-size: 14px;
            flex-shrink: 0;
            box-shadow: 0 0 10px rgba(255, 174, 0, 0.5);
        }

        /* التوقيع السفلي */
        .watermark {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px dashed rgba(255, 174, 0, 0.3);
            padding-top: 15px;
            font-size: 13px;
            font-weight: 800;
            color: var(--heat-core);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* الأزرار */
        .controls { display: flex; gap: 10px; margin-top: 20px; }
        
        .btn {
            padding: 12px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-family: 'Cairo';
            font-weight: 800;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .btn-main { 
            background: linear-gradient(90deg, var(--heat-mid), var(--heat-core)); 
            color: #000; 
            width: 100%;
            box-shadow: 0 5px 20px rgba(255, 82, 0, 0.4);
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255, 174, 0, 0.6); }

        .btn-nav { background: #2a110d; color: var(--heat-core); flex: 1; border: 1px solid var(--heat-mid); }
        .btn-snap { 
            background: linear-gradient(90deg, var(--heat-edge), var(--heat-mid)); 
            color: #fff; 
            flex: 2; 
            box-shadow: 0 4px 15px rgba(255, 82, 0, 0.3);
        }

        .hidden { display: none; }
        #counter { text-align: center; margin-top: 12px; color: rgba(255,255,255,0.5); font-size: 14px; font-weight: 600;}
        
        /* تأثير النبض البسيط لكلمة واتساب */
        .pulse-text {
            background: linear-gradient(to right, var(--heat-core), #fff, var(--heat-core));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s infinite linear;
            background-size: 200% auto;
        }
        @keyframes shine { to { background-position: 200% center; } }
    </style>
</head>
<body>

<div class="container">
    <div id="setup" class="input-card">
        <h2 style="margin: 0 0 5px 0;" class="pulse-text">مولد الأسئلة الذكي 🔥</h2>
        <p style="font-size: 14px; color: #aaa; margin-bottom: 15px;">أ. إيهاب أشرف | دراسات إجتماعية</p>
        <textarea id="inputText" placeholder="ضع أسئلتك هنا...&#10;1) ما هي عاصمة مصر؟&#10;أ) القاهرة&#10;ب) الإسكندرية&#10;ج) الأقصر&#10;د) أسوان"></textarea>
        <button onclick="processData()" class="btn btn-main">توليد الصور المتوهجة ⚡</button>
    </div>

    <div id="display" class="hidden">
        <div id="captureArea">
            <div id="qNumber" class="q-number-badge"></div>
            <div id="qBody" class="question-text"></div>
            <div id="optsBody" class="options-list"></div>
            <div class="watermark">
                <span>🌍 دراسات إجتماعية</span>
                <span>أ. إيهاب أشرف ⚓</span>
            </div>
        </div>

        <div class="controls">
            <button onclick="prev()" class="btn btn-nav">السابق</button>
            <button onclick="snap()" class="btn btn-snap">📸 حفظ الصورة</button>
            <button onclick="next()" class="btn btn-nav">التالي</button>
        </div>
        <p id="counter"></p>
        <button onclick="location.reload()" style="background:none; border:none; color:var(--heat-mid); cursor:pointer; width:100%; margin-top:5px; font-family:'Cairo'; font-size:14px; font-weight:700; text-decoration:underline;">إدخال أسئلة جديدة</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
    let questions = [];
    let current = 0;

    function processData() {
        const raw = document.getElementById('inputText').value;
        if(!raw.trim()) return;

        const regex = /\d+[\)\-\.]\s+/;
        const parts = raw.split(regex);
        const blocks = parts.filter(p => p.trim().length > 5);
        
        questions = blocks.map(block => {
            const lines = block.split('\n').map(l => l.trim()).filter(l => l !== "");
            const q = lines[0];
            const opts = lines.filter(l => /^[A-Dأ-د][\)\-\.]/i.test(l))
                              .map(l => l.replace(/^[A-Dأ-د][\)\-\.]\s*/i, '').trim());
            return { q, opts };
        }).filter(item => item.opts.length > 0);

        if(questions.length > 0) {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('display').classList.remove('hidden');
            render();
        }
    }

    function render() {
        const item = questions[current];
        
        document.getElementById('qNumber').innerText = `سؤال رقم (${current + 1})`;
        document.getElementById('qBody').innerText = item.q;
        
        const container = document.getElementById('optsBody');
        container.innerHTML = '';
        const labels = ['أ', 'ب', 'ج', 'د'];
        item.opts.forEach((text, i) => {
            if(i < 4) {
                const div = document.createElement('div');
                div.className = 'option-item';
                div.innerHTML = `<div class="option-label">${labels[i]}</div> <div>${text}</div>`;
                container.appendChild(div);
            }
        });
        
        document.getElementById('counter').innerText = `استعراض ${current + 1} من ${questions.length}`;
    }

    function next() { if(current < questions.length - 1) { current++; render(); } }
    function prev() { if(current > 0) { current--; render(); } }

    async function snap() {
        const area = document.getElementById('captureArea');
        const canvas = await html2canvas(area, { 
            scale: 3, 
            backgroundColor: '#0a0302', // لون الخلفية مطابق للتصميم الداكن
            useCORS: true 
        });
        const link = document.createElement('a');
        link.download = `Ehab_Ashraf_Fire_Q${current+1}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
    }
</script>

</body>
</html>
