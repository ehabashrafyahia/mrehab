<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أ. إيهاب أشرف | WhatsApp Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --heat-gold: #ffae00;
            --heat-orange: #ff5200;
            --dark-bg: #0d0402;
        }

        body {
            margin: 0;
            background: #1a1a1a;
            font-family: 'Cairo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px 10px;
        }

        /* حاوية العرض بمقاس الموبايل */
        .container { width: 100%; max-width: 400px; }

        .input-card {
            background: #222;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--heat-orange);
            text-align: center;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%; height: 150px;
            background: #000; color: #fff;
            border: 1px solid #444; border-radius: 8px;
            padding: 10px; font-family: 'Cairo';
            margin-bottom: 15px; resize: none; box-sizing: border-box;
        }

        /* منطقة التصوير - مقاس طولي مناسب للواتساب */
        #captureArea {
            width: 100%;
            aspect-ratio: 4 / 5; /* مقاس احترافي للواتساب */
            background: linear-gradient(180deg, #1f0804 0%, #0d0402 100%);
            padding: 30px 20px;
            border-radius: 20px;
            position: relative;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            border: 2px solid var(--heat-orange);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .q-number {
            background: linear-gradient(90deg, var(--heat-orange), var(--heat-gold));
            color: #000;
            padding: 3px 15px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 900;
            align-self: flex-start;
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 20px;
            font-weight: 800;
            color: #fff;
            line-height: 1.5;
            margin-bottom: auto; /* يدفع الخيارات للأسفل */
            border-right: 4px solid var(--heat-gold);
            padding-right: 12px;
        }

        .options-list {
            display: grid;
            gap: 10px;
            margin-top: 20px;
        }

        .option-item {
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 174, 0, 0.2);
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
        }

        .option-label {
            background: var(--heat-gold);
            color: #000;
            width: 26px; height: 26px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; margin-left: 10px;
            font-weight: 900; flex-shrink: 0;
        }

        /* تذييل الصورة - تم استخدام SVG لضمان عدم اللخبطة */
        .watermark {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 82, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-svg { height: 22px; width: auto; }

        .controls { display: flex; gap: 8px; width: 100%; margin-top: 15px; }
        .btn {
            padding: 12px; border-radius: 10px; border: none;
            font-family: 'Cairo'; font-weight: 700; cursor: pointer;
        }
        .btn-main { background: var(--heat-gold); color: #000; width: 100%; }
        .btn-nav { background: #333; color: #fff; flex: 1; }
        .btn-snap { background: var(--heat-orange); color: #fff; flex: 2; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup" class="input-card">
        <h3 style="color: var(--heat-gold);">مُولد أسئلة مستر إيهاب 🔥</h3>
        <textarea id="inputText" placeholder="1) سؤالك هنا...&#10;أ) اختيار 1&#10;ب) اختيار 2"></textarea>
        <button onclick="processData()" class="btn btn-main">تجهيز الأسئلة ⚡</button>
    </div>

    <div id="display" class="hidden">
        <div id="captureArea">
            <div id="qNumber" class="q-number"></div>
            <div id="qBody" class="question-text"></div>
            <div id="optsBody" class="options-list"></div>
            
            <div class="watermark">
                <svg class="footer-svg" viewBox="0 0 150 30">
                    <text x="150" y="20" fill="#ffae00" font-family="Cairo" font-weight="900" font-size="14" text-anchor="end">🌍 دراسات إجتماعية</text>
                </svg>
                <svg class="footer-svg" viewBox="0 0 150 30">
                    <text x="0" y="20" fill="#ffae00" font-family="Cairo" font-weight="900" font-size="14" text-anchor="start">أ. إيهاب أشرف ⚓</text>
                </svg>
            </div>
        </div>

        <div class="controls">
            <button onclick="prev()" class="btn btn-nav">السابق</button>
            <button onclick="snap()" class="btn btn-snap">📸 حفظ للواتساب</button>
            <button onclick="next()" class="btn btn-nav">التالي</button>
        </div>
        <button onclick="location.reload()" style="background:none; border:none; color:#888; cursor:pointer; width:100%; margin-top:10px; font-family:'Cairo'; text-decoration:underline;">تعديل الأسئلة</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
    let questions = [];
    let current = 0;

    function processData() {
        const raw = document.getElementById('inputText').value;
        if(!raw.trim()) return;
        const regex = /\d+[\)\-\.]\s+/;
        const parts = raw.split(regex);
        const blocks = parts.filter(p => p.trim().length > 2);
        
        questions = blocks.map(block => {
            const lines = block.split('\n').map(l => l.trim()).filter(l => l !== "");
            const q = lines[0];
            const opts = lines.filter(l => /^[A-Dأ-د][\)\-\.]/i.test(l))
                              .map(l => l.replace(/^[A-Dأ-د][\)\-\.]\s*/i, '').trim());
            return { q, opts };
        }).filter(item => item.opts.length > 0);

        if(questions.length > 0) {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('display').classList.remove('hidden');
            render();
        }
    }

    function render() {
        const item = questions[current];
        document.getElementById('qNumber').innerText = `سؤال رقم ${current + 1}`;
        document.getElementById('qBody').innerText = item.q;
        const container = document.getElementById('optsBody');
        container.innerHTML = '';
        const labels = ['أ', 'ب', 'ج', 'د'];
        item.opts.slice(0, 4).forEach((text, i) => {
            const div = document.createElement('div');
            div.className = 'option-item';
            div.innerHTML = `<div class="option-label">${labels[i]}</div> <div>${text}</div>`;
            container.appendChild(div);
        });
    }

    function next() { if(current < questions.length - 1) { current++; render(); } }
    function prev() { if(current > 0) { current--; render(); } }

    async function snap() {
        const area = document.getElementById('captureArea');
        const canvas = await html2canvas(area, { 
            scale: 3, 
            backgroundColor: '#0d0402',
            logging: false,
            useCORS: true
        });
        const link = document.createElement('a');
        link.download = `Ehab_Q${current+1}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
    }
</script>

</body>
</html>
