<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار عهد محمد علي | منصة أطلس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%); 
            min-height: 100vh; 
            user-select: none; 
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.5); 
            box-shadow: 0 25px 50px -12px rgba(124, 58, 237, 0.1); 
            border-radius: 2rem; 
        }
        .option-box { 
            background: white; border: 2px solid #e2e8f0; 
            transition: all 0.3s ease; text-align: right; cursor: pointer; 
        }
        .option-box:hover { border-color: #8b5cf6; transform: scale(1.02); }
        .option-box.selected { 
            background: linear-gradient(135deg, #a855f7 0%, #7e22ce 100%); 
            border-color: transparent; color: white; 
        }
        .opt-prefix { 
            background: #f1f5f9; width: 38px; height: 38px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 10px; font-weight: 900; color: #64748b; 
        }
        .option-box.selected .opt-prefix { background: rgba(255, 255, 255, 0.2); color: white; }
        .progress-glow { 
            height: 100%; background: linear-gradient(90deg, #a855f7, #6366f1); 
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); border-radius: 100px; 
            transition: width 0.6s ease; 
        }
        .btn-confirm { 
            background: linear-gradient(135deg, #6d28d9 0%, #4c1d95 100%); 
            box-shadow: 0 15px 30px -10px rgba(109, 40, 217, 0.4); 
        }
        #exit-modal { display: none; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="exit-modal" class="fixed inset-0 z-[2000] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <h3 class="text-xl font-900 text-slate-800 mb-2">هل تريد الخروج؟</h3>
            <div class="flex gap-3 mt-6">
                <a href="grade7.html" class="flex-1 py-3 bg-red-50 text-red-600 rounded-2xl font-bold text-center">خروج</a>
                <button onclick="toggleExitModal(false)" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-2xl font-bold">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="quiz-wrapper" class="max-w-3xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <button onclick="toggleExitModal(true)" class="flex items-center gap-2 p-3 bg-white rounded-2xl shadow-sm text-slate-500 border border-slate-100 transition-colors hover:text-red-500">
                <i class="fas fa-sign-out-alt rotate-180"></i>
                <span class="font-bold text-sm text-slate-800">خروج</span>
            </button>
            <div class="bg-white px-6 py-2 rounded-2xl shadow-sm border border-slate-100 font-900 text-purple-600">
                <span id="q-count">1</span> / 40
            </div>
            <div class="p-3 bg-purple-50 rounded-2xl text-purple-500"><i class="fas fa-history"></i></div>
        </div>

        <div class="h-3 bg-slate-200 rounded-full mb-12 overflow-hidden">
            <div id="progress-bar" class="progress-glow" style="width: 0%;"></div>
        </div>

        <div class="glass-card p-8 md:p-12 mb-10">
            <h2 id="main-question" class="text-2xl md:text-3xl font-900 text-slate-800 leading-snug text-center mb-12">جاري التحميل...</h2>
            <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
        </div>

        <button onclick="goToNext()" class="btn-confirm w-full py-6 rounded-3xl text-white font-900 text-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
            <span>تأكيد الإجابة</span>
            <i class="fas fa-chevron-left"></i>
        </button>
    </div>

    <div id="result-view" class="hidden max-w-xl mx-auto text-center pt-10">
        <div class="glass-card p-12 bg-white mb-6 border-2 border-purple-100">
            <div class="text-7xl mb-6">🏆</div>
            <h1 class="text-4xl font-900 text-slate-800 mb-2">نتيجة الاختبار</h1>
            <p class="text-slate-500 font-bold mb-8">الصناعة و التعدين في افريقيا</p>
            
            <div class="relative inline-block mb-10">
                <svg class="w-40 h-40 transform -rotate-90">
                    <circle cx="80" cy="80" r="70" stroke="#f1f5f9" stroke-width="12" fill="transparent" />
                    <circle id="score-circle" cx="80" cy="80" r="70" stroke="#a855f7" stroke-width="12" fill="transparent" stroke-dasharray="440" stroke-dashoffset="440" class="transition-all duration-1000" />
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <span class="font-900 text-4xl text-slate-800" id="score-text">0%</span>
                </div>
            </div>
            <div id="result-msg" class="text-xl font-black text-purple-600"></div>
        </div>

        <div class="flex flex-col gap-4">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="location.reload()" class="py-4 bg-purple-100 text-purple-700 rounded-2xl font-bold shadow-lg hover:bg-purple-200 transition">إعادة</button>
                <a href="grade7.html" class="py-4 bg-slate-800 text-white rounded-2xl font-bold shadow-lg flex items-center justify-center hover:bg-slate-700 transition">العودة للدروس</a>
            </div>
        </div>
    </div>

    <script>
        const questions = [
    { q: "تساهم قارة إفريقيا بنسبة كم من الاحتياطي العالمي للمعادن؟", a: ["10%", "20%", "30%", "50%"], c: 2 },
    { q: "أي من المعادن التالية يصنف ضمن 'المعادن الأساسية' في إفريقيا؟", a: ["الذهب", "النحاس", "الفوسفات", "اليورانيوم"], c: 1 },
    { q: "الدولة الإفريقية الأولى في إنتاج معدن الحديد هي:", a: ["مصر", "موريتانيا", "جنوب إفريقيا", "الجزائر"], c: 2 },
    { q: "يدخل معدن البوكسيت في الصناعة الأساسية لـ:", a: ["الأسلاك الكهربائية", "الألومنيوم", "الطوب الحراري", "الأسمدة"], c: 1 },
    { q: "أي من مصادر الطاقة التالية يصنف كطاقة 'أحفورية'؟", a: ["الطاقة الشمسية", "طاقة الرياح", "الغاز الطبيعي", "الطاقة الكهرومائية"], c: 2 },
    { q: "تحتل دولة المغرب المركز الأول إفريقياً والثاني عالمياً في إنتاج:", a: ["الماس", "المنجنيز", "الفوسفات", "الكروم"], c: 2 },
    { q: " 'التعدين المستدام' يعني إدارة الموارد المعدنية لتحقيق التوازن بين:", a: ["التصدير والاستيراد", "الاحتياجات البيئية والاجتماعية والاقتصادية", "الشركات الأجنبية والمحلية", "الصناعات الخفيفة والثقيلة"], c: 1 },
    { q: "من أمثلة الصناعات الاستخراجية في إفريقيا:", a: ["صناعة المنسوجات", "تكرير البترول", "قطع الأخشاب", "الصناعات الكيماوية"], c: 2 },
    { q: "أي الدول التالية تعد الأولى في إنتاج البوكسيت في إفريقيا؟", a: ["غانا", "غينيا", "ناميبيا", "بوتسوانا"], c: 1 },
    { q: "تعتبر نيجيريا من أهم الدول الإفريقية المنتجة لـ:", a: ["الفحم", "البترول", "الكروم", "اليورانيوم"], c: 1 },
    { q: "بم تفسر: يقل التركز السكاني في بعض مناطق تعدين الحديد بجبال البحر الأحمر؟", a: ["لنقص التكنولوجيا", "بسبب الارتفاع والظروف الجغرافية الصعبة", "بسبب نقص رأس المال", "لعدم توفر الأيدي العاملة"], c: 1 },
    { q: "الصخور التي تتكون نتيجة برودة وتجمد المادة المنصهرة الخارجة من البراكين هي:", a: ["الصخور الرسوبية", "الصخور المتحولة", "الصخور النارية", "الصخور الطينية"], c: 2 },
    { q: "ما العلاقة بين رأس المال ونشاط التعدين؟", a: ["رأس المال يقلل من جودة المعادن", "التعدين لا يحتاج لرؤوس أموال ضخمة", "رأس المال ضروري لشراء المعدات وتأسيس البنية التحتية", "رأس المال يؤدي إلى تلوث البيئة فقط"], c: 2 },
    { q: "أي من المعادن التالية يوجد في الصخور الرسوبية؟", a: ["الذهب", "الماس", "الجبس", "النحاس"], c: 2 },
    { q: "ما النتيجة المترتبة على نقص رؤوس الأموال وافتقار الخبرة الفنية في إفريقيا؟", a: ["زيادة الإنتاج المحلي", "الاعتماد على الشركات الأجنبية", "الاكتفاء الذاتي من الصناعات الثقيلة", "تصدير المنتجات مصنعة بالكامل"], c: 1 },
    { q: "بم تفسر: تعد قارة إفريقيا من أقل قارات العالم في التطور الصناعي؟", a: ["بسبب نقص المواد الخام", "بسبب كثرة النزاعات والحروب وضعف البنية التحتية", "لعدم وجود مصادر طاقة متجددة", "بسبب ضيق المساحة"], c: 1 },
    { q: "تتركز مشروعات طاقة الرياح في شمال وشرق وجنوب إفريقيا بسبب:", a: ["قربها من خط الاستواء", "انتظام هبوب الرياح بسرعة مناسبة", "توفر الأيدي العاملة المدربة", "وجود توربينات قديمة"], c: 1 },
    { q: "تعاني قارة إفريقيا من مشكلة 'تصدير الإنتاج المعدني خام'، مما يؤدي لـ:", a: ["زيادة الدخل القومي بشكل كبير", "استيراد المنتجات الصناعية بأسعار مرتفعة", "السيطرة على الأسواق العالمية", "خفض تكاليف النقل"], c: 1 },
    { q: "المنطقة الاقتصادية في شمال غرب خليج السويس تعد مثالاً لـ:", a: ["الصناعات الاستخراجية", "جهود مصر في إنشاء مناطق اقتصادية متكاملة", "مناطق التعدين التقليدي", "الغابات الاستوائية"], c: 1 },
    { q: "تدخل الصناعات الكيماوية وتكرير البترول ضمن تصنيف:", a: ["الصناعات التحويلية الخفيفة", "الصناعات التحويلية الثقيلة", "الصناعات الاستخراجية المعدنية", "الصناعات اليدوية"], c: 1 },
    { q: "النتيجة المترتبة على تحول الدول الإفريقية من ثقافة الاستهلاك إلى الإنتاج هي:", a: ["زيادة الاستيراد من الخارج", "زيادة الاستثمارات وتوفير فرص عمل", "نقص الدخل القومي", "زيادة الاعتماد على القروض الدولية"], c: 1 },
    { q: "تعتبر دولة ناميبيا هي المنتج الأول في قارة إفريقيا لمعدن:", a: ["الحديد", "اليورانيوم", "الفحم", "النجنيز"], c: 1 },
    { q: "تحتل جمهورية الكونغو الديمقراطية المرتبة الأولى عالمياً في إنتاج معدن:", a: ["النحاس", "الكوبالت", "الذهب", "الكروم"], c: 1 },
    { q: "أي من الدول التالية تشتهر بإنتاج طاقة 'المساقط المائية' (الكهرومائية)؟", a: ["ليبيا", "الجزائر", "إثيوبيا", "موريتانيا"], c: 2 },
    { q: "أي مما يلي يعد من 'المعادن النفيسة'؟", a: ["المنجنيز والكروم", "الذهب والماس", "اليورانيوم والكوبالت", "الفوسفات والجبس"], c: 1 },
    { q: "تواجه الصناعة في إفريقيا تحدي 'ضعف التعاون الإقليمي'، ويقصد به:", a: ["زيادة النزاعات الحدودية", "عدم التنسيق الاقتصادي بين الدول الإفريقية", "سيطرة الدول الأوروبية على المناجم", "نقص الكهرباء في المصانع"], c: 1 },
    { q: "تدخل صناعة الزيوت ضمن تصنيف الصناعات:", a: ["الاستخراجية", "التحويلية الخفيفة", "التحويلية الثقيلة", "المعدنية"], c: 1 },
    { q: "يمثل الفحم أهمية اقتصادية كبيرة لدولة:", a: ["مصر", "جنوب إفريقيا", "نيجيريا", "ليبيا"], c: 1 },
    { q: "تعتمد صناعة الحلي والأدوات الطبية بشكل أساسي على معدن:", a: ["الحديد", "النحاس", "الذهب", "البوكسيت"], c: 2 },
    { q: "تتركز صناعة المنسوجات والملابس في قارة إفريقيا بشكل كبير في دول:", a: ["موريتانيا والنيجر", "مصر وجنوب إفريقيا والجزائر", "أنجولا وناميبيا", "تشاد ومالي"], c: 1 },
    { q: " 'المنطقة الاقتصادية' هي منطقة متكاملة تشمل أنشطة تهدف إلى:", a: ["زيادة التلوث البيئي", "تحقيق التنمية المستدامة", "تصدير المواد الخام فقط", "تشجيع الهجرة للخارج"], c: 1 },
    { q: "بم تفسر: تميز قارة إفريقيا بمعدلات إشعاع شمسي مرتفعة سنوياً؟", a: ["بسبب وجود مساحات خضراء واسعة", "بسبب الموقع الفلكي للقارة", "بسبب كثرة الجبال", "بسبب انخفاض درجات الحرارة"], c: 1 },
    { q: "يساهم الفحم بنسبة كبيرة في تلوث البيئة بسبب:", a: ["انبعاث كميات كبيرة من ثاني أكسيد الكربون", "تسربه في مياه البحار", "صعوبة استخراجه", "كونه مادة صلبة"], c: 0 },
    { q: "تستخدم الأجهزة التكنولوجية الحديثة في التعدين بهدف:", a: ["زيادة عدد العمال", "تقدير الاحتياطي من المعادن بدقة", "تقليل سعر المعدن عالمياً", "زيادة استهلاك الطاقة"], c: 1 },
    { q: "النتيجة المباشرة للاهتمام بالتعليم الفني ورفع كفاءة العمال في إفريقيا هي:", a: ["زيادة البطالة", "تطوير الصناعة وزيادة الإنتاجية", "نقص الدخل القومي", "إغلاق المصانع القديمة"], c: 1 },
    { q: "إذا قامت الدول الإفريقية بتصنيع الحديد بدلاً من تصديره خاماً، فما التوقع الأصح؟", a: ["سيقل الطلب العالمي", "ستتحول إفريقيا إلى قوة اقتصادية صناعية كبرى", "ستزداد ديون الدول", "ستتوقف حركة النقل البحري"], c: 1 },
    { q: "ترتبط صعوبة استخراج المعادن في بعض مناطق إفريقيا بـ:", a: ["كثرة الأنهار والبحيرات", "التكوينات الجيولوجية وحركة القشرة الأرضية", "وفرة الأيدي العاملة", "اتساع السوق الإفريقية"], c: 1 },
    { q: "أي من الأنهار التالية يعد الأكثر ملاءمة لإنتاج الطاقة الكهرومائية في إفريقيا؟", a: ["الأنهار الموسمية الصغيرة", "نهر النيل ونهر الكونغو", "الأنهار الجافة", "الأنهار السهلية المنبسطة"], c: 1 },
    { q: "أي استراتيجية هي الأفضل لتحقيق 'التعدين المستدام' في إفريقيا؟", a: ["استخراج أكبر كمية ممكنة لبيعها الآن", "تقليل البحث عن معادن جديدة", "موازنة الاستخراج مع حق الأجيال وحماية البيئة", "منع التعدين تماماً"], c: 2 },
    { q: "النتيجة المترتبة على توجه إفريقيا نحو 'الصناعات الخضراء':", a: ["زيادة التلوث الكربوني", "الاعتماد على الوقود الأحفوري فقط", "تقليل الأثر البيئي ودعم الطاقة المتجددة", "توقف النشاط الصناعي"], c: 2 }
];


        let index = 0, score = 0, picked = null;

        window.onload = () => { render(); };

        function render() {
            picked = null;
            const q = questions[index];
            document.getElementById('main-question').innerText = q.q;
            document.getElementById('q-count').innerText = index + 1;
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            q.a.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = 'option-box p-6 rounded-2xl flex items-center gap-4 transition-all';
                btn.innerHTML = `<div class="opt-prefix">${String.fromCharCode(65 + i)}</div><span class="text-lg font-bold">${opt}</span>`;
                btn.onclick = () => {
                    document.querySelectorAll('.option-box').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    picked = i;
                };
                grid.appendChild(btn);
            });
            document.getElementById('progress-bar').style.width = ((index / questions.length) * 100) + '%';
        }

        function goToNext() {
            if (picked === null) return Swal.fire({text:'اختر إجابة أولاً يا بطل!', icon:'warning', confirmButtonColor: '#8b5cf6'});
            if (picked === questions[index].c) score++;
            index++;
            if (index < questions.length) render(); else finish();
        }

        function finish() {
            document.getElementById('quiz-wrapper').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            const pct = Math.round((score / questions.length) * 100);
            document.getElementById('score-text').innerText = pct + '%';
            document.getElementById('score-circle').style.strokeDashoffset = 440 - (440 * pct) / 100;
            document.getElementById('result-msg').innerText = pct >= 50 ? "بطل حقيقي! مستواك رائع" : "محاولة جيدة، راجع الدرس مرة أخرى";
        }

        function toggleExitModal(s) { document.getElementById('exit-modal').style.display = s?'flex':'none'; }
    </script>
</body>
  </html>
