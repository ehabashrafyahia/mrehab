<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة نتائج الطلاب الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #a29bfe;
            --success-color: #00b894;
            --error-color: #ff7675;
            --text-color: #2d3436;
            --bg-gradient: linear-gradient(135deg, #6c5ce7 0%, #fab1a0 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-gradient);
            padding: 15px; /* تقليل البادينج للموبايل */
            overflow-x: hidden;
        }

        /* دوائر الخلفية - تم إخفاؤها في الموبايل لزيادة السرعة والوضوح */
        @media (min-width: 768px) {
            body::before, body::after {
                content: '';
                position: absolute;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.1);
                backdrop-filter: blur(10px);
                z-index: -1;
                animation: float 15s infinite alternate ease-in-out;
            }
            body::before { width: 300px; height: 300px; top: -50px; left: -50px; }
            body::after { width: 250px; height: 250px; bottom: -50px; right: -50px; animation-delay: 2s; }
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(30px) rotate(15deg); }
        }

        .main-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 30px 20px; /* مسافات مرنة */
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: transform 0.3s ease;
        }

        h2 { 
            color: var(--primary-color); 
            font-weight: 700; 
            margin-bottom: 8px; 
            font-size: clamp(20px, 6vw, 26px); /* تكبير وتصغير الخط حسب الشاشة */
        }

        .subtitle { color: #636e72; margin-bottom: 25px; font-size: 14px; }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid transparent;
            border-radius: 12px;
            background-color: rgba(108, 92, 231, 0.05);
            font-size: 16px;
            color: var(--text-color);
            transition: all 0.3s ease;
            text-align: center;
            margin-bottom: 15px;
            appearance: none;
        }

        input:focus {
            outline: none;
            border-color: var(--secondary-color);
            background-color: #fff;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        button:active { transform: scale(0.98); }

        .back-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
            color: var(--primary-color);
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            padding: 8px 15px;
            border-radius: 10px;
            background: rgba(108, 92, 231, 0.05);
        }

        .back-btn i { margin-left: 8px; }

        #result { margin-top: 20px; display: none; opacity: 0; transition: 0.4s; }
        #result.show { display: block; opacity: 1; }

        .result-box { padding: 20px; border-radius: 15px; border: 1px solid transparent; }
        .success { background-color: #f0fff4; border-color: #c6f6d5; color: var(--success-color); }
        .error { background-color: #fff5f5; border-color: #fed7d7; color: var(--error-color); }

        .value { font-size: clamp(18px, 5vw, 22px); font-weight: 700; margin-bottom: 10px; }
        
        /* تحسين مظهر اللودر */
        .loader {
            display: none;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(108, 92, 231, 0.1);
            border-left-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 15px auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* تعديلات خاصة بالشاشات الصغيرة جداً */
        @media (max-width: 350px) {
            .main-card { padding: 20px 15px; }
            h2 { font-size: 18px; }
        }
    </style>
</head>
<body>

<div class="main-card">
    <h2>بوابة النتائج</h2>
    <p class="subtitle">استعلم عن نتيجتك بكل سهولة</p>
    
    <input type="tel" id="studentCode" placeholder="أدخل كود الطالب هنا" pattern="[0-9]*">
    <button onclick="fetchResult()">عرض النتيجة</button>

    <div id="loader" class="loader"></div>
    <div id="result"></div>

    <a href="index.html" class="back-btn">
        العودة للرئيسية <i class="fas fa-home"></i>
    </a>
</div>

<script>
    const SHEET_ID = '1lSbcQ-yUPGOZ_I7N66ZBJEUIDhEYL_oGtKFnbg9ITEs'; 
    const SHEET_TITLE = 'Sheet1'; 

    async function fetchResult() {
        const codeInput = document.getElementById('studentCode').value.trim();
        const resultDiv = document.getElementById('result');
        const loader = document.getElementById('loader');

        if (!codeInput) {
            alert("من فضلك أدخل كود الطالب");
            return;
        }

        loader.style.display = "block";
        resultDiv.classList.remove('show');
        resultDiv.innerHTML = '';

        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${SHEET_TITLE}`;

        try {
            const response = await fetch(url);
            const data = await response.text();
            const rows = data.split('\n').map(row => row.split(',').map(cell => cell.replace(/"/g, '').trim()));
            const student = rows.find(row => row[0] === codeInput);

            loader.style.display = "none";
            resultDiv.classList.add('show');

            if (student) {
                resultDiv.innerHTML = `
                    <div class="result-box success">
                        <span style="font-size:12px; opacity:0.8">اسم الطالب</span>
                        <div class="value">${student[1]}</div>
                        <div style="height:1px; background:#c6f6d5; margin:10px 0;"></div>
                        <span style="font-size:12px; opacity:0.8">الدرجة النهائية</span>
                        <div class="value" style="font-size: 32px; color: #276749;">${student[2]}</div>
                        <p style="font-size: 13px; font-weight: bold;">مبارك النجاح! 🎉</p>
                    </div>
                `;
            } else {
                resultDiv.innerHTML = `
                    <div class="result-box error">
                        <div class="value" style="font-size:16px;">عذراً.. الكود غير صحيح</div>
                    </div>
                `;
            }
        } catch (error) {
            loader.style.display = "none";
            resultDiv.classList.add('show');
            resultDiv.innerHTML = `<div class="result-box error">خطأ في الاتصال بالبيانات</div>`;
        }
    }
</script>

</body>
</html>
