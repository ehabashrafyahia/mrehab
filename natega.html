<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة نتائج الطلاب الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #a29bfe;
            --success-color: #00b894;
            --error-color: #ff7675;
            --text-color: #2d3436;
            --bg-gradient: linear-gradient(135deg, #6c5ce7 0%, #fab1a0 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-gradient);
            padding: 20px;
            overflow-x: hidden;
        }

        /* دوائر جمالية في الخلفية */
        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            z-index: -1;
            animation: float 15s infinite alternate ease-in-out;
        }
        body::before { width: 300px; height: 300px; top: -50px; left: -50px; }
        body::after { width: 250px; height: 250px; bottom: -50px; right: -50px; animation-delay: 2s; }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(30px) rotate(15deg); }
        }

        .main-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: transform 0.3s ease;
        }

        .main-card:hover { transform: translateY(-5px); }

        h2 { color: var(--primary-color); font-weight: 700; margin-bottom: 8px; font-size: 26px; }
        .subtitle { color: #636e72; margin-bottom: 30px; font-size: 14px; }

        input {
            width: 100%;
            padding: 16px;
            border: 2px solid transparent;
            border-radius: 15px;
            background-color: rgba(108, 92, 231, 0.05);
            font-size: 16px;
            color: var(--text-color);
            transition: all 0.3s ease;
            text-align: center;
            margin-bottom: 20px;
        }

        input:focus {
            outline: none;
            border-color: var(--secondary-color);
            background-color: #fff;
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.1);
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.2);
        }

        button:hover {
            background: #5a4bcf;
            transform: scale(1.02);
            box-shadow: 0 12px 25px rgba(108, 92, 231, 0.3);
        }

        #result {
            margin-top: 30px;
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        #result.show { display: block; opacity: 1; }

        .result-box { padding: 25px; border-radius: 20px; border: 1px solid transparent; }
        .success { background-color: rgba(0, 184, 148, 0.08); border-color: rgba(0, 184, 148, 0.2); color: var(--success-color); }
        .error { background-color: rgba(255, 118, 117, 0.08); border-color: rgba(255, 118, 117, 0.2); color: var(--error-color); }

        .label { font-size: 13px; color: #636e72; display: block; margin-bottom: 4px; }
        .value { font-size: 22px; font-weight: 700; color: var(--text-color); margin-bottom: 15px; }
        .divider { height: 1px; background: rgba(0,0,0,0.06); margin: 12px 0; }

        .loader {
            display: none;
            width: 35px;
            height: 35px;
            border: 4px solid rgba(108, 92, 231, 0.1);
            border-left-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="main-card">
    <h2>بوابة النتائج</h2>
    <p class="subtitle">استعلم عن نتيجتك بكل سهولة</p>
    
    <input type="text" id="studentCode" placeholder="أدخل كود الطالب هنا">
    <button onclick="fetchResult()">عرض النتيجة</button>

    <div id="loader" class="loader"></div>
    <div id="result"></div>
</div>

<script>
    // --- هام: استبدل المعرف أدناه بالمعرف الخاص بملفك ---
    const SHEET_ID = 'ضع_هنا_ID_الملف_الخاص_بك'; 
    const SHEET_TITLE = 'Sheet1'; 

    async function fetchResult() {
        const codeInput = document.getElementById('studentCode').value.trim();
        const resultDiv = document.getElementById('result');
        const loader = document.getElementById('loader');

        if (!codeInput) {
            alert("من فضلك أدخل كود الطالب");
            return;
        }

        loader.style.display = "block";
        resultDiv.classList.remove('show');
        resultDiv.innerHTML = '';

        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${SHEET_TITLE}`;

        try {
            const response = await fetch(url);
            const data = await response.text();
            
            // تحويل البيانات وتنظيفها من علامات الاقتباس والمسافات
            const rows = data.split('\n').map(row => row.split(',').map(cell => cell.replace(/"/g, '').trim()));
            
            // البحث عن الكود في العمود الأول
            const student = rows.find(row => row[0] === codeInput);

            loader.style.display = "none";
            resultDiv.classList.add('show');

            if (student) {
                resultDiv.innerHTML = `
                    <div class="result-box success">
                        <span class="label">اسم الطالب</span>
                        <div class="value">${student[1]}</div>
                        <div class="divider"></div>
                        <span class="label">الدرجة النهائية</span>
                        <div class="value" style="font-size: 35px; color: var(--success-color);">${student[2]}</div>
                        <p style="font-size: 14px;">مبارك النجاح!</p>
                    </div>
                `;
            } else {
                resultDiv.innerHTML = `
                    <div class="result-box error">
                        <div class="value" style="color: var(--error-color);">عذراً.. الكود غير صحيح</div>
                        <p style="font-size: 14px;">تأكد من كتابة الكود بشكل سليم وأعد المحاولة.</p>
                    </div>
                `;
            }
        } catch (error) {
            loader.style.display = "none";
            resultDiv.classList.add('show');
            resultDiv.innerHTML = `
                <div class="result-box error">
                    <div class="value">خطأ فني</div>
                    <p>يرجى التأكد من نشر الملف للويب (Publish to web).</p>
                </div>
            `;
        }
    }
</script>

</body>
</html>
