<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أساطير الجغرافيا - العرض الماسي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at bottom, #0d1d31 0%, #0c0d13 100%);
            position: relative;
            overflow-x: hidden;
        }

        /* تأثير النجوم المتحركة */
        .stars, .twinkling, .clouds {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none;
        }

        .stars {
            background: #000 url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48Y2lyY2xlIGN4PSI2IiBjeT0iMTQiIHI9IjEiIGZpbGw9IndoaXRlIiAvPjxjaXJjbGUgY3g9IjE2MCIgY3k9IjYwIiByPSIxIiBmaWxsPSJ3aGl0ZSIgLz48Y2lyY2xlIGN4PSI0MCIgY3k9IjIwMCIgcj0iMSIgZmlsbD0id2hpdGUiIC8+PC9zdmc+');
            background-size: 200px 200px;
            animation: stars 200s linear infinite;
            opacity: 0.5;
        }

        .twinkling {
            background: transparent url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48Y2lyY2xlIGN4PSIxMDAiIGN5PSI1MCIgcj0iMiIgZmlsbD0id2hpdGUiIG9wYWNpdHk9IjAuMyIgLz48Y2lyY2xlIGN4PSIyMDAiIGN5PSIxNTAiIHI9IjIiIGZpbGw9IndoaXRlIiBvcGFjaXR5PSIwLjMiIC8+PC9zdmc+');
            background-size: 300px 300px;
            animation: twinkling 4s infinite;
        }

        @keyframes stars {
            from { transform: translateY(0); }
            to { transform: translateY(-2000px); }
        }

        @keyframes twinkling {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.5; }
        }

        /* الهيدر المطور */
        .header {
            text-align: center;
            padding: 60px 20px 40px;
            position: relative;
            z-index: 10;
            animation: glowPulse 3s infinite;
        }

        @keyframes glowPulse {
            0%, 100% { filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.3)); }
            50% { filter: drop-shadow(0 0 50px rgba(255, 215, 0, 0.7)); }
        }

        h1 {
            font-size: 5rem;
            font-weight: 900;
            background: linear-gradient(45deg, 
                #FFD700 0%, 
                #FDB931 25%, 
                #FFF5B0 50%, 
                #FDB931 75%, 
                #FFD700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            position: relative;
        }

        h1::before {
            content: '⚜️';
            position: absolute;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            font-size: 3rem;
            opacity: 0.5;
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from { transform: translateX(-50%) translateY(-80px) rotate(0deg); }
            to { transform: translateX(-50%) translateY(-80px) rotate(360deg); }
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.2rem;
            letter-spacing: 12px;
            text-transform: uppercase;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.3), transparent);
            padding: 15px;
            border-radius: 50px;
            display: inline-block;
            backdrop-filter: blur(5px);
        }

        /* الشبكة المطورة */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 50px 30px;
            padding: 40px;
            max-width: 1600px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        /* البطاقة المطورة */
        .player-card {
            height: 450px;
            background: rgba(10, 20, 40, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(255, 215, 0, 0.1) inset;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: cardAppear 0.8s ease-out;
        }

        @keyframes cardAppear {
            0% { opacity: 0; transform: translateY(100px) scale(0.3); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* تأثير الخلفية المضيئة */
        .player-card::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                #FFD700 60deg,
                transparent 120deg,
                transparent 180deg,
                #FFD700 240deg,
                transparent 300deg,
                transparent 360deg
            );
            animation: rotate 4s linear infinite;
            opacity: 0.1;
        }

        .player-card::after {
            content: '';
            position: absolute;
            inset: 2px;
            background: rgba(5, 10, 25, 0.9);
            border-radius: 28px;
            z-index: 1;
        }

        /* المحتوى */
        .card-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 20px;
            width: 100%;
            transform: translateY(0);
            transition: transform 0.3s ease;
        }

        .player-card:hover .card-content {
            transform: translateY(-10px);
        }

        /* الرتبة المطورة */
        .rank-badge {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #FFD700, #FDB931);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            box-shadow: 0 0 30px #FFD700,
                        0 0 0 5px rgba(255, 255, 255, 0.2) inset;
            position: relative;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .rank-badge::before {
            content: '';
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FFD700, transparent);
            opacity: 0.5;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.2; }
        }

        /* الاسم */
        .student-name {
            font-size: 2.5rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px #FFD700,
                         2px 2px 0 #000;
            margin: 20px 0 15px;
            line-height: 1.2;
            word-break: break-word;
        }

        /* التاغ */
        .achievement-tag {
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 215, 0, 0.3), 
                rgba(255, 215, 0, 0.5), 
                rgba(255, 215, 0, 0.3), 
                transparent);
            padding: 12px 25px;
            color: #FFD700;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 2px;
            border-radius: 50px;
            display: inline-block;
            border: 1px solid rgba(255, 215, 0, 0.3);
            backdrop-filter: blur(5px);
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        .achievement-tag::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0%, 100% { left: -100%; }
            20% { left: 100%; }
        }

        /* الرقم التسلسلي */
        .serial-number {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 0.9rem;
            color: rgba(255, 215, 0, 0.3);
            font-weight: 700;
            z-index: 2;
        }

        /* رسالة الانتظار */
        .waiting-msg {
            text-align: center;
            padding: 100px 20px;
            font-size: 2.5rem;
            color: rgba(255, 255, 255, 0.5);
            position: relative;
            z-index: 10;
            animation: fadePulse 2s infinite;
        }

        @keyframes fadePulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* تأثيرات إضافية */
        .glow-orb {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            animation: orbMove 20s infinite alternate;
        }

        @keyframes orbMove {
            0% { transform: translate(-200px, -200px); }
            100% { transform: translate(calc(100vw - 300px), calc(100vh - 300px)); }
        }

        /* تنسيقات للشاشات الصغيرة */
        @media (max-width: 768px) {
            h1 { font-size: 3rem; letter-spacing: 4px; }
            .subtitle { letter-spacing: 6px; font-size: 1rem; }
            .grid-container { gap: 30px; padding: 20px; }
            .player-card { height: 400px; }
        }
    </style>
</head>
<body>
    <!-- طبقات النجوم -->
    <div class="stars"></div>
    <div class="twinkling"></div>
    
    <!-- الكرة المضيئة -->
    <div class="glow-orb" id="glowOrb"></div>

    <!-- الهيدر -->
    <div class="header">
        <h1>أساطير التاريخ</h1>
        <div class="subtitle">✦ HALL OF FAME ✦</div>
    </div>

    <!-- منطقة العرض -->
    <div id="waiting" class="waiting-msg">🌟 في انتظار الأبطال... 🌟</div>
    <div class="grid-container" id="grid"></div>

    <script>
        // متغيرات للتأثيرات
        let lastCount = 0;
        let cardColors = [
            'linear-gradient(135deg, #1a1a2e, #16213e)',
            'linear-gradient(135deg, #1e1e3f, #2a1e3c)',
            'linear-gradient(135deg, #0f2027, #203a43, #2c5364)',
            'linear-gradient(135deg, #23074d, #cc5333)',
            'linear-gradient(135deg, #780206, #061161)'
        ];

        // تحريك الكرة المضيئة مع الماوس
        document.addEventListener('mousemove', (e) => {
            const orb = document.getElementById('glowOrb');
            const x = e.clientX - 250;
            const y = e.clientY - 250;
            orb.style.transform = `translate(${x}px, ${y}px)`;
            orb.style.transition = 'transform 0.3s ease';
        });

        // الاستماع للتحديثات
        window.addEventListener('storage', (e) => {
            if (e.key === 'students_geo_db') {
                loadStudents();
            }
        });

        // تحميل البيانات عند فتح الصفحة
        loadStudents();

        function loadStudents() {
            const students = JSON.parse(localStorage.getItem('students_geo_db')) || [];
            const grid = document.getElementById('grid');
            const waiting = document.getElementById('waiting');
            
            const newCount = students.length;
            
            grid.innerHTML = '';

            if (students.length === 0) {
                waiting.style.display = 'block';
                return;
            } else {
                waiting.style.display = 'none';
            }

            // عكس المصفوفة لعرض الأحدث أولاً
            [...students].reverse().forEach((student, index) => {
                const card = createCard(student.name, students.length - index);
                grid.appendChild(card);
            });

            // إطلاق احتفال إذا تمت إضافة طالب جديد
            if (newCount > lastCount) {
                fireLuxuryConfetti();
                playSuccessSound();
            }
            
            lastCount = newCount;
        }

        function createCard(name, serial) {
            const div = document.createElement('div');
            div.className = 'player-card';
            
            // اختيار لون عشوائي للبطاقة
            const randomColor = cardColors[Math.floor(Math.random() * cardColors.length)];
            div.style.background = randomColor;
            
            // أيقونات متنوعة
            const icons = ['🌍', '🌋', '🗺️', '🏔️', '🏝️', '🌅', '🌆', '🏯', '🕌', '🗽'];
            const icon = icons[Math.floor(Math.random() * icons.length)];
            
            // تأثير الظل مع الحركة
            div.addEventListener('mousemove', (e) => {
                const rect = div.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const rotateX = (y - rect.height/2) / 15;
                const rotateY = (x - rect.width/2) / -15;
                
                div.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05)`;
                div.style.boxShadow = `${(x - rect.width/2) / 20}px ${(y - rect.height/2) / 20}px 50px rgba(255,215,0,0.3)`;
            });
            
            div.addEventListener('mouseleave', () => {
                div.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale(1)';
                div.style.boxShadow = '0 20px 50px rgba(0, 0, 0, 0.5)';
            });

            // إضافة تأثير النقر
            div.addEventListener('click', () => {
                div.style.animation = 'none';
                div.offsetHeight;
                div.style.animation = 'cardAppear 0.5s ease-out';
                fireMiniConfetti();
            });

            div.innerHTML = `
                <div class="card-content">
                    <div class="rank-badge">
                        ${icon}
                    </div>
                    <div class="student-name">${name}</div>
                    <div class="achievement-tag">
                        ⚡ أسطورة التاريخ ⚡
                    </div>
                    <div class="serial-number">#${String(serial).padStart(3, '0')}</div>
                </div>
            `;
            
            return div;
        }

        // احتفال فاخر
        function fireLuxuryConfetti() {
            const count = 200;
            const defaults = {
                origin: { y: 0.7 },
                colors: ['#FFD700', '#FDB931', '#FFF5B0', '#FFA500', '#FF8C00']
            };

            function fire(particleRatio, opts) {
                confetti(Object.assign({}, defaults, opts, {
                    particleCount: Math.floor(count * particleRatio)
                }));
            }

            fire(0.25, { spread: 26, startVelocity: 55 });
            fire(0.2, { spread: 60 });
            fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
            fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
            fire(0.1, { spread: 120, startVelocity: 45 });

            // إضافة تأثير جانبي
            setTimeout(() => {
                confetti({
                    particleCount: 100,
                    spread: 100,
                    origin: { x: 0, y: 0.5 },
                    colors: ['#FFD700', '#FDB931']
                });
                confetti({
                    particleCount: 100,
                    spread: 100,
                    origin: { x: 1, y: 0.5 },
                    colors: ['#FFD700', '#FDB931']
                });
            }, 250);
        }

        function fireMiniConfetti() {
            confetti({
                particleCount: 50,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#FFD700', '#FDB931', '#FFF5B0']
            });
        }

        // محاكاة صوت النجاح (بما أننا لا نستطيع تشغيل صوت حقيقي بدون تفاعل المستخدم)
        function playSuccessSound() {
            // يمكن إضافة صوت لاحقاً إذا رغبت
            console.log('🎉 تم إضافة بطل جديد! 🎉');
        }

        // تحميل أولي
        window.addEventListener('load', () => {
            // إضافة بعض البيانات التجريبية إذا لم يكن هناك بيانات
            const students = JSON.parse(localStorage.getItem('students_geo_db')) || [];
            if (students.length === 0) {
                // يمكن إضافة بيانات افتراضية للعرض
                // localStorage.setItem('students_geo_db', JSON.stringify(['أحمد', 'سارة', 'محمد', 'فاطمة']));
                // loadStudents();
            }
        });
    </script>
</body>
</html>
