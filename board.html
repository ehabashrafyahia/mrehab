<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة أساطير الجغرافيا - النسخة الملكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --gold: #FFD700;
            --silver: #C0C0C0;
            --bronze: #CD7F32;
            --diamond: #B9F2FF;
            --bg-dark: #050a15;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            min-height: 100vh;
            background: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 215, 0, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 150, 255, 0.05) 0%, transparent 40%);
            color: white;
            overflow-x: hidden;
        }

        /* تأثير النجوم المتساقطة في الخلفية */
        .stars-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* الهيدر */
        .header {
            text-align: center;
            padding: 50px 20px;
            position: relative;
            z-index: 10;
        }

        .main-title {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 900;
            background: linear-gradient(to bottom, #fff 20%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.3));
            margin-bottom: 10px;
        }

        /* شبكة البطاقات */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            padding: 20px 50px;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* البطاقة */
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(15px);
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--gold);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(255, 215, 0, 0.1);
        }

        /* أيقونة الطالب */
        .avatar-wrapper {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            position: relative;
        }

        .avatar {
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #1a1a1a, #333);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            border: 2px solid rgba(255, 215, 0, 0.3);
            transition: 0.3s;
        }

        /* نظام النجوم */
        .stars-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 5px;
            margin: 15px 0;
            min-height: 30px;
        }

        .star {
            color: var(--gold);
            font-size: 1.5rem;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            animation: starPop 0.4s ease-out;
        }

        @keyframes starPop {
            0% { transform: scale(0); rotate: -180deg; }
            100% { transform: scale(1); rotate: 0; }
        }

        .student-name {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 5px;
            color: #fff;
        }

        /* التحكم في النجوم */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            opacity: 0;
            transition: 0.3s;
        }

        .card:hover .controls {
            opacity: 1;
        }

        .btn-star {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.4);
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .btn-star:hover {
            background: var(--gold);
            color: black;
            transform: scale(1.1);
        }

        .btn-star.minus:hover {
            background: #ff4d4d;
            border-color: #ff4d4d;
        }

        /* رتب البطاقات */
        .rank-diamond { border-color: var(--diamond) !important; box-shadow: 0 0 30px rgba(185, 242, 255, 0.2); }
        .rank-gold { border-color: var(--gold) !important; }

        /* رسالة فارغة */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px;
            color: rgba(255,255,255,0.3);
            font-size: 1.5rem;
        }

        /* شريط التنبيه السفلي */
        .footer-note {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
            border: 1px solid var(--gold);
            z-index: 100;
        }
    </style>
</head>
<body>

    <canvas class="stars-bg" id="starsCanvas"></canvas>

    <div class="header">
        <h1 class="main-title">أساطير التاريخ والجغرافيا</h1>
        <p style="color: var(--gold); letter-spacing: 5px;">قاعة المشاهير الملكية</p>
    </div>

    <div class="grid-container" id="mainGrid">
        </div>

    <div class="footer-note">
        💡 مرر الماوس فوق اسم الطالب لإضافة أو حذف النجوم
    </div>

    <script>
        // نظام البيانات المطور
        let students = JSON.parse(localStorage.getItem('students_geo_db')) || [];

        // تحويل البيانات القديمة (نصوص فقط) إلى كائنات (Objects) إذا وجدت
        if (students.length > 0 && typeof students[0] === 'string') {
            students = students.map(name => ({ name: name, stars: 1 }));
            saveData();
        }

        const grid = document.getElementById('mainGrid');

        function render() {
            grid.innerHTML = '';
            
            if (students.length === 0) {
                grid.innerHTML = '<div class="empty-state">🌟 في انتظار ظهور الأبطال... 🌟</div>';
                return;
            }

            // ترتيب الطلاب حسب عدد النجوم (الأكثر أولاً)
            const sortedStudents = [...students].sort((a, b) => b.stars - a.stars);

            sortedStudents.forEach((student, index) => {
                const card = document.createElement('div');
                card.className = `card ${getRankClass(student.stars)}`;
                
                // توليد النجوم
                let starsHtml = '';
                for(let i=0; i < student.stars; i++) {
                    starsHtml += '<span class="star">⭐</span>';
                }

                card.innerHTML = `
                    <div class="avatar-wrapper">
                        <div class="avatar">${getEmoji(index)}</div>
                    </div>
                    <div class="student-name">${student.name}</div>
                    <div class="stars-container">${starsHtml}</div>
                    <div class="controls">
                        <button class="btn-star" onclick="updateStar('${student.name}', 1)">+</button>
                        <button class="btn-star minus" onclick="updateStar('${student.name}', -1)">-</button>
                        <button class="btn-star" style="background:#ff4d4d" onclick="deleteStudent('${student.name}')">🗑️</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function updateStar(name, change) {
            const student = students.find(s => s.name === name);
            if (student) {
                student.stars = Math.max(0, (student.stars || 0) + change);
                if (change > 0) fireSuccessEffect();
                saveData();
                render();
            }
        }

        function deleteStudent(name) {
            if(confirm(`هل تريد حذف ${name} من القائمة؟`)) {
                students = students.filter(s => s.name !== name);
                saveData();
                render();
            }
        }

        function saveData() {
            localStorage.setItem('students_geo_db', JSON.stringify(students));
        }

        function getRankClass(stars) {
            if (stars >= 10) return 'rank-diamond';
            if (stars >= 5) return 'rank-gold';
            return '';
        }

        function getEmoji(index) {
            const emojis = ['🤴', '👑', '💎', '🔥', '🛡️', '🏹', '🦅', '🦁', '🌟', '🔱'];
            return emojis[index % emojis.length];
        }

        function fireSuccessEffect() {
            confetti({
                particleCount: 40,
                spread: 70,
                origin: { y: 0.8 },
                colors: ['#FFD700', '#ffffff']
            });
        }

        // الاستماع للتحديثات من صفحة الإضافة
        window.addEventListener('storage', () => {
            const newData = JSON.parse(localStorage.getItem('students_geo_db'));
            // تحويل البيانات الجديدة لو كانت بنظام قديم
            students = newData.map(s => typeof s === 'string' ? {name: s, stars: 1} : s);
            render();
        });

        // تأثير خلفية النجوم البسيط
        const canvas = document.getElementById('starsCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const starParticles = Array(100).fill().map(() => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2,
            speed: Math.random() * 0.5
        }));

        function animateStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            starParticles.forEach(p => {
                p.y -= p.speed;
                if (p.y < 0) p.y = canvas.height;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(animateStars);
        }

        animateStars();
        render();
    </script>
</body>
</html>
